                  <span className={`lb-expand${isExp?" lb-expanded":""}`}>›</span>
                </div>
                {isExp&&(
                  <div className="lb-body">
                    <div className="lb-grids">
                      {esprE&&(
                        <div className="lb-recipe-block">
                          <div className="lb-recipe-title">Espresso</div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px",marginBottom:"8px"}}>
                            {[["H·E",gGrid.he],["O·E",gGrid.oe]].map(([lbl,val])=>val&&(
                              <div key={lbl} style={{textAlign:"center",background:"var(--card)",borderRadius:"6px",padding:"6px"}}>
                                <div style={{fontFamily:"'DM Mono',monospace",fontSize:"18px",fontWeight:500,color:"var(--accent)"}}>{val}</div>
                                <div style={{fontSize:"8px",letterSpacing:".1em",textTransform:"uppercase",color:"var(--tx3)",marginTop:"2px"}}>{lbl}</div>
                              </div>
                            ))}
                          </div>
                          {esprE.temperature>0&&<div className="lb-recipe-row">{tempDisp(esprE.temperature,settings?.tempUnit)}</div>}
                          {esprE.doseIn>0&&esprE.yieldOut>0&&<div className="lb-recipe-row">{esprE.doseIn}→{esprE.yieldOut}g · {ratio(esprE.doseIn,esprE.yieldOut)}</div>}
                          {esprE.timeSeconds>0&&<div className="lb-recipe-row">{esprE.timeSeconds}s</div>}
                        </div>
                      )}
                      {pourE&&(
                        <div className="lb-recipe-block">
                          <div className="lb-recipe-title">Pour Over</div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px",marginBottom:"8px"}}>
                            {[["H·P",gGrid.hp],["O·P",gGrid.op]].map(([lbl,val])=>val&&(
                              <div key={lbl} style={{textAlign:"center",background:"var(--card)",borderRadius:"6px",padding:"6px"}}>
                                <div style={{fontFamily:"'DM Mono',monospace",fontSize:"18px",fontWeight:500,color:"var(--teal)"}}>{val}</div>
                                <div style={{fontSize:"8px",letterSpacing:".1em",textTransform:"uppercase",color:"var(--tx3)",marginTop:"2px"}}>{lbl}</div>
                              </div>
                            ))}
                          </div>
                          {pourE.temperature>0&&<div className="lb-recipe-row">{tempDisp(pourE.temperature,settings?.tempUnit)}</div>}
                          {pourE.doseIn>0&&pourE.yieldOut>0&&<div className="lb-recipe-row">{pourE.doseIn}→{pourE.yieldOut}g · {ratio(pourE.doseIn,pourE.yieldOut)}</div>}
                          {pourE.timeSeconds>0&&<div className="lb-recipe-row">{secToMSS(pourE.timeSeconds)}</div>}
                        </div>
                      )}
                    </div>
                    {pourE?.filterPours?.length>0&&(
                      <div className="lb-phases">
                        <div style={{fontSize:"9px",fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",color:"var(--tx3)",marginBottom:"6px"}}>Pour Phases</div>
                        {pourE.filterPours.map((p,i)=>{
                          const maxG=Math.max(...pourE.filterPours.map(x=>x.targetGrams));
                          return (
                            <div key={i} className="lb-phase-row">
                              <span className="lb-phase-num">{"①②③④⑤⑥"[p.phase-1]}</span>
                              <div style={{flex:1}}><div className="lb-phase-bar" style={{width:`${(p.targetGrams/maxG)*100}%`}}/></div>
                              <span className="lb-phase-g">{p.targetGrams}g</span>
                              <span className="lb-phase-t">{secToMSS(p.startSeconds)}</span>
                            </div>
                          );
                        })}
                      </div>
                    )}
                    <div style={{padding:"10px 14px 12px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"flex-end"}}>
                      <button onClick={()=>nav("dialin",g.entries[0],"logbook")} style={{background:"none",border:"none",color:"var(--accent)",fontFamily:"'Jost',sans-serif",fontSize:"12px",fontWeight:500,cursor:"pointer"}}>Full details →</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })
      }
    </div>
  );
}

// ── POUR PHASES DISPLAY ───────────────────────────────────────────────────────
function PourPhasesDisplay({phases}) {
  if (!phases||!phases.length) return null;
  const maxG=Math.max(...phases.map(p=>p.targetGrams));
  return (
    <div className="phase-list">
      {phases.map((p,i)=>(
        <div key={i} className="phase-row-d">
          <span className="phase-num">{"①②③④⑤⑥"[p.phase-1]||`${p.phase}.`}</span>
          <div style={{flex:1}}><div className="phase-bar" style={{width:`${(p.targetGrams/maxG)*100}%`}}/></div>
          <span className="phase-grams">{p.targetGrams}g</span>
          <span className="phase-time">{secToMSS(p.startSeconds)}</span>
        </div>
      ))}
    </div>
  );
}

// ── DIAL-IN DETAIL ────────────────────────────────────────────────────────────
function DialInDetail({d, kits, dialins, nav, onEdit, listScreen, settings, onQuickStatus}) {
  if (!d) return null;
  const kit  = kits.find(k=>k.id===d.kitId);
  const norm = normalizeDiaLin(d);
  const freshness = getFreshness(norm.roastDate, norm.beanLocation, d.roastLevel, norm.brewMethods, settings, norm.frozenDate, norm.thawDate);
  const r = d.doseIn&&d.yieldOut ? ratio(d.doseIn,d.yieldOut) : null;
  const isFilter = kit?.brewMethod==="filter"||kit?.brewMethod==="fpress";

  // All entries for this coffee (for grind strip + best recipes)
  const allEntries = useMemo(()=>{
    const name=(d.coffeeName||"").toLowerCase().trim(), rst=(d.roaster||"").toLowerCase().trim();
    return dialins.map(normalizeDiaLin).filter(e=>(e.coffeeName||"").toLowerCase().trim()===name&&(e.roaster||"").toLowerCase().trim()===rst);
  },[dialins,d.coffeeName,d.roaster]);

  const esprEntry = useMemo(()=>getBestEntry(allEntries,"espr"),[allEntries]);
  const pourEntry = useMemo(()=>getBestEntry(allEntries,"pour"),[allEntries]);
  const grindGrid = useMemo(()=>({he:null,hp:null,oe:null,op:null,...Object.fromEntries(allEntries.filter(e=>e.grindSetting&&KIT_GRID[e.kitId]).map(e=>[KIT_GRID[e.kitId],shortGrind(e.grindSetting)]))}), [allEntries]);

  const allBrewMethods=[...new Set(allEntries.flatMap(e=>e.brewMethods||[]))];

  return (
    <div className="screen fade-in">
      <div className="det-topbar">
        <button className="icon-btn" onClick={()=>nav(listScreen||"home")}>←</button>
        <div style={{flex:1,fontFamily:"'Cormorant Garamond',serif",fontSize:"20px",fontWeight:500}}>Dial-In</div>
        {d.rating>0&&<Stars n={d.rating} size={12}/>}
        <button className="icon-btn" onClick={()=>onEdit(d)}>✎</button>
      </div>

      {/* Hero */}
      <div className="det-hero">
        <div className="det-date">{fmt(d.date)}{norm.roastDate&&` · Roasted ${fmt(norm.roastDate)}`}</div>
        <div className="det-roaster">
          {norm.coffeeUrl
            ? <a href={norm.coffeeUrl} target="_blank" rel="noopener" style={{color:"var(--accent)",textDecoration:"none",display:"flex",alignItems:"center",gap:"8px"}}>{d.roaster} <span style={{fontSize:"14px"}}>🔗</span></a>
            : d.roaster}
        </div>
        <div className="det-name">{d.coffeeName}</div>

        {/* Badge row 1 */}
        <div className="det-badge-row">
          <div className="det-badge-left">
            <BrewDot brewMethods={allBrewMethods} size={9}/>
            {allBrewMethods.includes("Espresso")&&<span className="badge b-espr">ESPR</span>}
            {(allBrewMethods.includes("Pour Over")||allBrewMethods.includes("French Press"))&&<span className="badge b-pour">POUR</span>}
            {freshness&&<span className="badge" style={{background:freshness.bg,color:freshness.color}}>{freshness.label}</span>}
          </div>
          <div className="det-badge-right">
            <BeanBadge beanLocation={norm.beanLocation}/>
            <StatusChip dialStatus={norm.dialStatus} experimenting={norm.experimenting}/>
          </div>
        </div>

        {/* Badge row 2 */}
        <div className="det-badge-row" style={{marginTop:"5px"}}>
          <div className="det-badge-left">
            {d.process    && <span className="badge b-process">{d.process.toUpperCase()}</span>}
            {d.roastLevel && <span className="badge b-roast">{d.roastLevel.toUpperCase()}</span>}
          </div>
          <div className="det-badge-right">
            {norm.dialEase     && <span className={`badge b-ease-${norm.dialEase==="easy"?"easy":norm.dialEase==="medium"?"med":"hard"}`}>{norm.dialEase.toUpperCase()}</span>}
            {norm.dialStability&& <span className={`badge ${norm.dialStability==="stable"?"b-stable":"b-unstable"}`}>{norm.dialStability.toUpperCase()}</span>}
            {norm.isChoice     && <span className="badge b-pick">★ MY PICK</span>}
            {norm.wouldBuy     && <span className="badge b-buy">🛒 WOULD BUY</span>}
            {norm.isEarlyEntry && <span className="badge b-early">EARLY ENTRY</span>}
          </div>
        </div>

        {norm.tags?.length>0&&(
          <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginTop:"8px"}}>
            {norm.tags.map(t=><span key={t} style={{fontSize:"10px",padding:"2px 8px",background:"var(--elevated)",borderRadius:"4px",color:"var(--tx3)"}}>{t}</span>)}
          </div>
        )}
      </div>

      {/* Quick status */}
      {norm.beanLocation!=="empty"&&(
        <div className="btn-quick-row" style={{paddingTop:"12px"}}>
          <button className="btn-quick btn-empty" onClick={()=>onQuickStatus(d.id,{beanLocation:"empty"})}>✓ Mark Empty</button>
          {norm.dialStatus!=="abandoned"&&<button className="btn-quick btn-abandon" onClick={()=>onQuickStatus(d.id,{dialStatus:"abandoned",beanLocation:"empty"})}>✕ Abandon</button>}
        </div>
      )}

      {/* Grind strip */}
      <div className="sec"><span className="sec-title">Grind</span></div>
      <div className="gs">
        {[["he","HOME ESPR"],["oe","OFFC ESPR"],["hp","HOME POUR"],["op","OFFC POUR"]].map(([key,lbl])=>(
          <div key={key} className="gs-cell">
            <div className="gs-label">{lbl}</div>
            {grindGrid[key]
              ? <><div className="gs-num">{grindGrid[key]}</div><div className="gs-grinder">{allEntries.find(e=>KIT_GRID[e.kitId]===key)?.grinder||""}</div></>
              : <div style={{fontSize:"16px",color:"var(--tx3)",opacity:.3,marginTop:"4px"}}>—</div>
            }
          </div>
        ))}
      </div>

      {/* Recipes */}
      {(esprEntry||pourEntry)&&<>
        <div className="sec"><span className="sec-title">Brew Recipes</span></div>
        <div className="recipe-split">
          {esprEntry&&(()=>{const re=esprEntry;const rr=re.doseIn&&re.yieldOut?ratio(re.doseIn,re.yieldOut):null;const t=tempDisp(re.temperature,settings?.tempUnit);return(
            <div className="recipe-block">
              <div className="recipe-title" style={{color:"var(--accent)"}}>Espresso</div>
              {t&&<div className="recipe-stat"><div className="recipe-val">{t}</div><div className="recipe-lbl">Temp</div></div>}
              {re.doseIn>0&&re.yieldOut>0&&<div className="recipe-stat"><div className="recipe-val">{re.doseIn}→{re.yieldOut}g</div><div className="recipe-lbl">Dose → Yield</div></div>}
              {rr&&<div className="recipe-stat"><div className="recipe-val">{rr}</div><div className="recipe-lbl">Ratio</div></div>}
              {re.timeSeconds>0&&<div className="recipe-stat"><div className="recipe-val">{re.timeSeconds}s</div><div className="recipe-lbl">Time</div></div>}
            </div>
          );})()}
          {pourEntry&&(()=>{const rp=pourEntry;const rr=rp.doseIn&&rp.yieldOut?ratio(rp.doseIn,rp.yieldOut):null;const t=tempDisp(rp.temperature,settings?.tempUnit);return(
            <div className="recipe-block">
              <div className="recipe-title" style={{color:"var(--teal)"}}>Pour Over</div>
              {t&&<div className="recipe-stat"><div className="recipe-val">{t}</div><div className="recipe-lbl">Temp</div></div>}
              {rp.doseIn>0&&rp.yieldOut>0&&<div className="recipe-stat"><div className="recipe-val">{rp.doseIn}→{rp.yieldOut}g</div><div className="recipe-lbl">Coffee → Water</div></div>}
              {rr&&<div className="recipe-stat"><div className="recipe-val">{rr}</div><div className="recipe-lbl">Ratio</div></div>}
              {rp.timeSeconds>0&&<div className="recipe-stat"><div className="recipe-val">{secToMSS(rp.timeSeconds)}</div><div className="recipe-lbl">Total Time</div></div>}
              {rp.filterPours?.length>0&&<PourPhasesDisplay phases={rp.filterPours}/>}
            </div>
          );})()}
        </div>
      </>}

      {/* Coffee Info */}
      <div className="sec"><span className="sec-title">Coffee Info</span></div>
      <div className="det-info-grid">
        {[["Origin",`${d.origin||""}${d.region?` · ${d.region}`:""}`],["Process",d.process],["Roast",d.roastLevel],["Brewed as",(norm.brewMethods||[]).join(" · ")],["Roast Date",norm.roastDate?fmt(norm.roastDate):null],["Flavour",d.flavorNotes]].filter(([,v])=>v&&String(v).trim()).map(([lbl,val])=>(
          <div key={lbl} className="det-info-cell">
            <div className="det-info-label">{lbl}</div>
            <div className="det-info-val">{val}</div>
          </div>
        ))}
      </div>

      {norm.notes&&<><div className="sec"><span className="sec-title">My Notes</span></div><div className="det-notes">"{norm.notes}"</div></>}

      {norm.coffeeDescription&&<>
        <div className="sec"><span className="sec-title">About this Coffee</span></div>
        <div className="about-block">{norm.coffeeDescription}</div>
        {norm.coffeeUrl&&<div style={{padding:"0 18px 20px"}}><a href={norm.coffeeUrl} target="_blank" rel="noopener" style={{display:"inline-flex",alignItems:"center",gap:"6px",fontSize:"12px",color:"var(--accent)",textDecoration:"none",border:"1px solid var(--border)",borderRadius:"7px",padding:"7px 12px"}}>View coffee page 🔗</a></div>}
      </>}
    </div>
  );
}

// ── ADD DIAL-IN ───────────────────────────────────────────────────────────────
function AddDialIn({kits, dialins, onSave, nav, settings}) {
  const today=new Date().toISOString().split("T")[0];
  const defKits=settings?.defaultKits||[];
  const [f,setF]=useState({date:today,selectedKits:defKits,coffeeName:"",roaster:"",origin:"",region:"",process:"Washed",roastLevel:"Light",brewMethods:[],roastDate:"",flavorNotes:"",grindSetting:"",grinder:"",doseIn:"",yieldOut:"",timeSeconds:"",temperature:"",rating:0,dialStatus:"dialing",experimenting:false,dialEase:null,dialStability:null,beanLocation:"shelf",frozenDate:"",wouldBuy:false,isChoice:false,isEarlyEntry:false,tags:[],filterPours:[],coffeeUrl:"",coffeeDescription:"",notes:""});
  const [fetching,setFetching]=useState(false);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleTag=t=>s("tags",f.tags.includes(t)?f.tags.filter(x=>x!==t):[...f.tags,t]);
  const toggleBrew=m=>s("brewMethods",f.brewMethods.includes(m)?f.brewMethods.filter(x=>x!==m):[...f.brewMethods,m]);
  const toggleKit=id=>s("selectedKits",f.selectedKits.includes(id)?f.selectedKits.filter(x=>x!==id):[...f.selectedKits,id]);
  const r=f.doseIn&&f.yieldOut?ratio(+f.doseIn,+f.yieldOut):null;
  const hasFilter=f.brewMethods.includes("Pour Over")||f.brewMethods.includes("French Press");
  const addPhase=()=>setF(p=>({...p,filterPours:[...p.filterPours,{phase:p.filterPours.length+1,targetGrams:"",startSeconds:""}]}));
  const removePhase=i=>setF(p=>({...p,filterPours:p.filterPours.filter((_,j)=>j!==i).map((ph,j)=>({...ph,phase:j+1}))}));
  const updatePhase=(i,k,v)=>setF(p=>({...p,filterPours:p.filterPours.map((ph,j)=>j===i?{...ph,[k]:v}:ph)}));
  const fetchDesc=async()=>{
    if(!f.coffeeUrl.trim())return;setFetching(true);
    try{const res=await fetch(`https://corsproxy.io/?${encodeURIComponent(f.coffeeUrl)}`);const html=await res.text();const doc=new DOMParser().parseFromString(html,"text/html");const desc=doc.querySelector('meta[property="og:description"]')?.content||doc.querySelector('meta[name="description"]')?.content||"";const title=doc.querySelector('meta[property="og:title"]')?.content||doc.querySelector('title')?.textContent||"";if(desc||title)s("coffeeDescription",[title,desc].filter(Boolean).join("\n"));}catch(e){}
    setFetching(false);
  };
  const kitOptions=[{id:"home-espresso",label:"HOME · ESPR"},{id:"home-pour-over",label:"HOME · POUR"},{id:"home-french-press",label:"HOME · FRPR"},{id:"office-espresso",label:"OFFC · ESPR"},{id:"office-pour-over",label:"OFFC · POUR"},{id:"office-french-press",label:"OFFC · FRPR"}];
  const save=()=>{
    if(!f.coffeeName||!f.selectedKits.length)return;
    const base={...f,doseIn:+f.doseIn,yieldOut:+f.yieldOut,timeSeconds:+f.timeSeconds,temperature:+f.temperature,filterPours:f.filterPours.filter(p=>p.targetGrams).map(p=>({phase:p.phase,targetGrams:+p.targetGrams,startSeconds:String(p.startSeconds).includes(":")?mssToSec(p.startSeconds):+p.startSeconds||0}))};
    delete base.selectedKits;
    const entries=f.selectedKits.map(kitId=>({...base,id:uid(),kitId,grinder:kits.find(k=>k.id===kitId)?.equipment.find(e=>e.category==="Grinder")?.name||f.grinder}));
    onSave(entries);
  };
  return (
    <div className="screen fade-in">
      <div className="det-topbar"><button className="icon-btn" onClick={()=>nav("home")}>←</button><div style={{flex:1,fontFamily:"'Cormorant Garamond',serif",fontSize:"20px",fontWeight:500}}>New Dial-In</div></div>
      <div className="sec"><span className="sec-title">Coffee *</span></div>
      <div className="f-grp"><label className="f-lbl">Coffee Name *</label><input className="f-in" placeholder="e.g. Ethiopia Yirgacheffe" value={f.coffeeName} onChange={e=>s("coffeeName",e.target.value)}/></div>
      <div className="f-grp"><label className="f-lbl">Roaster</label><input className="f-in" placeholder="e.g. Kmen" value={f.roaster} onChange={e=>s("roaster",e.target.value)}/></div>
      <div className="f-grp"><label className="f-lbl">Kits *</label>
        <div className="opt-chips">{kitOptions.map(({id,label})=><div key={id} className={`opt-chip${f.selectedKits.includes(id)?" opt-chip-on":""}`} onClick={()=>toggleKit(id)} style={{fontFamily:"'DM Mono',monospace",fontSize:"11px"}}>{label}</div>)}</div>
      </div>
      <div className="f-grp"><label className="f-lbl">Brew Methods *</label>
        <div className="opt-chips">{BREW_METHODS.map(m=><div key={m} className={`opt-chip${f.brewMethods.includes(m)?" opt-chip-on":""}`} onClick={()=>toggleBrew(m)}>{m==="Espresso"?"ESPR":m==="Pour Over"?"POUR":"FRPR"}</div>)}</div>
      </div>
      <div className="sec"><span className="sec-title">Details</span></div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Origin</label><input className="f-in" placeholder="Ethiopia" value={f.origin} onChange={e=>s("origin",e.target.value)}/></div>
        <div className="f-grp"><label className="f-lbl">Region</label><input className="f-in" placeholder="Yirgacheffe" value={f.region} onChange={e=>s("region",e.target.value)}/></div>
      </div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Process</label><select className="f-sel" value={f.process} onChange={e=>s("process",e.target.value)}>{PROCESSES.map(o=><option key={o}>{o}</option>)}</select></div>
        <div className="f-grp"><label className="f-lbl">Roast</label><select className="f-sel" value={f.roastLevel} onChange={e=>s("roastLevel",e.target.value)}>{ROASTS.map(o=><option key={o}>{o}</option>)}</select></div>
      </div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Roast Date</label><input className="f-in" type="date" value={f.roastDate} onChange={e=>s("roastDate",e.target.value)}/></div>
        <div className="f-grp"><label className="f-lbl">Bean Location</label><select className="f-sel" value={f.beanLocation} onChange={e=>s("beanLocation",e.target.value)}>{BEAN_LOCS.map(o=><option key={o} value={o}>{o.charAt(0).toUpperCase()+o.slice(1)}</option>)}</select></div>

function EditKit({kit, onSave, nav}) {

      ))}
      <div style={{padding:"0 18px 14px"}}><button className="btn btn-s" onClick={addEq}>+ Add Equipment</button></div>
      <div className="btn-area"><button className="btn btn-p" onClick={save}>Save Kit</button><button className="btn btn-s" onClick={()=>nav("kit",kit)}>Cancel</button></div>
    </div>
  );
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function SettingsScreen({nav, syncing, onSync, dialins, settings}) {
  const dupCount=useMemo(()=>groupDuplicates(dialins).length,[dialins]);
  const incCount=useMemo(()=>dialins.filter(d=>!d.grindSetting||!d.brewMethods?.length||!d.roastDate).length,[dialins]);
  const rows=[
    {id:"settings-kits",    ico:"⚙", bg:"rgba(200,120,64,0.1)",  color:"var(--accent)", title:"Kits",        sub:"6 brewing setups"},
    {id:"settings-github",  ico:"⟳", bg:"rgba(90,112,152,0.1)",  color:"var(--blue)",   title:"GitHub Sync", sub:settings?.owner&&settings?.repo?`${settings.owner}/${settings.repo}`:"Not connected"},
    {id:"settings-controls",ico:"⊞", bg:"rgba(90,136,96,0.1)",   color:"var(--green)",  title:"Controls",    sub:"Defaults, units, thresholds"},
    {id:"settings-data",    ico:"◈", bg:dupCount>0||incCount>0?"rgba(200,120,64,0.1)":"rgba(90,136,96,0.1)",color:dupCount>0||incCount>0?"var(--accent)":"var(--green)",title:"Data",sub:dupCount>0?`${dupCount} duplicate group${dupCount!==1?"s":""}`:incCount>0?`${incCount} incomplete entr${incCount===1?"y":"ies"}`:"All clean"},
  ];
  return (
    <div className="screen fade-in">
      <div className="topbar">
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"26px",fontWeight:500}}>Settings</span>
        <div className="topbar-actions">
          <button className="icon-btn" onClick={()=>nav("home")}>←</button>
          <button className="icon-btn" onClick={onSync}><span className={syncing?"spin":""}>{syncing?"↻":"⟳"}</span></button>
        </div>
      </div>
      <div style={{padding:"6px 18px 8px",fontSize:"10px",color:"var(--tx3)"}}>v{APP_VERSION}</div>
      <div className="sec"><span className="sec-title">Configuration</span></div>
      {rows.map(r=>(
        <div key={r.id} className="settings-row" onClick={()=>nav(r.id)}>
          <div className="settings-ico" style={{background:r.bg}}><span style={{color:r.color,fontSize:"18px"}}>{r.ico}</span></div>
          <div style={{flex:1}}><div className="settings-title">{r.title}</div><div className="settings-sub">{r.sub}</div></div>
          <span style={{color:"var(--tx3)"}}>›</span>
        </div>
      ))}
    </div>
  );
}

function SettingsKits({kits,nav}) {
  return (
    <div className="screen fade-in">
      <div className="det-topbar"><button className="icon-btn" onClick={()=>nav("settings")}>←</button><div style={{flex:1,fontFamily:"'Cormorant Garamond',serif",fontSize:"20px",fontWeight:500}}>Kits</div></div>
      <div className="sec"><span className="sec-title">My Kits</span></div>
      {kits.map(k=>(
        <div key={k.id} className="settings-row" onClick={()=>nav("kit",k)}>
          <div style={{width:"36px",height:"36px",borderRadius:"9px",background:`${k.color}20`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:"8px",fontWeight:600,color:k.color}}>{k.location==="office"?"OFFC":"HOME"}</span>
          </div>
          <div style={{flex:1}}><div className="settings-title">{k.name}</div><div className="settings-sub">{k.subtitle}</div></div>
          <span style={{color:"var(--tx3)"}}>›</span>
        </div>
      ))}
    </div>

}

function SettingsGitHub({settings, onSave, nav}) {
  const [f,setF]=useState({owner:settings.owner||"",repo:settings.repo||"",token:settings.token||""});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return (
    <div className="screen fade-in">
      <div className="det-topbar"><button className="icon-btn" onClick={()=>nav("settings")}>←</button><div style={{flex:1,fontFamily:"'Cormorant Garamond',serif",fontSize:"20px",fontWeight:500}}>GitHub Sync</div></div>
      <div className="sec"><span className="sec-title">Repository</span></div>
      <div className="f-grp"><label className="f-lbl">Username</label><input className="f-in" placeholder="trynerlu" value={f.owner} onChange={e=>s("owner",e.target.value)}/></div>
      <div className="f-grp"><label className="f-lbl">Repository</label><input className="f-in" placeholder="coffee-dialins" value={f.repo} onChange={e=>s("repo",e.target.value)}/></div>
      <div className="f-grp"><label className="f-lbl">Personal Access Token</label><input className="f-in" type="password" placeholder="ghp_…" value={f.token} onChange={e=>s("token",e.target.value)}/><div className="f-hint">Required for writing. Leave empty for read-only.</div></div>
      <div className="btn-area"><button className="btn btn-p" onClick={()=>onSave({...settings,...f})} disabled={!f.owner||!f.repo}>Save & Connect</button></div>
      <div style={{padding:"0 18px 20px"}}><div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"9px",padding:"14px",fontFamily:"'DM Mono',monospace",fontSize:"11px",color:"var(--tx2)",lineHeight:"1.9"}}>your-repo/<br/>├── index.html<br/>├── kits.json<br/>├── dialins.json<br/>└── questions.json</div></div>
    </div>
  );
}

function SettingsControls({settings, onSave, kits, nav}) {
  const [f,setF]=useState({defaultKits:settings.defaultKits||[],grindFormat:settings.grindFormat||"decimal",tempUnit:settings.tempUnit||"C"});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleKit=id=>s("defaultKits",f.defaultKits.includes(id)?f.defaultKits.filter(x=>x!==id):[...f.defaultKits,id]);
  const kitOpts=[{id:"home-espresso",label:"HOME · ESPR"},{id:"home-pour-over",label:"HOME · POUR"},{id:"home-french-press",label:"HOME · FRPR"},{id:"office-espresso",label:"OFFC · ESPR"},{id:"office-pour-over",label:"OFFC · POUR"},{id:"office-french-press",label:"OFFC · FRPR"}];
  return (
    <div className="screen fade-in">
      <div className="det-topbar"><button className="icon-btn" onClick={()=>nav("settings")}>←</button><div style={{flex:1,fontFamily:"'Cormorant Garamond',serif",fontSize:"20px",fontWeight:500}}>Controls</div></div>
      <div className="sec"><span className="sec-title">Add Form Defaults</span></div>
      <div className="f-grp"><label className="f-lbl">Default Kits</label><div className="opt-chips">{kitOpts.map(({id,label})=><div key={id} className={`opt-chip${f.defaultKits.includes(id)?" opt-chip-on":""}`} onClick={()=>toggleKit(id)} style={{fontFamily:"'DM Mono',monospace",fontSize:"11px"}}>{label}</div>)}</div></div>
      <div className="sec"><span className="sec-title">Display</span></div>
      <div className="f-grp"><label className="f-lbl">Temperature Unit</label><div className="opt-chips">{["C","F"].map(u=><div key={u} className={`opt-chip${f.tempUnit===u?" opt-chip-on":""}`} onClick={()=>s("tempUnit",u)}>°{u}</div>)}</div></div>
      <div className="f-grp"><label className="f-lbl">Grind Format</label><div className="opt-chips"><div className={`opt-chip${f.grindFormat==="decimal"?" opt-chip-on":""}`} onClick={()=>s("grindFormat","decimal")}>Decimal (12.5)</div><div className={`opt-chip${f.grindFormat==="integer"?" opt-chip-on":""}`} onClick={()=>s("grindFormat","integer")}>Integer (12)</div></div></div>
      <div className="btn-area"><button className="btn btn-p" onClick={()=>onSave({...settings,...f})}>Save Controls</button></div>
    </div>
  );
}

function SettingsData({dialins, onRemove, nav}) {
  const dupGroups=useMemo(()=>groupDuplicates(dialins),[dialins]);
  const incomplete=useMemo(()=>dialins.filter(d=>!d.grindSetting||!d.brewMethods?.length||!d.roastDate),[dialins]);
  return (
    <div className="screen fade-in">
      <div className="det-topbar"><button className="icon-btn" onClick={()=>nav("settings")}>←</button><div style={{flex:1,fontFamily:"'Cormorant Garamond',serif",fontSize:"20px",fontWeight:500}}>Data</div></div>
      <div className="sec"><span className="sec-title">Duplicates</span></div>
      {dupGroups.length===0
        ? <div style={{padding:"10px 18px",fontSize:"13px",color:"var(--tx3)"}}>✓ No duplicates found</div>
        : dupGroups.map((group,gi)=>(
          <div key={gi} style={{margin:"0 18px 10px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:"12px",overflow:"hidden"}}>
            <div style={{padding:"10px 16px",borderBottom:"1px solid var(--border)",background:"var(--elevated)"}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"15px",fontWeight:500}}>{group[0].coffeeName}</div>
              <div style={{fontSize:"10px",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--accent)",marginTop:"2px"}}>{group[0].roaster}</div>
            </div>
            {[...group].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map((d,di,arr)=>(
              <div key={d.id} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 16px",borderBottom:di<arr.length-1?"1px solid var(--border)":"none"}}>
                <div style={{flex:1}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:"var(--tx3)"}}>{fmt(d.date)}</div><div style={{display:"flex",gap:"7px",alignItems:"center",marginTop:"3px"}}>{d.grindSetting&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:"14px",color:"var(--accent)"}}>{shortGrind(d.grindSetting)}</span>}{d.dialStatus&&<span className={`badge b-${d.dialStatus}`} style={{fontSize:"9px"}}>{d.dialStatus.toUpperCase()}</span>}</div></div>
                <button onClick={()=>onRemove(d.id)} style={{background:"var(--red-d)",border:"1px solid rgba(160,80,80,.3)",color:"var(--red)",borderRadius:"7px",padding:"6px 11px",cursor:"pointer",fontSize:"12px",fontFamily:"'Jost',sans-serif",fontWeight:500}}>Remove</button>
              </div>
            ))}
          </div>
        ))
      }
      <div className="sec"><span className="sec-title">Incomplete Entries</span></div>
      {incomplete.length===0
        ? <div style={{padding:"10px 18px",fontSize:"13px",color:"var(--tx3)"}}>✓ All entries complete</div>
        : incomplete.map(d=>(
          <div key={d.id} onClick={()=>nav("editdialin",d)} style={{margin:"0 18px 6px",padding:"12px 16px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px"}}>
            <div style={{flex:1}}><div style={{fontSize:"10px",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--accent)",marginBottom:"2px"}}>{d.roaster}</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"14px"}}>{d.coffeeName}</div></div>
            <div style={{display:"flex",gap:"4px",flexWrap:"wrap",alignItems:"center"}}>
              {!d.grindSetting&&<span className="badge b-dialing" style={{fontSize:"8px"}}>NO GRIND</span>}
              {!d.brewMethods?.length&&<span className="badge b-dialing" style={{fontSize:"8px"}}>NO BREW</span>}
              {!d.roastDate&&<span className="badge b-dialing" style={{fontSize:"8px"}}>NO DATE</span>}
              <span style={{color:"var(--tx3)",fontSize:"14px"}}>›</span>
            </div>
          </div>
        ))
      }
    </div>
  );
}

    <div className="splash">
      <div className="splash-title">Dial-In</div>
      <div className="splash-sub">Loading your setup</div>
      <div className="splash-bar"/>

}

const DEFAULT_PALATE = `Pour Over — what I love
Floral, tea-like, jasmine-forward light roasts. Bergamot, white grapes, white tea, honey. Washed process almost exclusively. Costa Rica and Ethiopia as top origins.

Espresso — what I love
Well-structured, expressive with fruit character or sweet stone fruit notes. Caramel, panela. Easy to dial, stable. Costa Rica and reliable blends earn their place.

What doesn't work
Difficult, unstable espressos. Flat chocolate profiles. Very dark commercial roasts.

Quick reference
✓ Light–medium · washed · Costa Rica · Ethiopia
✓ Jasmine / bergamot / white tea / stone fruit
✗ Unstable espressos · flat chocolate · dark roasts`;

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const [ready,       setReady]     = useState(false);
  const [screen,      setScreen]    = useState("home");
  const [listScreen,  setListScreen]= useState("home");
  const [curKit,      setCurKit]    = useState(null);
  const [curDial,     setCurDial]   = useState(null);
  const [kits,        setKits]      = useState(DEF_KITS);
  const [dialins,     setDialins]   = useState([]);
  const [questions,   setQuestions] = useState([]);
  const [syncing,     setSyncing]   = useState(false);
  const [toast,       setToast]     = useState(null);
  const [lastSync,    setLastSync]  = useState(null);
  const [settings,    setSettings]  = useState(()=>lsGet(LS.settings)||{});

  // Quiz state
  const [quizState, setQuizState] = useState(()=>{
    const saved=lsGet(LS.quiz)||{};
    return {currentIdx:0,answered:saved.answered||{},history:saved.history||[]};
  });

  useEffect(()=>{
    const ck=lsGet(LS.kits),cd=lsGet(LS.dialins);
    if(ck) setKits(ck);
    if(cd) setDialins(cd);
    setReady(true);
    const s=lsGet(LS.settings)||{};
    if(s.owner&&s.repo&&navigator.onLine) autoSync(s,ck,cd);
    // Load questions from repo if available
    if(s.owner&&s.repo) loadQuestions(s);
    const onVisible=()=>{
      if(document.visibilityState==="visible"){
        const sv=lsGet(LS.settings)||{};
        if(sv.owner&&sv.repo&&navigator.onLine){autoSync(sv,lsGet(LS.kits),lsGet(LS.dialins));loadQuestions(sv);}
      }
    };
    document.addEventListener("visibilitychange",onVisible);
    return ()=>document.removeEventListener("visibilitychange",onVisible);
  },[]);

  const loadQuestions=async(s)=>{
    try {
      const r=await fetch(`https://raw.githubusercontent.com/${s.owner}/${s.repo}/main/questions.json?_=${Date.now()}`);
      if(r.ok){const qs=await r.json();if(Array.isArray(qs)&&qs.length)setQuestions(qs);}
    }catch(e){}
  };

  const autoSync=async(s,lk,ld)=>{
    try {
      const [rk,rd]=await Promise.all([ghRead(s,"kits.json").catch(()=>null),ghRead(s,"dialins.json").catch(()=>null)]);
      const localMod=lsGet("ca_lastModified")||0;
      if(rk&&rk.data&&JSON.stringify(rk.data)!==JSON.stringify(lk)&&rk.ts>=localMod){setKits(rk.data);lsSet(LS.kits,rk.data);}
      if(rd&&rd.data&&rd.ts>localMod){setDialins(rd.data);lsSet(LS.dialins,rd.data);}
      setLastSync(new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
    }catch(e){}
  };

  const flash=(msg,ms=2800)=>{setToast(msg);setTimeout(()=>setToast(null),ms);};

  const syncPull=async()=>{
    if(!settings.owner||!settings.repo){flash("⚠ Configure GitHub in Settings");setScreen("settings");return;}
    setSyncing(true);
    try {
      const [k,d]=await Promise.all([ghRead(settings,"kits.json"),ghRead(settings,"dialins.json")]);
      setKits(k.data);lsSet(LS.kits,k.data);
      setDialins(d.data);lsSet(LS.dialins,d.data);
      if(d.ts)lsSet("ca_lastModified",d.ts);
      setLastSync(new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
      await loadQuestions(settings);
      flash("✓ Synced from GitHub");
    }catch(e){flash(`✗ ${e.message}`);}
    setSyncing(false);
  };

  const saveSettings=async(s)=>{
    setSettings(s);lsSet(LS.settings,s);flash("✓ Settings saved — syncing…");
    setSyncing(true);
    try {
      const [k,d]=await Promise.all([ghRead(s,"kits.json"),ghRead(s,"dialins.json")]);
      setKits(k.data);lsSet(LS.kits,k.data);setDialins(d.data);lsSet(LS.dialins,d.data);
      if(d.ts)lsSet("ca_lastModified",d.ts);
      setLastSync(new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
      await loadQuestions(s);flash("✓ Connected & synced");
    }catch(e){flash(`⚠ Settings saved. Sync failed: ${e.message}`);}
    setSyncing(false);
  };

  const nav=(to,data=null,from=null)=>{
    if(from==="home"||from==="logbook") setListScreen(from);
    if(to==="kit"&&data)        setCurKit(data);
    if(to==="dialin"&&data)     setCurDial(data);
    if(to==="editdialin"&&data) setCurDial(data);
    setScreen(to);
  };

  const editDialin=(d)=>{setCurDial(d);setScreen("editdialin");};
  const editKit   =(k)=>{setCurKit(k);setScreen("editkit");};

  const quickStatus=async(id,patch)=>{
    const current=dialins.find(d=>d.id===id);
    if(current?.beanLocation==="frozen"&&patch.beanLocation&&patch.beanLocation!=="frozen"){patch.thawDate=new Date().toISOString().split("T")[0];flash("❄ Thawed — wait 12–24h before opening",5000);}
    const updated=dialins.map(d=>d.id===id?{...d,...patch}:d);
    setDialins(updated);lsSet(LS.dialins,updated);lsSet("ca_lastModified",Date.now());
    if(curDial?.id===id)setCurDial(p=>({...p,...patch}));
    if(settings.token){try{await ghWrite(settings,"dialins.json",updated);flash("✓ Updated");}catch(e){flash(`⚠ Saved locally. GitHub: ${e.message}`);}}
    else flash("✓ Saved locally");
  };

  const saveDialin=async(updated)=>{
    const newList=dialins.map(d=>d.id===updated.id?updated:d);
    setDialins(newList);lsSet(LS.dialins,newList);lsSet("ca_lastModified",Date.now());
    setCurDial(updated);
    if(settings.token){try{await ghWrite(settings,"dialins.json",newList);flash("✓ Saved");}catch(e){flash(`⚠ Saved locally. GitHub: ${e.message}`);}}
    else flash("✓ Saved locally");
    setScreen("dialin");
  };

  const addDialins=async(entries)=>{
    const updated=[...entries,...dialins];
    setDialins(updated);lsSet(LS.dialins,updated);lsSet("ca_lastModified",Date.now());
    if(settings.token){try{await ghWrite(settings,"dialins.json",updated);flash(`✓ ${entries.length>1?entries.length+" entries":"Dial-in"} saved`);}catch(e){flash(`⚠ Saved locally. GitHub: ${e.message}`);}}
    else flash("✓ Saved locally");
    setScreen("home");
  };

  const saveKit=async(updated)=>{
    const newList=kits.map(k=>k.id===updated.id?updated:k);
    setKits(newList);lsSet(LS.kits,newList);setCurKit(updated);
    if(settings.token){try{await ghWrite(settings,"kits.json",newList);flash("✓ Kit saved");}catch(e){flash(`⚠ Saved locally. GitHub: ${e.message}`);}}
    else flash("✓ Kit saved locally");
    setScreen("kit");
  };

  const removeDialin=async(id)=>{
    const updated=dialins.filter(d=>d.id!==id);
    setDialins(updated);lsSet(LS.dialins,updated);lsSet("ca_lastModified",Date.now());
    if(settings.token){try{await ghWrite(settings,"dialins.json",updated);flash("✓ Removed");}catch(e){flash(`⚠ Removed locally. GitHub: ${e.message}`);}}
    else flash("✓ Removed locally");
  };

  // Quiz handlers
  const onQuizAnswer=(qid,selected)=>{
    const q=questions.find(x=>x.id===qid);
    if(!q)return;
    const correct=selected===q.a;
    const newAnswered={...quizState.answered,[qid]:{selected,correct}};
    const newHistory=[...quizState.history,{qid,correct,date:new Date().toISOString()}];
    const ns={...quizState,answered:newAnswered,history:newHistory};
    setQuizState(ns);
    lsSet(LS.quiz,{answered:newAnswered,history:newHistory});
  };
  const onQuizNext=()=>{
    setQuizState(s=>({...s,currentIdx:s.currentIdx+1}));
  };

  const DETAIL_SCREENS=["dialin","editdialin","kit","editkit","add","settings","settings-kits","settings-github","settings-controls","settings-data","quiz"];
  const isDetail=DETAIL_SCREENS.includes(screen);
  if(!ready) return <Splash/>;

  const sharedProps={kits,dialins,nav,settings};
  const views={
    home:    <HomeScreen {...sharedProps} onSync={syncPull} syncing={syncing} lastSync={lastSync} questions={questions} quizState={quizState} onQuizAnswer={onQuizAnswer} onQuizNext={onQuizNext}/>,
    logbook: <LogbookScreen {...sharedProps}/>,
    add:     <AddDialIn {...sharedProps} onSave={addDialins}/>,
    dialin:  <DialInDetail d={curDial} kits={kits} dialins={dialins} nav={nav} onEdit={editDialin} listScreen={listScreen} settings={settings} onQuickStatus={quickStatus}/>,
    editdialin:<EditDialIn d={curDial} kits={kits} onSave={saveDialin} nav={nav} settings={settings}/>,
    kit:     <KitScreen kit={curKit} dialins={dialins} kits={kits} nav={nav} onEditKit={editKit}/>,
    editkit: <EditKit kit={curKit} onSave={saveKit} nav={nav}/>,
    settings:<SettingsScreen nav={nav} syncing={syncing} onSync={syncPull} dialins={dialins} settings={settings}/>,
    "settings-kits":    <SettingsKits kits={kits} nav={nav}/>,
    "settings-github":  <SettingsGitHub settings={settings} onSave={saveSettings} nav={nav}/>,
    "settings-controls":<SettingsControls settings={settings} onSave={saveSettings} kits={kits} nav={nav}/>,
    "settings-data":    <SettingsData dialins={dialins} onRemove={removeDialin} nav={nav}/>,
    quiz:    <QuizFullScreen questions={questions} nav={nav}/>,
  };

  return (
    <div>
      {views[screen]||views.home}
      {!isDetail&&(
        <nav className="bnav">
          {[{id:"home",ico:"⌂",lbl:"Home"},{id:"logbook",ico:"◉",lbl:"Logbook"}].map(item=>(
            <button key={item.id} className={`nav-btn${screen===item.id?" nav-btn-on":""}`} onClick={()=>setScreen(item.id)}>
              <span className="nav-ico">{item.ico}</span>
              <span className="nav-lbl">{item.lbl}</span>
            </button>
          ))}
        </nav>
      )}
      {syncing&&!toast&&<div className="toast">↻ Syncing…</div>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
