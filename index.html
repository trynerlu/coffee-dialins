    html,body { height:100%; background:var(--bg); color:var(--tx1); font-family:'Jost',sans-serif; font-weight:400; -webkit-font-smoothing:antialiased; overscroll-behavior:none; }

      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); opacity:.5; }
    #root { height:100%; }

    .screen { min-height:100vh; max-width:480px; margin:0 auto; padding-bottom:88px; }
    .fade-in { animation:fadeIn .22s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

    /* Header */
    .hdr { position:sticky; top:0; z-index:100; background:rgba(12,5,1,.95); backdrop-filter:blur(18px); border-bottom:1px solid var(--border); padding:14px 18px; display:flex; align-items:center; gap:10px; }
    .hdr-title { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:500; letter-spacing:.02em; flex:1; }
    .hdr-sub { font-size:10px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--tx2); margin-top:1px; }
    .icon-btn { width:34px; height:34px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--tx2); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; font-size:20px; flex-shrink:0; }
    .icon-btn:hover { border-color:var(--bh); color:var(--tx1); }
    .sort-sel { background:var(--surface); border:1px solid var(--border); border-radius:7px; color:var(--tx2); font-family:'Jost',sans-serif; font-size:11px; padding:5px 8px; outline:none; cursor:pointer; flex-shrink:0; }
    .sort-sel option { background:var(--elevated); }

    .sec { padding:20px 18px 8px; font-size:9px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--tx3); display:flex; align-items:center; gap:8px; }
    .sec::after { content:''; flex:1; height:1px; background:var(--border); }

    /* Equipment */
    .eq-row { display:flex; align-items:flex-start; gap:14px; padding:12px 18px; border-bottom:1px solid var(--border); }
    .eq-cat { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); min-width:90px; margin-top:2px; }
    .eq-name { font-size:14px; font-weight:500; }
    .eq-note { font-size:12px; color:var(--tx2); margin-top:2px; }

    /* Coffee group card */
    .cgc { margin:0 18px 8px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 16px; cursor:pointer; transition:border-color .15s,box-shadow .15s; box-shadow:0 2px 8px rgba(0,0,0,.2); }
    .cgc:hover { border-color:var(--bh); box-shadow:0 4px 16px rgba(0,0,0,.3); }
    .cgc-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; gap:10px; }
    .cgc-roaster { font-size:14px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); margin-bottom:3px; }
    .cgc-name { font-family:'Cormorant Garamond',serif; font-size:14px; font-weight:500; line-height:1.25; color:var(--tx2); }
    .cgc-badges { display:flex; align-items:center; justify-content:space-between; gap:6px; flex-wrap:wrap; }
    .cgc-badges-left { display:flex; gap:5px; flex-wrap:wrap; }
    .cgc-badges-right { display:flex; gap:5px; flex-wrap:wrap; margin-left:auto; }

    /* Grind grid */
    .gg-wrap { flex-shrink:0; }
    .gg { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:0; border:1px solid var(--border); border-radius:7px; overflow:hidden; width:64px; height:42px; }
    .gg-cell { display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:12px; font-weight:500; color:var(--accent); position:relative; background:var(--elevated); }
    .gg-cell:nth-child(1) { border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
    .gg-cell:nth-child(2) { border-bottom:1px solid var(--border); }
    .gg-cell:nth-child(3) { border-right:1px solid var(--border); }
    .gg-cell-empty { color:var(--tx3); font-size:9px; opacity:.35; }
    .gg-label { position:absolute; top:1px; left:2px; font-size:5px; letter-spacing:.04em; color:var(--tx3); font-family:'Jost',sans-serif; font-weight:600; line-height:1; opacity:.7; }

    /* Grind strip (detail page 1×4) */
    .gs { display:grid; grid-template-columns:repeat(4,1fr); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin:0 18px 4px; }
    .gs-cell { padding:12px 6px 10px; text-align:center; border-right:1px solid var(--border); background:var(--elevated); }
    .gs-cell:last-child { border-right:none; }
    .gs-label { font-size:8px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); margin-bottom:6px; }
    .gs-num { font-family:'DM Mono',monospace; font-size:22px; font-weight:500; color:var(--accent); line-height:1; text-shadow:0 0 20px rgba(200,120,64,0.2); }
    .gs-grinder { font-size:9px; color:var(--tx3); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Params split */
    .params-split { display:grid; grid-template-columns:1fr 1fr; gap:1px; margin-top:7px; padding-top:7px; border-top:1px solid var(--border); }
    .params-half { display:flex; flex-wrap:wrap; gap:6px; }
    .params-half-espr { grid-column:1; }
    .params-half-pour { grid-column:2; padding-left:10px; border-left:1px solid var(--border); }
    .param-item { font-family:'DM Mono',monospace; font-size:10px; color:var(--tx2); }
    .param-label { font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); display:block; margin-bottom:1px; }

    /* Compact sub-row (Log expanded) */
    .sub-row { display:flex; align-items:center; gap:8px; padding:9px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .12s; }
    .sub-row:hover { background:var(--elevated); }
    .sub-row:last-child { border-bottom:none; }
    .sub-row-grind { font-family:'DM Mono',monospace; font-size:16px; font-weight:500; color:var(--accent); min-width:36px; }
    .sub-row-date { font-family:'DM Mono',monospace; font-size:10px; color:var(--tx3); margin-left:auto; }

    /* Badges */
    .badge { font-size:10px; font-weight:500; letter-spacing:.05em; padding:3px 7px; border-radius:5px; white-space:nowrap; }
    .b-brew-espr { background:rgba(200,120,64,0.12); color:#C87840; border:1px solid rgba(200,120,64,0.22); font-size:9px; letter-spacing:.08em; }
    .b-brew-pour { background:rgba(90,112,152,0.12); color:#7A9AC0; border:1px solid rgba(90,112,152,0.22); font-size:9px; letter-spacing:.08em; }
    .b-brew-frpr { background:rgba(122,90,138,0.12); color:#AA80C0; border:1px solid rgba(122,90,138,0.22); font-size:9px; letter-spacing:.08em; }
    .b-kit { background:var(--elevated); color:var(--tx2); border:1px solid var(--border); }
    .b-dial-waiting   { background:rgba(90,58,34,0.2); color:var(--tx3); border:1px solid rgba(90,58,34,0.3); }
    .b-dial-dialing   { background:var(--accent-d); color:var(--accent); }
    .b-dial-dialed    { background:var(--green-d); color:var(--green); }
    .b-dial-abandoned { background:var(--red-d); color:var(--red); }
    .b-experimenting  { background:transparent; color:var(--accent); border:1px solid rgba(200,120,64,0.4); }
    .b-ease-easy      { background:var(--green-d); color:var(--green); font-size:9px; }
    .b-ease-medium    { background:var(--accent-d); color:var(--accent); font-size:9px; }
    .b-ease-hard      { background:var(--red-d); color:var(--red); font-size:9px; }
    .b-stab-stable    { background:var(--green-d); color:var(--green); font-size:9px; }
    .b-stab-unstable  { background:var(--red-d); color:var(--red); font-size:9px; }
    .b-bean-shelf     { background:var(--blue-d); color:#7A9AC0; border:1px solid rgba(90,112,152,0.2); font-size:9px; }
    .b-bean-frozen    { background:rgba(90,112,152,0.14); color:#7A9AC0; border:1px solid rgba(90,112,152,0.28); font-size:9px; }
    .b-bean-empty     { background:var(--elevated); color:var(--tx3); font-size:9px; }
    .b-would-buy      { background:rgba(90,136,96,0.14); color:var(--green); font-size:10px; }
    .b-choice         { background:rgba(200,120,64,0.18); color:var(--accent-b); border:1px solid rgba(200,120,64,0.32); }
    .b-early          { background:rgba(120,100,60,0.15); color:#8A7040; border:1px solid rgba(120,100,60,0.25); font-size:9px; }
    .b-process        { background:var(--blue-d); color:var(--blue); }
    .b-roast          { background:rgba(139,78,26,.14); color:#9A6A44; }
    .b-readiness-soon { background:rgba(200,120,64,0.1); color:var(--accent); border:1px solid rgba(200,120,64,0.25); font-size:9px; }
    .b-readiness-ready{ background:var(--green-d); color:var(--green); border:1px solid rgba(90,136,96,0.28); font-size:9px; }

    /* Stars */
    .stars { display:flex; gap:2px; }
    .star-on { color:var(--accent); font-size:12px; }
    .star-off { color:var(--tx3); font-size:12px; }

    /* Search */
    .search-wrap { position:relative; padding:10px 18px; }
    .search-ico { position:absolute; left:32px; top:50%; transform:translateY(-50%); color:var(--tx3); font-size:14px; pointer-events:none; }
    .search-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--tx1); font-family:'Jost',sans-serif; font-size:14px; padding:9px 12px 9px 36px; outline:none; transition:border-color .15s; }
    .search-input:focus { border-color:var(--accent); }

    /* Filter rows */
    .filter-block { padding:0 18px 6px; }
    .filter-label { font-size:9px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--tx3); margin-bottom:5px; }
    .chips { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
    .chips::-webkit-scrollbar { display:none; }
    .chip { flex-shrink:0; padding:5px 11px; border-radius:6px; font-size:11px; font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--tx2); transition:all .15s; }
    .chip-on { background:var(--accent-d); border-color:var(--accent); color:var(--accent); }

    /* Stats */
    .stats { display:flex; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .stat { flex:1; padding:11px 6px; text-align:center; border-right:1px solid var(--border); }
    .stat:last-child { border-right:none; }
    .stat-v { font-family:'DM Mono',monospace; font-size:17px; font-weight:500; color:var(--accent); }
    .stat-v span { font-size:11px; }
    .stat-l { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); margin-top:2px; }

    /* Detail */
    .det-hero { padding:20px 18px 18px; border-bottom:1px solid var(--border); }
    .det-date { font-family:'DM Mono',monospace; font-size:10px; color:var(--tx3); letter-spacing:.08em; margin-bottom:7px; }
    .det-title { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:500; line-height:1.2; margin-bottom:3px; }
    .det-roaster { font-size:22px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
    .det-badge-row { display:flex; align-items:center; justify-content:space-between; gap:6px; flex-wrap:wrap; margin-bottom:6px; }
    .det-badge-left { display:flex; gap:5px; flex-wrap:wrap; }
    .det-badge-right { display:flex; gap:5px; flex-wrap:wrap; margin-left:auto; }
    .det-row { display:flex; gap:14px; padding:8px 0; border-bottom:1px solid var(--border); }
    .det-label { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); min-width:90px; margin-top:2px; }
    .det-val { font-size:13px; color:var(--tx1); flex:1; }
    .det-notes { padding:12px 18px 20px; font-family:'Cormorant Garamond',serif; font-size:16px; font-style:italic; color:var(--tx2); line-height:1.65; }

    /* Recipe blocks */
    .recipe-split { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 18px 16px; }
    .recipe-block { background:var(--elevated); border:1px solid var(--border); border-radius:10px; padding:12px; }
    .recipe-title { font-size:9px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--tx3); margin-bottom:10px; }
    .recipe-stat { margin-bottom:7px; }
    .recipe-val { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; color:var(--tx1); }
    .recipe-lbl { font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--tx3); margin-top:1px; }

    /* Pour phases */
    .phase-list { margin:10px 0 0; }
    .phase-row-d { display:flex; align-items:center; gap:8px; padding:5px 0; border-top:1px solid var(--border); }
    .phase-num { font-family:'DM Mono',monospace; font-size:11px; color:var(--tx3); min-width:16px; }
    .phase-bar { height:3px; background:var(--accent); border-radius:2px; transition:width .3s; opacity:.6; }
    .phase-grams { font-family:'DM Mono',monospace; font-size:12px; font-weight:500; color:var(--tx1); min-width:42px; }
    .phase-time { font-family:'DM Mono',monospace; font-size:11px; color:var(--tx3); margin-left:auto; }

    /* Form */
    .f-grp { margin-bottom:14px; padding:0 18px; }
    .f-lbl { display:block; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tx2); margin-bottom:5px; }
    .f-in,.f-sel,.f-ta { width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:8px; color:var(--tx1); font-family:'Jost',sans-serif; font-size:14px; padding:9px 12px; outline:none; transition:border-color .15s; }
    .f-in:focus,.f-sel:focus,.f-ta:focus { border-color:var(--accent); }
    .f-sel option { background:var(--elevated); }
    .f-ta { resize:vertical; min-height:75px; }
    .f-row { padding:0 18px 14px; display:flex; gap:10px; }
    .f-row .f-grp { flex:1; padding:0; margin-bottom:0; }
    .f-hint { font-size:11px; color:var(--tx3); margin-top:5px; line-height:1.5; }
    .opt-chips { display:flex; gap:7px; flex-wrap:wrap; }
    .opt-chip { padding:6px 13px; border-radius:7px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--input-bg); color:var(--tx2); transition:all .15s; }
    .opt-chip-on { background:var(--accent-d); border-color:var(--accent); color:var(--accent); }
    .star-in { display:flex; gap:5px; }
    .star-btn { background:none; border:none; cursor:pointer; font-size:22px; color:var(--tx3); transition:color .1s,transform .1s; padding:0; }
    .star-btn:hover { transform:scale(1.15); }
    .star-btn-on { color:var(--accent); }
    .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:10px 18px; }
    .toggle-lbl { font-size:13px; color:var(--tx1); }
    .toggle-sub { font-size:11px; color:var(--tx3); margin-top:1px; }
    .toggle-btn { width:40px; height:24px; border-radius:12px; border:none; cursor:pointer; transition:background .2s; position:relative; flex-shrink:0; }
    .toggle-btn::after { content:''; position:absolute; width:18px; height:18px; border-radius:50%; background:#fff; top:3px; transition:left .2s; }
    .toggle-off { background:var(--elevated); }
    .toggle-off::after { left:3px; }
    .toggle-on { background:var(--accent); }
    .toggle-on::after { left:19px; }

    /* Phase builder */
    .phase-builder { margin:0 18px; }
    .phase-build-row { display:flex; align-items:center; gap:6px; margin-bottom:7px; }
    .phase-build-num { font-family:'DM Mono',monospace; font-size:12px; color:var(--tx3); min-width:20px; }
    .phase-build-in { flex:1; background:var(--input-bg); border:1px solid var(--border); border-radius:7px; color:var(--tx1); font-family:'DM Mono',monospace; font-size:13px; padding:7px 10px; outline:none; transition:border-color .15s; }
    .phase-build-in:focus { border-color:var(--accent); }
    .phase-del { background:var(--red-d); border:1px solid rgba(160,80,80,.3); color:var(--red); border-radius:6px; padding:0 9px; height:32px; cursor:pointer; font-size:12px; flex-shrink:0; }

    /* Buttons */
    .btn { border:none; border-radius:9px; padding:12px 18px; font-family:'Jost',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:all .15s; letter-spacing:.04em; width:100%; }
    .btn-p { background:var(--accent); color:#0C0501; }
    .btn-p:hover { background:var(--accent-b); }
    .btn-p:disabled { opacity:.45; cursor:not-allowed; }
    .btn-s { background:var(--elevated); border:1px solid var(--border); color:var(--tx2); }
    .btn-s:hover { border-color:var(--bh); color:var(--tx1); }
    .btn-area { padding:14px 18px; display:flex; flex-direction:column; gap:9px; }
    .fetch-row { display:flex; gap:8px; }
    .fetch-row .f-in { flex:1; }
    .btn-fetch { flex-shrink:0; background:var(--elevated); border:1px solid var(--border); border-radius:8px; color:var(--tx2); font-family:'Jost',sans-serif; font-size:12px; font-weight:500; padding:0 14px; cursor:pointer; transition:all .15s; }
    .btn-fetch:hover { border-color:var(--bh); color:var(--tx1); }
    .btn-fetch:disabled { opacity:.4; cursor:not-allowed; }

    /* Journey */
    .journey-item { margin:0 18px 8px; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; display:flex; align-items:center; gap:12px; }
    .dna-tag { padding:4px 10px; background:var(--surface); border:1px solid var(--border); border-radius:6px; font-size:12px; color:var(--tx2); }
    .flavour-cloud { display:flex; gap:5px; flex-wrap:wrap; padding:0 18px 14px; }
    .palate-card { margin:0 18px 16px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; font-size:13px; color:var(--tx2); line-height:1.75; }
    .palate-edit-ta { width:100%; background:var(--input-bg); border:1px solid var(--accent); border-radius:8px; color:var(--tx1); font-family:'Jost',sans-serif; font-size:13px; padding:12px; outline:none; resize:vertical; min-height:180px; line-height:1.7; }

    /* Activity chart */
    .activity-wrap { padding:0 18px 16px; }

    /* Settings menu */
    .settings-row { margin:0 18px 8px; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; cursor:pointer; display:flex; align-items:center; gap:12px; transition:border-color .15s; }
    .settings-row:hover { border-color:var(--bh); }
    .settings-row-ico { width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:17px; }
    .settings-row-title { font-size:14px; font-weight:500; }
    .settings-row-sub { font-size:11px; color:var(--tx3); margin-top:2px; }

    /* Bottom nav */
    .bnav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:rgba(12,5,1,.95); backdrop-filter:blur(18px); border-top:1px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
    .nav-btn { flex:1; padding:10px 4px 8px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; color:var(--tx3); border:none; background:none; transition:color .15s; position:relative; }
    .nav-btn-on { color:var(--accent); }
    .nav-btn-on::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:20px; height:2px; background:var(--accent); border-radius:1px; }
    .nav-ico { font-size:18px; line-height:1; }
    .nav-lbl { font-size:8px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; }

    /* Empty */
    .empty { text-align:center; padding:60px 18px; }
    .empty-ico { font-size:36px; opacity:.3; margin-bottom:14px; }
    .empty-t { font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--tx2); margin-bottom:7px; }
    .empty-s { font-size:12px; color:var(--tx3); }

    /* Toast */
    .toast { position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:var(--elevated); border:1px solid var(--border); border-radius:9px; padding:11px 18px; font-size:13px; color:var(--tx1); z-index:1000; white-space:nowrap; animation:toastIn .2s ease; box-shadow:0 4px 16px rgba(0,0,0,.4); }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    /* Misc */
    .spin { animation:spin .7s linear infinite; display:inline-block; }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    .div { height:1px; background:var(--border); margin:4px 0; }
    .splash { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200; gap:16px; }
    .splash-title { font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:300; letter-spacing:.06em; color:var(--tx1); }

function getFreshness(roastDate, beanLocation, roastLevel, brewMethods, settings) {

  if (days < 0) return null;
  const methods = brewMethods||[];
  const brewKey = methods.includes("Espresso") ? "espresso" : "filter";
  const level   = roastLevel||"Medium";
  const matrix  = FRESH_MATRIX[level]||FRESH_MATRIX["Medium"];
  const [tf,pe,ge,ae] = (settings?.freshnessOverrides?.[level]?.[brewKey]) || matrix[brewKey];
  if (days < tf)  return {label:"⏳ TOO FRESH", color:"#8A7040", bg:"rgba(120,100,60,0.15)"};
  if (days <= pe) return {label:"✓ PRIME",      color:"var(--green)", bg:"rgba(90,136,96,0.14)"};
  if (days <= ge) return {label:"◷ GOOD",       color:"var(--tx2)", bg:"rgba(154,112,80,0.12)"};
  if (days <= ae) return {label:"⚡ AGING",     color:"var(--accent)", bg:"rgba(200,120,64,0.12)"};
  return              {label:"⚠ PAST PEAK",  color:"var(--red)", bg:"var(--red-d)"};
}

function getReadiness(roastDate, beanLocation, roastLevel, brewMethods, settings) {
  if (!roastDate || beanLocation==="frozen") return null;

  const days = Math.floor((Date.now()-new Date(roastDate))/86400000);
  const brewKey = (brewMethods||[]).includes("Espresso") ? "espresso" : "filter";
  const level   = roastLevel||"Medium";
  const matrix  = FRESH_MATRIX[level]||FRESH_MATRIX["Medium"];
  const [tf,pe] = (settings?.freshnessOverrides?.[level]?.[brewKey]) || matrix[brewKey];
  if (days < tf-2) return null; // too early to care
  if (days < tf)   return {label:"DIAL SOON", cls:"b-readiness-soon"};
  if (days <= pe)  return {label:"READY", cls:"b-readiness-ready"};
  return null;
}

function normalizeDiaLin(d) {
  const base = {

    dialEase:null, dialStability:null,
    filterPours:[],
    coffeeUrl:"", coffeeDescription:"", notes:"",
    ...d
  };
  // Backward compat: old filterPours was a number count
  if (typeof base.filterPours === "number" || !Array.isArray(base.filterPours)) {
    const phases = [];
    if (d.filterBloomGrams > 0) phases.push({phase:1, targetGrams:d.filterBloomGrams||0, startSeconds:0});
    base.filterPours = phases;
  }
  return base;
}

function groupDuplicates(dialins) {
  const key = d => `${(d.coffeeName||"").toLowerCase().trim()}⌀${(d.roaster||"").toLowerCase().trim()}`;
  const groups = {};
  dialins.forEach(d=>{ const k=key(d); if(!groups[k]) groups[k]=[]; groups[k].push(d); });
  return Object.values(groups).filter(g=>g.length>1);
}

function buildCoffeeGroups(dialins) {
  const key = d => `${(d.coffeeName||"").toLowerCase().trim()}⌀${(d.roaster||"").toLowerCase().trim()}`;
  const map = {};
  dialins.map(normalizeDiaLin).forEach(d => {
    const k = key(d);
    if (!map[k]) map[k] = { coffeeName:d.coffeeName, roaster:d.roaster, entries:[] };
    map[k].entries.push(d);
  });
  return Object.values(map);
}

function getGrindGrid(entries) {
  const grid = {he:null,hp:null,oe:null,op:null};
  const pos_order = ["dialed","dialing","waiting","abandoned",""];
  ["he","hp","oe","op"].forEach(pos => {
    const kitIds = Object.entries(KIT_GRID).filter(([,v])=>v===pos).map(([k])=>k);
    const match = entries
      .filter(e=>kitIds.includes(e.kitId)&&e.grindSetting)
      .sort((a,b)=>pos_order.indexOf(a.dialStatus)-pos_order.indexOf(b.dialStatus))[0];
    if (match) grid[pos] = match.grindSetting;
  });
  return grid;
}

function getGrinderName(entries, pos) {
  const kitIds = Object.entries(KIT_GRID).filter(([,v])=>v===pos).map(([k])=>k);
  return entries.find(e=>kitIds.includes(e.kitId))?.grinder||"";
}

function getBestEntry(entries, type) {
  const espKits = ["home-espresso","office-espresso"];
  const pourKits = ["home-pour-over","office-pour-over","home-french-press","office-french-press"];
  const kits = type==="espr" ? espKits : pourKits;
  return entries
    .filter(e=>kits.includes(e.kitId)&&e.doseIn>0)
    .sort((a,b)=>(b.dialStatus==="dialed"?2:1)-(a.dialStatus==="dialed"?2:1))[0]||null;
}

function extractFlavourKeywords(dialins, brewType) {
  const kits = brewType==="espr"
    ? ["home-espresso","office-espresso"]
    : ["home-pour-over","office-pour-over","home-french-press","office-french-press"];
  const counts = {};
  dialins
    .filter(d=>kits.includes(d.kitId)&&d.flavorNotes)
    .forEach(d=>{
      d.flavorNotes.split(",").map(w=>w.trim().toLowerCase()).filter(w=>w.length>2).forEach(w=>{
        counts[w]=(counts[w]||0)+1;
      });
    });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,12);
}

// ── GITHUB API ────────────────────────────────────────────────────────────────
async function ghRead(s, file) {
  const r = await fetch(`https://raw.githubusercontent.com/${s.owner}/${s.repo}/main/${file}?_=${Date.now()}`);
  if (!r.ok) throw new Error(`${file}: HTTP ${r.status}`);
  return r.json();
}
async function ghGetSha(s, file) {
  if (!s.token) return null;
  const r = await fetch(`https://api.github.com/repos/${s.owner}/${s.repo}/contents/${file}?ref=main`,
    { headers:{ Authorization:`Bearer ${s.token}`, Accept:"application/vnd.github+json" } });
  if (!r.ok) return null;
  return (await r.json()).sha||null;
}
async function ghWrite(s, file, data) {
  if (!s.token) throw new Error("No token");
  const api = `https://api.github.com/repos/${s.owner}/${s.repo}/contents/${file}`;
  const hdr = { Authorization:`Bearer ${s.token}`, Accept:"application/vnd.github+json", "Content-Type":"application/json" };
  const sha = await ghGetSha(s,file);
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  const res = await fetch(api,{ method:"PUT", headers:hdr, body:JSON.stringify({
    message:`Update ${file} via Dial-In App v3.1`, content, branch:"main", ...(sha?{sha}:{})
  })});
  if (!res.ok) { const e=await res.json(); throw new Error(e.message); }
}

// ── PARAMS HALF ───────────────────────────────────────────────────────────────
function ParamsHalf({ entry, type, settings }) {
  if (!entry) return null;
  const r = entry.doseIn&&entry.yieldOut ? ratio(entry.doseIn,entry.yieldOut) : null;
  const isEspr = type==="espr";
  const timeStr = isEspr ? (entry.timeSeconds>0?`${entry.timeSeconds}s`:null) : (entry.timeSeconds>0?secToMSS(entry.timeSeconds):null);
  const temp = tempDisp(entry.temperature, settings?.tempUnit);
  return (
    <div className={`params-half ${isEspr?"params-half-espr":"params-half-pour"}`}>
      {temp && <div className="param-item"><span className="param-label">Temp</span>{temp}</div>}
      {entry.doseIn>0&&entry.yieldOut>0 && <div className="param-item"><span className="param-label">{isEspr?"Dose→Yield":"Coffee→Water"}</span>{entry.doseIn}→{entry.yieldOut}g</div>}
      {r && <div className="param-item"><span className="param-label">Ratio</span>{r}</div>}
      {timeStr && <div className="param-item"><span className="param-label">Time</span>{timeStr}</div>}
    </div>
  );
}

          <span className="phase-grams">{p.targetGrams}g</span>
          <span className="phase-time">{secToMSS(p.startSeconds)}</span>
        </div>
      ))}
    </div>
  );
}

// ── COFFEE GROUP CARD ─────────────────────────────────────────────────────────
function CoffeeGroupCard({ group, onExpand, onNavigate, expanded, showRating, settings }) {
  const { coffeeName, roaster, entries } = group;
  const grid   = useMemo(()=>getGrindGrid(entries),[entries]);
  const esprE  = useMemo(()=>getBestEntry(entries,"espr"),[entries]);
  const pourE  = useMemo(()=>getBestEntry(entries,"pour"),[entries]);

  const allBrewMethods = [...new Set(entries.flatMap(e=>e.brewMethods||[]))];
  const allBeanLocs    = [...new Set(entries.map(e=>e.beanLocation).filter(Boolean))];
  const allStatuses    = [...new Set(entries.map(e=>e.dialStatus).filter(Boolean))];

  // Dominant bean location (priority: open > shelf > frozen > empty)
  const locPriority = ["open","shelf","frozen","empty"];
  const domLoc = locPriority.find(l=>allBeanLocs.includes(l));

  // Dominant dial status (priority: dialing > dialed > waiting > abandoned)
  const stPriority = ["dialing","dialed","waiting","abandoned"];
  const domStatus  = stPriority.find(s=>allStatuses.includes(s));

  // Readiness signal
  const rep = entries.find(e=>e.roastDate)||entries[0];
  const readiness = getReadiness(rep?.roastDate, domLoc, rep?.roastLevel, rep?.brewMethods, settings);

  // Freshness from most recent roast date entry
  const freshEntry = [...entries].filter(e=>e.roastDate).sort((a,b)=>b.roastDate.localeCompare(a.roastDate))[0];
  const freshness  = freshEntry ? getFreshness(freshEntry.roastDate, domLoc, freshEntry.roastLevel, freshEntry.brewMethods, settings) : null;

  const hasParams  = (esprE&&esprE.doseIn>0)||(pourE&&pourE.doseIn>0);

  return (
    <div className="cgc">
      {/* Top: identity + grind grid */}
      <div className="cgc-top" onClick={onNavigate}>
        <div style={{flex:1,minWidth:0}}>
          {roaster && <div className="cgc-roaster">{roaster}</div>}
          <div className="cgc-name">{coffeeName}</div>
        </div>
        <GrindGrid grid={grid}/>
      </div>

      {/* Badge row */}
      <div className="cgc-badges" onClick={onNavigate}>
        <div className="cgc-badges-left">
          <KitLocBadges entries={entries}/>
          <BrewBadges brewMethods={allBrewMethods}/>
          {readiness && <span className={`badge ${readiness.cls}`}>{readiness.label}</span>}
        </div>
        <div className="cgc-badges-right">
          {freshness && <span className="badge" style={{background:freshness.bg,color:freshness.color,fontSize:"9px"}}>{freshness.label}</span>}
          <BeanLocationBadge beanLocation={domLoc}/>
          <DialStatusBadge dialStatus={domStatus} experimenting={entries.some(e=>e.experimenting)}/>
          {showRating && entries.some(e=>e.rating>0) && <Stars n={Math.max(...entries.map(e=>e.rating||0))}/>}
        </div>
      </div>

      {/* Params split */}
      {hasParams && (
        <div className="params-split" onClick={onNavigate}>
          <ParamsHalf entry={esprE} type="espr" settings={settings}/>
          <ParamsHalf entry={pourE} type="pour" settings={settings}/>
        </div>
      )}

      {/* Expand control for Log */}
      {onExpand && (
        <div className="group-expand" onClick={e=>{e.stopPropagation();onExpand();}}>
          <span style={{fontSize:"14px",transition:"transform .2s",display:"inline-block",transform:expanded?"rotate(90deg)":"rotate(0deg)",marginLeft:"auto"}}>›</span>
        </div>
      )}
    </div>
  );
}

// Best entry for a group — dialed first, then by recency
function bestGroupEntry(entries) {
  const priority = d => d.dialStatus==="dialed"?3:d.dialStatus==="dialing"?2:d.dialStatus==="waiting"?1:0;
  return [...entries].sort((a,b)=>priority(b)-priority(a)||(b.date||"").localeCompare(a.date||""))[0]||entries[0];
}

// ── ACTIVE SCREEN ─────────────────────────────────────────────────────────────
function ActiveScreen({ kits, dialins, nav, onSync, syncing, lastSync, settings }) {
  const [sort, setSort] = useState("recent");

  const groups = useMemo(()=>{
    const all = buildCoffeeGroups(dialins);
    return all.filter(g=>g.entries.some(e=>["shelf","open","frozen"].includes(e.beanLocation)));
  },[dialins]);

  const sorted = useMemo(()=>[...groups].sort((a,b)=>{
    const newestDate  = g=>[...g.entries].sort((x,y)=>(y.date||"").localeCompare(x.date||""))[0]?.date||"";
    const newestRoast = g=>[...g.entries].filter(e=>e.roastDate).sort((x,y)=>y.roastDate.localeCompare(x.roastDate))[0]?.roastDate||"";
    const bestRating  = g=>Math.max(0,...g.entries.map(e=>e.rating||0));
    if (sort==="rating") return bestRating(b)-bestRating(a);
    if (sort==="roast")  return newestRoast(b).localeCompare(newestRoast(a));
    if (sort==="name")   return (a.coffeeName||"").localeCompare(b.coffeeName||"");
    return newestDate(b).localeCompare(newestDate(a));
  }),[groups,sort]);

  // Prime window soon alert
  const comingSoon = [...new Set(groups.flatMap(g=>g.entries).filter(d=>{
    if (!d.roastDate||d.beanLocation==="frozen"||d.beanLocation==="empty") return false;
    const days=Math.floor((Date.now()-new Date(d.roastDate))/86400000);
    return days>=4&&days<=6;
  }).map(d=>d.coffeeName))];

  return (
    <div className="screen fade-in">
      <div className="hdr">
        <div style={{flex:1}}>
          <div className="hdr-title">Active Coffees</div>
          <div className="hdr-sub">{lastSync?`Synced ${lastSync}`:`${groups.length} active · ${dialins.length} logged`}</div>
        </div>
        <button className="icon-btn" onClick={onSync} title="Sync"><span className={syncing?"spin":""}>{syncing?"↻":"⟳"}</span></button>
      </div>
      <div className="controls-row">
        <div style={{flex:1}}/>
        <select className="sort-sel" value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="recent">Recent</option>
          <option value="roast">Roast Date</option>
          <option value="rating">Rating</option>
          <option value="name">Name</option>
        </select>
      </div>
      {comingSoon.length>0&&<div className="alert-banner alert-green" style={{marginBottom:"4px"}}>✓ Entering prime window: {comingSoon.join(", ")}</div>}
      <div style={{marginTop:"10px"}}>
        {sorted.length===0
          ? <div className="empty"><div className="empty-ico">☕</div><div className="empty-t">No active coffees</div><div className="empty-s">Bags on shelf, open or frozen will appear here</div></div>
          : sorted.map(g=>(
            <CoffeeGroupCard
              key={`${g.coffeeName}⌀${g.roaster}`}
              group={g}
              settings={settings}
              onNavigate={()=>nav("dialin",bestGroupEntry(g.entries),"active")}
            />
          ))
        }
      </div>
    </div>
  );
}

// ── LOGBOOK SCREEN (grouped) ──────────────────────────────────────────────────
function LogbookScreen({ kits, dialins, nav, settings }) {
  const [q,       setQ]       = useState("");
  const [brewF,   setBrewF]   = useState([]);
  const [locF,    setLocF]    = useState([]);
  const [roastF,  setRoastF]  = useState([]);
  const [statusF, setStatusF] = useState("all");
  const [beansF,  setBeansF]  = useState("all");
  const [sort,    setSort]    = useState("recent");
  const [expanded,setExpanded]= useState({});

  const toggleArr = (arr,set,val) => set(arr.includes(val)?arr.filter(x=>x!==val):[...arr,val]);

  const ROAST_KEY = {"Light":"light","Medium-Light":"ml","Medium":"med","Medium-Dark":"md","Dark":"dark"};

  const filteredGroups = useMemo(()=>{
    const all = buildCoffeeGroups(dialins);
    return all.filter(g=>{
      const sm = !q||[g.coffeeName,g.roaster,...g.entries.flatMap(e=>[e.origin,e.process,e.grindSetting,e.flavorNotes])].join(" ").toLowerCase().includes(q.toLowerCase());
      const allBrews   = [...new Set(g.entries.flatMap(e=>e.brewMethods||[]))];
      const allLocs    = g.entries.map(e=>kits.find(k=>k.id===e.kitId)?.location).filter(Boolean);
      const allRoasts  = g.entries.map(e=>ROAST_KEY[e.roastLevel]).filter(Boolean);
      const allStatus  = g.entries.map(e=>e.dialStatus);
      const anyExp     = g.entries.some(e=>e.experimenting);
      const allBeans   = g.entries.map(e=>e.beanLocation);
      const bm = brewF.length===0||(brewF.every(v=>
        (v==="espr"&&allBrews.includes("Espresso"))||(v==="pour"&&allBrews.includes("Pour Over"))||(v==="frpr"&&allBrews.includes("French Press"))
      ));
      const lm = locF.length===0||(locF.every(v=>(v==="home"&&allLocs.includes("home"))||(v==="offc"&&allLocs.includes("office"))));
      const rm = roastF.length===0||roastF.some(v=>allRoasts.includes(v));
      const stm = statusF==="all"||(statusF==="experimenting"?anyExp:allStatus.includes(statusF));
      const blm = beansF==="all"||allBeans.includes(beansF);
      return sm&&bm&&lm&&rm&&stm&&blm;
    }).sort((a,b)=>{
      const d = g=>[...g.entries].sort((x,y)=>(y.date||"").localeCompare(x.date||""))[0]?.date||"";
      const r = g=>[...g.entries].filter(e=>e.roastDate).sort((x,y)=>y.roastDate.localeCompare(x.roastDate))[0]?.roastDate||"";
      if (sort==="rating") return Math.max(0,...b.entries.map(e=>e.rating||0))-Math.max(0,...a.entries.map(e=>e.rating||0));
      if (sort==="name")   return (a.coffeeName||"").localeCompare(b.coffeeName||"");
      if (sort==="roast")  return r(b).localeCompare(r(a));
      return d(b).localeCompare(d(a));
    });
  },[dialins,kits,q,brewF,locF,roastF,statusF,beansF,sort]);

  const MultiRow = ({label,opts,val,set})=>(
    <div className="filter-block">
      <div className="filter-label">{label}</div>
      <div className="chips">{opts.map(([v,l])=><div key={v} className={`chip${val.includes(v)?" chip-on":""}`} onClick={()=>toggleArr(val,set,v)}>{l}</div>)}</div>
    </div>
  );
  const SingleRow = ({label,opts,val,set})=>(
    <div className="filter-block">
      <div className="filter-label">{label}</div>
      <div className="chips">{opts.map(([v,l])=><div key={v} className={`chip${val===v?" chip-on":""}`} onClick={()=>set(v)}>{l}</div>)}</div>
    </div>
  );

  return (
    <div className="screen fade-in">
      <div className="hdr">
        <div style={{flex:1}}>
          <div className="hdr-title">Logbook</div>
          <div className="hdr-sub">{dialins.length} entries · {filteredGroups.length} coffees shown</div>
        </div>
        <select className="sort-sel" value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="recent">Recent</option>
          <option value="roast">Roast</option>
          <option value="rating">Rating ↓</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
      <div className="search-wrap">
        <span className="search-ico">⌕</span>
        <input className="search-input" placeholder="Search coffee, origin, grind, flavour…" value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <div style={{padding:"6px 0 8px"}}>
        <MultiRow  label="Brew"   opts={[["espr","ESPR"],["pour","POUR"],["frpr","FRPR"]]}                                     val={brewF}  set={setBrewF}/>
        <MultiRow  label="Kit"    opts={[["home","HOME"],["offc","OFFC"]]}                                                      val={locF}   set={setLocF}/>
        <MultiRow  label="Roast"  opts={[["light","LIGHT"],["ml","MED-L"],["med","MEDIUM"],["md","MED-D"],["dark","DARK"]]}     val={roastF} set={setRoastF}/>
        <SingleRow label="Status" opts={[["all","ALL"],["waiting","WAITING"],["dialing","DIALING"],["dialed","DIALED"],["abandoned","ABANDONED"],["experimenting","EXP"]]} val={statusF} set={setStatusF}/>
        <SingleRow label="Beans"  opts={[["all","ALL"],["shelf","SHELF"],["open","OPEN"],["frozen","FROZEN"],["empty","DONE"]]}  val={beansF} set={setBeansF}/>
      </div>
      {filteredGroups.length===0
        ? <div className="empty"><div className="empty-ico">◉</div><div className="empty-t">No results</div><div className="empty-s">{q?"Try a different search":"No entries match these filters"}</div></div>
        : filteredGroups.map(g=>{
            const key=`${g.coffeeName}⌀${g.roaster}`;
            const isExp=expanded[key];
            return (
              <div key={key}>
                <CoffeeGroupCard
                  group={g}
                  settings={settings}
                  showRating={true}
                  onNavigate={()=>nav("dialin",bestGroupEntry(g.entries),"logbook")}
                  onExpand={()=>setExpanded(p=>({...p,[key]:!p[key]}))}
                  expanded={isExp}
                />
                {isExp && (
                  <div style={{margin:"-6px 18px 8px",background:"var(--surface)",border:"1px solid var(--border)",borderTop:"none",borderRadius:"0 0 12px 12px",overflow:"hidden"}}>
                    {[...g.entries].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(d=>{
                      const kit=kits.find(k=>k.id===d.kitId);
                      const loc=kit?.location==="office"?"OFFC":"HOME";
                      return (
                        <div key={d.id} className="sub-row" onClick={()=>nav("dialin",d,"logbook")}>
                          <span className="badge b-kit" style={{fontSize:"9px"}}>{loc}</span>
                          <BrewBadges brewMethods={d.brewMethods||[]}/>
                          <span className="sub-row-grind">{d.grindSetting||"—"}</span>
                          {d.rating>0&&<Stars n={d.rating}/>}
                          <span className="sub-row-date">{fmtShort(d.date)}</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })
      }
    </div>
  );
}

            const t  = tempDisp(re.temperature,settings?.tempUnit);
            return (
              <div className="recipe-block">
                <div className="recipe-title">Espresso</div>
                {t&&<div className="recipe-stat"><div className="recipe-val">{t}</div><div className="recipe-lbl">Temp</div></div>}
                {re.doseIn>0&&re.yieldOut>0&&<div className="recipe-stat"><div className="recipe-val">{re.doseIn}→{re.yieldOut}g</div><div className="recipe-lbl">Dose → Yield</div></div>}
                {rr&&<div className="recipe-stat"><div className="recipe-val">{rr}</div><div className="recipe-lbl">Ratio</div></div>}
                {re.timeSeconds>0&&<div className="recipe-stat"><div className="recipe-val">{re.timeSeconds}s</div><div className="recipe-lbl">Time</div></div>}
              </div>
            );
          })()}
          {pourEntry&&(()=>{
            const rp = pourEntry;
            const rr = rp.doseIn&&rp.yieldOut?ratio(rp.doseIn,rp.yieldOut):null;
            const t  = tempDisp(rp.temperature,settings?.tempUnit);
            return (
              <div className="recipe-block">
                <div className="recipe-title">Pour Over</div>
                {t&&<div className="recipe-stat"><div className="recipe-val">{t}</div><div className="recipe-lbl">Temp</div></div>}
                {rp.doseIn>0&&rp.yieldOut>0&&<div className="recipe-stat"><div className="recipe-val">{rp.doseIn}→{rp.yieldOut}g</div><div className="recipe-lbl">Coffee → Water</div></div>}
                {rr&&<div className="recipe-stat"><div className="recipe-val">{rr}</div><div className="recipe-lbl">Ratio</div></div>}
                {rp.timeSeconds>0&&<div className="recipe-stat"><div className="recipe-val">{secToMSS(rp.timeSeconds)}</div><div className="recipe-lbl">Total Time</div></div>}
                {rp.filterPours&&rp.filterPours.length>0&&<PourPhasesDisplay phases={rp.filterPours}/>}
              </div>
            );
          })()}
        </div>
      </>}

      {/* Coffee info */}
      <div className="div"/>
      <div className="sec">Coffee Info</div>
      <div style={{padding:"0 18px 18px"}}>
        {[
          ["Origin",    `${d.origin||""}${d.region?` · ${d.region}`:""}`],
          ["Process",   d.process],
          ["Roast",     d.roastLevel],
          ["Brewed as", norm.brewMethods?.join(" · ")],
          ["Roast date",norm.roastDate?fmt(norm.roastDate):null],
          ["Flavour",   d.flavorNotes],
        ].filter(([,v])=>v&&String(v).trim()).map(([lbl,val])=>(
          <div key={lbl} className="det-row">
            <div className="det-label">{lbl}</div>
            <div className="det-val">{val}</div>
          </div>
        ))}
      </div>

      {/* My Notes */}
      {norm.notes&&<><div className="div"/><div className="sec">My Notes</div><div className="det-notes">"{norm.notes}"</div></>}

      {/* About */}
      {norm.coffeeDescription&&<>
        <div className="div"/>
        <div className="sec">About this Coffee</div>
        <div style={{padding:"0 18px 16px",fontSize:"13px",color:"var(--tx2)",lineHeight:"1.7"}}>{norm.coffeeDescription}</div>
        {norm.coffeeUrl&&<div style={{padding:"0 18px 20px"}}>
          <a href={norm.coffeeUrl} target="_blank" rel="noopener" style={{display:"inline-flex",alignItems:"center",gap:"6px",fontSize:"12px",color:"var(--accent)",textDecoration:"none",border:"1px solid var(--border)",borderRadius:"7px",padding:"7px 12px"}}>
            View coffee page 🔗
          </a>
        </div>}
      </>}
    </div>
  );
}

// ── ADD DIAL-IN ───────────────────────────────────────────────────────────────
function AddDialIn({ kits, dialins, onSave, nav, settings }) {
  const today = new Date().toISOString().split("T")[0];
  const defKits = settings?.defaultKits||[];
  const [f,setF] = useState({
    date:today, selectedKits:defKits, coffeeName:"", roaster:"",
    origin:"", region:"", process:"Washed", roastLevel:"Light",
    brewMethods:[], roastDate:"", flavorNotes:"",
    grindSetting:"", grinder:"",
    doseIn:"", yieldOut:"", timeSeconds:"", temperature:"",
    rating:0, dialStatus:"dialing", experimenting:false,
    dialEase:null, dialStability:null,
    beanLocation:"shelf", wouldBuy:false, isChoice:false, isEarlyEntry:false, tags:[],
    filterPours:[],
    coffeeUrl:"", coffeeDescription:"", notes:"",
  });
  const [fetching,setFetching]=useState(false);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleTag =(t)=>s("tags",f.tags.includes(t)?f.tags.filter(x=>x!==t):[...f.tags,t]);
  const toggleBrew=(m)=>s("brewMethods",f.brewMethods.includes(m)?f.brewMethods.filter(x=>x!==m):[...f.brewMethods,m]);
  const toggleKit =(id)=>s("selectedKits",f.selectedKits.includes(id)?f.selectedKits.filter(x=>x!==id):[...f.selectedKits,id]);

  const r = f.doseIn&&f.yieldOut?ratio(+f.doseIn,+f.yieldOut):null;

  const dupCheck = useMemo(()=>{
    if(!f.coffeeName.trim()) return [];
    const name=f.coffeeName.toLowerCase().trim(),rst=f.roaster.toLowerCase().trim();
    return dialins.filter(d=>(d.coffeeName||"").toLowerCase().trim()===name&&(!rst||(d.roaster||"").toLowerCase().trim()===rst));
  },[dialins,f.coffeeName,f.roaster]);

  const fetchDesc=async()=>{
    if(!f.coffeeUrl.trim()) return;
    setFetching(true);
    try {
      const res=await fetch(`https://corsproxy.io/?${encodeURIComponent(f.coffeeUrl)}`);
      const html=await res.text();
      const doc=new DOMParser().parseFromString(html,"text/html");
      const desc=doc.querySelector('meta[property="og:description"]')?.content||doc.querySelector('meta[name="description"]')?.content||"";
      const title=doc.querySelector('meta[property="og:title"]')?.content||doc.querySelector('title')?.textContent||"";
      if(desc||title) s("coffeeDescription",[title,desc].filter(Boolean).join("\n"));
    }catch(e){}
    setFetching(false);
  };

  // Phase builder
  const addPhase=()=>setF(p=>({...p,filterPours:[...p.filterPours,{phase:p.filterPours.length+1,targetGrams:"",startSeconds:""}]}));
  const removePhase=(i)=>setF(p=>({...p,filterPours:p.filterPours.filter((_,j)=>j!==i).map((ph,j)=>({...ph,phase:j+1}))}));
  const updatePhase=(i,k,v)=>setF(p=>({...p,filterPours:p.filterPours.map((ph,j)=>j===i?{...ph,[k]:v}:ph)}));

  const save=()=>{
    if(!f.coffeeName||!f.selectedKits.length) return;
    const base = {
      ...f,
      doseIn:+f.doseIn, yieldOut:+f.yieldOut, timeSeconds:+f.timeSeconds, temperature:+f.temperature,
      filterPours:f.filterPours.filter(p=>p.targetGrams).map(p=>({
        phase:p.phase, targetGrams:+p.targetGrams,
        startSeconds:String(p.startSeconds).includes(":")?mssToSec(p.startSeconds):+p.startSeconds||0
      })),
    };
    delete base.selectedKits;
    const entries = f.selectedKits.map(kitId=>({
      ...base, id:uid(), kitId,
      grinder:kits.find(k=>k.id===kitId)?.equipment.find(e=>e.category==="Grinder")?.name||f.grinder,
    }));
    onSave(entries);
  };

  const hasFilter = f.brewMethods.includes("Pour Over")||f.brewMethods.includes("French Press");

  // Kit selector — 6 toggles labeled by location+brew
  const kitOptions = [
    {id:"home-espresso",    label:"HOME · ESPR"},
    {id:"home-pour-over",   label:"HOME · POUR"},
    {id:"home-french-press",label:"HOME · FRPR"},
    {id:"office-espresso",  label:"OFFC · ESPR"},
    {id:"office-pour-over", label:"OFFC · POUR"},
    {id:"office-french-press",label:"OFFC · FRPR"},
  ];

  return (
    <div className="screen fade-in">
      <div className="hdr">
        <button className="icon-btn" onClick={()=>nav("active")}>←</button>
        <div style={{flex:1}}><div className="hdr-title">New Dial-In</div><div className="hdr-sub">Log a coffee</div></div>
      </div>

      <div className="sec">Coffee *</div>
      <div className="f-grp"><label className="f-lbl">Coffee Name *</label>
        <input className="f-in" placeholder="e.g. Ethiopia Yirgacheffe Natural" value={f.coffeeName} onChange={e=>s("coffeeName",e.target.value)}/>
      </div>
      <div className="f-grp"><label className="f-lbl">Roaster</label>
        <input className="f-in" placeholder="e.g. The Barn" value={f.roaster} onChange={e=>s("roaster",e.target.value)}/>
      </div>
      <div className="f-grp"><label className="f-lbl">Kits * — select all you plan to dial on</label>
        <div className="opt-chips">
          {kitOptions.map(({id,label})=>(
            <div key={id} className={`opt-chip${f.selectedKits.includes(id)?" opt-chip-on":""}`} onClick={()=>toggleKit(id)} style={{fontFamily:"'DM Mono',monospace",fontSize:"11px"}}>{label}</div>
          ))}
        </div>
      </div>
      <div className="f-grp"><label className="f-lbl">Brew Methods *</label>
        <div className="opt-chips">
          {BREW_METHODS.map(m=>(
            <div key={m} className={`opt-chip${f.brewMethods.includes(m)?" opt-chip-on":""}`} onClick={()=>toggleBrew(m)}>
              {m==="Espresso"?"ESPR":m==="Pour Over"?"POUR":"FRPR"}
            </div>
          ))}
        </div>
      </div>

      <div className="sec">Coffee Details</div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Origin</label><input className="f-in" placeholder="Ethiopia" value={f.origin} onChange={e=>s("origin",e.target.value)}/></div>
        <div className="f-grp"><label className="f-lbl">Region</label><input className="f-in" placeholder="Yirgacheffe" value={f.region} onChange={e=>s("region",e.target.value)}/></div>
      </div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Process</label>
          <select className="f-sel" value={f.process} onChange={e=>s("process",e.target.value)}>{PROCESSES.map(o=><option key={o}>{o}</option>)}</select>
        </div>
        <div className="f-grp"><label className="f-lbl">Roast</label>
          <select className="f-sel" value={f.roastLevel} onChange={e=>s("roastLevel",e.target.value)}>{ROASTS.map(o=><option key={o}>{o}</option>)}</select>
        </div>
      </div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Roast Date</label><input className="f-in" type="date" value={f.roastDate} onChange={e=>s("roastDate",e.target.value)}/></div>
        <div className="f-grp"><label className="f-lbl">Bean Location</label>
          <select className="f-sel" value={f.beanLocation} onChange={e=>s("beanLocation",e.target.value)}>
            {BEAN_LOCS.map(o=><option key={o} value={o}>{o.charAt(0).toUpperCase()+o.slice(1)}</option>)}
          </select>
        </div>
      </div>
      <div className="f-grp"><label className="f-lbl">Flavour Notes</label>
        <input className="f-in" placeholder="Blueberry, dark chocolate, citrus" value={f.flavorNotes} onChange={e=>s("flavorNotes",e.target.value)}/>
      </div>

      <div className="sec">Coffee Page</div>
      <div className="f-grp"><label className="f-lbl">Coffee URL</label>
        <div className="fetch-row">
          <input className="f-in" type="url" placeholder="https://…" value={f.coffeeUrl} onChange={e=>s("coffeeUrl",e.target.value)}/>
          <button className="btn-fetch" onClick={fetchDesc} disabled={fetching||!f.coffeeUrl.trim()}>{fetching?<span className="spin">↻</span>:"Fetch"}</button>
        </div>
        <div className="f-hint">Paste product page — tap Fetch to auto-fill description.</div>
      </div>
      <div className="f-grp"><label className="f-lbl">Description</label>
        <textarea className="f-ta" style={{minHeight:"70px"}} value={f.coffeeDescription} onChange={e=>s("coffeeDescription",e.target.value)}/>
      </div>

      <div className="sec">Grind (optional)</div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Setting</label><input className="f-in" placeholder="e.g. 12.5" value={f.grindSetting} onChange={e=>s("grindSetting",e.target.value)}/></div>
        <div className="f-grp"><label className="f-lbl">Grinder</label><input className="f-in" placeholder="Auto from kit" value={f.grinder} onChange={e=>s("grinder",e.target.value)}/></div>
      </div>

      <div className="sec">Extraction (optional)</div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">{hasFilter?"Coffee (g)":"Dose (g)"}</label><input className="f-in" type="number" value={f.doseIn} onChange={e=>s("doseIn",e.target.value)}/></div>
        <div className="f-grp">
          <label className="f-lbl">{hasFilter?"Water (g)":"Yield (g)"}{r&&<span style={{color:"var(--accent)",fontFamily:"'DM Mono',monospace",fontSize:"10px",marginLeft:"6px"}}>{r}</span>}</label>
          <input className="f-in" type="number" value={f.yieldOut} onChange={e=>s("yieldOut",e.target.value)}/>

      </div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Temp (°{settings?.tempUnit||"C"})</label><input className="f-in" type="number" value={f.temperature} onChange={e=>s("temperature",e.target.value)}/></div>
        <div className="f-grp"><label className="f-lbl">{hasFilter?"Total Time (s)":"Time (s)"}</label><input className="f-in" type="number" value={f.timeSeconds} onChange={e=>s("timeSeconds",e.target.value)}/></div>

      <div className="f-grp"><label className="f-lbl">Tags</label>

      </div>
      <div className="toggle-row"><div><div className="toggle-lbl">Would Buy Again</div></div><Toggle on={f.wouldBuy} onToggle={()=>s("wouldBuy",!f.wouldBuy)}/></div>

      <div className="toggle-row"><div><div className="toggle-lbl">Early Entry</div><div className="toggle-sub">Mark as learning period</div></div><Toggle on={f.isEarlyEntry} onToggle={()=>s("isEarlyEntry",!f.isEarlyEntry)}/></div>
      <div className="f-grp"><label className="f-lbl">Notes</label>
        <textarea className="f-ta" value={f.notes} onChange={e=>s("notes",e.target.value)}/>
      </div>
      <div className="btn-area">
        {dupCheck.length>0&&<div className="alert-banner alert-amber">⚠ {dupCheck.length} existing entr{dupCheck.length===1?"y":"ies"} found. This will add new records.</div>}
        <button className="btn btn-p" onClick={save} disabled={!f.coffeeName||!f.selectedKits.length}>Save {f.selectedKits.length>1?`${f.selectedKits.length} Entries`:"Dial-In"}</button>
        <button className="btn btn-s" onClick={()=>nav("active")}>Cancel</button>
      </div>
    </div>
  );
}

  );

// ── EDIT KIT ──────────────────────────────────────────────────────────────────
function EditKit({ kit, onSave, nav }) {
  const [name,setName]=useState(kit.name);

  const [equip,setEquip]=useState(kit.equipment.map(e=>({...e})));
  const updateEq=(i,k,v)=>setEquip(p=>p.map((e,j)=>j===i?{...e,[k]:v}:e));

  const removeEq=i=>setEquip(p=>p.filter((_,j)=>j!==i));

    <div className="screen fade-in">

// ── ACTIVITY CHART ────────────────────────────────────────────────────────────
function ActivityChart({ dialins }) {
  const months = useMemo(()=>{
    const now=new Date(); const result=[];
    for(let i=11;i>=0;i--){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      const label=d.toLocaleDateString("en-GB",{month:"short"});
      const count=dialins.filter(e=>(e.date||"").startsWith(key)).length;
      result.push({key,label,count});
    }
    return result;
  },[dialins]);
  const max=Math.max(...months.map(m=>m.count),1);
  const W=324,H=52,bw=W/12-3;
  return (
    <div className="activity-wrap">
      <svg viewBox={`0 0 ${W} ${H+18}`} style={{width:"100%",display:"block"}}>
        {months.map((m,i)=>{
          const bh=Math.max((m.count/max)*H,m.count>0?3:1);
          const x=i*(W/12)+1;
          return (
            <g key={m.key}>
              <rect x={x} y={H-bh} width={bw} height={bh}
                fill={m.count>0?"var(--accent)":"var(--elevated)"} rx={2} opacity={m.count>0?1:.5}/>
              <text x={x+bw/2} y={H+14} textAnchor="middle" fontSize="8" fill="var(--tx3)" fontFamily="'DM Mono',monospace">{m.label}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

// ── JOURNEY SCREEN ────────────────────────────────────────────────────────────
function JourneyScreen({ dialins, settings, onUpdatePalate }) {
  const [editing,setEditing]=useState(false);
  const [palateText,setPalateText]=useState(settings?.palateSummary||DEFAULT_PALATE);

  const norm=useMemo(()=>dialins.map(normalizeDiaLin),[dialins]);
  const rated=norm.filter(d=>d.rating>0);
  const avgRating=rated.length?(rated.reduce((a,d)=>a+d.rating,0)/rated.length).toFixed(1):"—";
  const topRated=[...norm].filter(d=>d.rating>=4).sort((a,b)=>b.rating-a.rating).slice(0,5);
  const myPicks=norm.filter(d=>d.isChoice);
  const wouldBuy=norm.filter(d=>d.wouldBuy);

  const originCounts={},processCounts={},roasterCounts={};
  norm.forEach(d=>{
    if(d.origin)  originCounts[d.origin]=(originCounts[d.origin]||0)+1;
    if(d.process) processCounts[d.process]=(processCounts[d.process]||0)+1;
    if(d.roaster) roasterCounts[d.roaster]=(roasterCounts[d.roaster]||0)+1;
  });
  const topOrigins=Object.entries(originCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const topRoasters=Object.entries(roasterCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const esprFlavours=extractFlavourKeywords(dialins,"espr");
  const pourFlavours=extractFlavourKeywords(dialins,"pour");

  const FlavourCloud=({items})=>{
    if(!items.length) return <div style={{fontSize:"12px",color:"var(--tx3)",padding:"0 18px 14px"}}>No data yet</div>;
    const max=items[0]?.[1]||1;
    return (
      <div className="flavour-cloud">
        {items.map(([w,c])=>{
          const size=10+Math.round((c/max)*4);
          return <span key={w} style={{fontSize:`${size}px`,padding:"3px 9px",background:"var(--elevated)",border:"1px solid var(--border)",borderRadius:"5px",color:`rgba(${200},${118+Math.round((c/max)*20)},${58},${0.5+c/max*0.5})`}}>{w} <span style={{fontFamily:"'DM Mono',monospace",fontSize:"9px",color:"var(--tx3)"}}>{c}</span></span>;
        })}
      </div>
    );
  };

  return (
    <div className="screen fade-in">
      <div className="hdr">
        <div style={{flex:1}}><div className="hdr-title">My Journey</div><div className="hdr-sub">Coffee history & taste DNA</div></div>
      </div>

      <div className="sec">Journey Stats</div>
      <div style={{padding:"0 18px 16px"}}>
        <div className="stats">
          <div className="stat"><div className="stat-v">{dialins.length}</div><div className="stat-l">Logged</div></div>
          <div className="stat"><div className="stat-v">{avgRating}</div><div className="stat-l">Avg ★</div></div>
          <div className="stat"><div className="stat-v">{rated.filter(d=>d.rating>=4).length}</div><div className="stat-l">4★+</div></div>
          <div className="stat"><div className="stat-v">{wouldBuy.length}</div><div className="stat-l">Would Buy</div></div>
        </div>
      </div>

      <div className="sec">Activity</div>
      <ActivityChart dialins={dialins}/>

      {myPicks.length>0&&<>
        <div className="sec">My Picks</div>
        {myPicks.map(d=>(
          <div key={d.id} className="journey-item">
            <div style={{flex:1}}>
              <div style={{fontSize:"10px",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--accent)",marginBottom:"2px"}}>{d.roaster}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"16px",fontWeight:500}}>{d.coffeeName}</div>
            </div>
            {d.rating>0&&<Stars n={d.rating}/>}
          </div>
        ))}
      </>}

      {topRated.length>0&&<>
        <div className="sec">Top Rated</div>
        {topRated.map(d=>(
          <div key={d.id} className="journey-item">
            <div style={{flex:1}}>
              <div style={{fontSize:"10px",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--accent)",marginBottom:"2px"}}>{d.roaster}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"16px",fontWeight:500}}>{d.coffeeName}</div>
              <div style={{fontSize:"11px",color:"var(--tx3)",marginTop:"2px"}}>{d.origin}{d.process?` · ${d.process}`:""}</div>
            </div>
            <Stars n={d.rating}/>
          </div>
        ))}
      </>}

      <div className="sec">Taste DNA</div>
      {topOrigins.length>0&&(
        <div style={{padding:"0 18px 14px"}}>
          <div style={{fontSize:"9px",fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",color:"var(--tx3)",marginBottom:"8px"}}>Origins Explored</div>
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
            {topOrigins.map(([o,c])=><div key={o} className="dna-tag">{o} <span style={{color:"var(--accent)",fontFamily:"'DM Mono',monospace",fontSize:"10px"}}>{c}</span></div>)}
          </div>
        </div>
      )}
      {Object.keys(processCounts).length>0&&(
        <div style={{padding:"0 18px 14px"}}>
          <div style={{fontSize:"9px",fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",color:"var(--tx3)",marginBottom:"8px"}}>Processes</div>
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
            {Object.entries(processCounts).sort((a,b)=>b[1]-a[1]).map(([p,c])=>(
              <div key={p} style={{padding:"4px 10px",background:"var(--blue-d)",border:"1px solid rgba(90,112,152,0.2)",borderRadius:"6px",fontSize:"12px",color:"var(--blue)"}}>
                {p} <span style={{fontFamily:"'DM Mono',monospace",fontSize:"10px"}}>{c}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      {topRoasters.length>0&&(
        <div style={{padding:"0 18px 14px"}}>
          <div style={{fontSize:"9px",fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",color:"var(--tx3)",marginBottom:"8px"}}>Roasters Explored</div>
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
            {topRoasters.map(([r,c])=><div key={r} className="dna-tag">{r} <span style={{color:"var(--accent)",fontFamily:"'DM Mono',monospace",fontSize:"10px"}}>{c}</span></div>)}
          </div>
        </div>
      )}

      <div className="sec">Flavour Profile — ESPR</div>
      <FlavourCloud items={esprFlavours}/>
      <div className="sec">Flavour Profile — POUR</div>
      <FlavourCloud items={pourFlavours}/>

      <div className="sec">Palate Summary</div>
      {editing ? (
        <div style={{padding:"0 18px 14px"}}>
          <textarea className="palate-edit-ta" value={palateText} onChange={e=>setPalateText(e.target.value)}/>
          <div style={{display:"flex",gap:"8px",marginTop:"10px"}}>
            <button className="btn btn-p" style={{flex:1}} onClick={()=>{onUpdatePalate(palateText);setEditing(false);}}>Save</button>
            <button className="btn btn-s" style={{flex:1}} onClick={()=>{setPalateText(settings?.palateSummary||DEFAULT_PALATE);setEditing(false);}}>Cancel</button>
          </div>
        </div>
      ) : (
        <div className="palate-card">
          <div style={{whiteSpace:"pre-wrap",lineHeight:"1.75"}}>{settings?.palateSummary||DEFAULT_PALATE}</div>
          <div style={{marginTop:"12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:"10px",color:"var(--tx3)",letterSpacing:".05em"}}>Updated March 2026 · {dialins.length} coffees tested</div>
            <button onClick={()=>setEditing(true)} style={{background:"none",border:"1px solid var(--border)",borderRadius:"6px",color:"var(--tx2)",fontSize:"11px",padding:"4px 10px",cursor:"pointer",fontFamily:"'Jost',sans-serif"}}>Edit</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SETTINGS MAIN MENU ────────────────────────────────────────────────────────
function SettingsScreen({ nav, syncing, onSync, dialins, settings }) {
  const dupCount=useMemo(()=>groupDuplicates(dialins).length,[dialins]);
  const incompleteCount=useMemo(()=>dialins.filter(d=>!d.grindSetting||!d.brewMethods?.length||!d.roastDate).length,[dialins]);
  const rows=[
    {id:"settings-kits",    ico:"⚙", bg:"rgba(200,120,64,0.1)",  color:"var(--accent)",   title:"Kits",        sub:"Manage your 6 brewing setups"},
    {id:"settings-github",  ico:"⟳", bg:"rgba(90,112,152,0.1)",  color:"var(--blue)",     title:"GitHub Sync", sub:settings?.owner&&settings?.repo?`${settings.owner}/${settings.repo}`:"Not connected"},
    {id:"settings-controls",ico:"⊞", bg:"rgba(90,136,96,0.1)",   color:"var(--green)",    title:"Controls",    sub:"Defaults, units, thresholds"},
    {id:"settings-data",    ico:"◈", bg:dupCount>0||incompleteCount>0?"rgba(200,120,64,0.1)":"rgba(90,136,96,0.1)", color:dupCount>0||incompleteCount>0?"var(--accent)":"var(--green)", title:"Data",
      sub:dupCount>0?`${dupCount} duplicate group${dupCount!==1?"s":""} · check needed`:incompleteCount>0?`${incompleteCount} entr${incompleteCount===1?"y":"ies"} with missing fields`:"All clean"},
  ];
  return (
    <div className="screen fade-in">
      <div className="hdr">
        <div style={{flex:1}}><div className="hdr-title">Settings</div><div className="hdr-sub">App v{APP_VERSION}</div></div>
        <button className="icon-btn" onClick={onSync}><span className={syncing?"spin":""}>{syncing?"↻":"⟳"}</span></button>
      </div>
      <div className="sec">Configuration</div>
      {rows.map(r=>(
        <div key={r.id} className="settings-row" onClick={()=>nav(r.id)}>
          <div className="settings-row-ico" style={{background:r.bg}}>
            <span style={{color:r.color,fontSize:"18px"}}>{r.ico}</span>

          <div style={{flex:1}}>
            <div className="settings-row-title">{r.title}</div>
            <div className="settings-row-sub">{r.sub}</div>
          </div>
          <span style={{color:"var(--tx3)"}}>›</span>
        </div>
      ))}
    </div>

// ── IMPORT SCREEN ─────────────────────────────────────────────────────────────
function ImportScreen({ kits, onImport, nav }) {
  const [raw,setRaw]=useState(""); const [preview,setPreview]=useState(null); const [err,setErr]=useState("");
  const parse=()=>{
    setErr(""); setPreview(null);
    try {
      const trimmed=raw.trim().replace(/^```json|^```|```$/gm,"").trim();
      let parsed=JSON.parse(trimmed);
      if(!Array.isArray(parsed)) parsed=[parsed];
      if(parsed.filter(e=>!e.coffeeName).length){setErr("Every entry needs a coffeeName.");return;}
      parsed=parsed.map(e=>({...normalizeDiaLin(e),id:e.id||uid(),date:e.date||new Date().toISOString().split("T")[0],kitId:e.kitId||kits[0]?.id||"home-espresso"}));
      setPreview(parsed);
    }catch(e){setErr("Could not parse JSON.");}
  };
  return (
    <div className="screen fade-in">
      <div className="hdr">
        <button className="icon-btn" onClick={()=>nav("active")}>←</button>
        <div style={{flex:1}}><div className="hdr-title">Import from Claude</div><div className="hdr-sub">Paste · Preview · Save</div></div>
      </div>
      {!preview?<>
        <div style={{margin:"14px 18px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px",fontSize:"12px",color:"var(--tx2)",lineHeight:"1.65"}}>
          1. Chat with Claude about a new coffee<br/>2. Ask Claude to generate a v3.1 dial-in JSON entry<br/>3. Paste below → Preview → Save
        </div>
        <div className="f-grp">
          <textarea className="f-ta" style={{minHeight:"160px",fontFamily:"'DM Mono',monospace",fontSize:"12px"}}
            placeholder={'{\n  "coffeeName": "...",\n  "brewMethods": ["Espresso"],\n  ...\n}'}
            value={raw} onChange={e=>{setRaw(e.target.value);setErr("");}}/>
          {err&&<div style={{fontSize:"12px",color:"#C05050",marginTop:"6px"}}>{err}</div>}
        </div>
        <div className="btn-area">
          <button className="btn btn-p" onClick={parse} disabled={!raw.trim()}>Preview</button>
          <button className="btn btn-s" onClick={()=>nav("active")}>Cancel</button>
        </div>
      </>:<>
        <div className="sec">Preview — {preview.length} entr{preview.length===1?"y":"ies"}</div>
        {preview.map((e,i)=>(
          <div key={i} style={{margin:"0 18px 10px",background:"var(--surface)",border:"1px solid var(--bh)",borderRadius:"12px",padding:"14px"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"16px",fontWeight:500,marginBottom:"3px"}}>{e.coffeeName}</div>
            <div style={{fontSize:"11px",color:"var(--tx2)",marginBottom:"8px"}}>{e.roaster} · {e.date}</div>
            <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
              <BrewBadges brewMethods={e.brewMethods||[]}/>
              {e.grindSetting&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:"14px",fontWeight:500,color:"var(--accent)"}}>{e.grindSetting}</span>}
            </div>
            {e.flavorNotes&&<div style={{fontSize:"11px",color:"var(--tx2)",fontStyle:"italic",marginTop:"7px"}}>"{e.flavorNotes}"</div>}
          </div>
        ))}
        <div className="btn-area">
          <button className="btn btn-p" onClick={()=>onImport(preview)}>Save to GitHub</button>
          <button className="btn btn-s" onClick={()=>setPreview(null)}>← Edit</button>
        </div>
      </>}
    </div>
  );
}
