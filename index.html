<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0C0501"/>
  <title>Dial-In · Coffee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0C0501; --surface:#170C06; --elevated:#201208; --input-bg:#1A0D07;
      --border:rgba(200,118,58,0.16); --bh:rgba(200,118,58,0.38);
      --accent:#C87840; --accent-d:rgba(200,120,64,0.13); --accent-b:#E09050;
      --tx1:#EDD8B4; --tx2:#9A7050; --tx3:#5A3A22;
      --green:#5A8860; --green-d:rgba(90,136,96,0.14);
      --blue:#5A7098; --blue-d:rgba(90,112,152,0.14);
      --red:#A05050; --red-d:rgba(160,80,80,0.15);
      --purple:#7A5A8A; --purple-d:rgba(122,90,138,0.14);
    }
    html,body { height:100%; background:var(--bg); color:var(--tx1); font-family:'Jost',sans-serif; font-weight:400; -webkit-font-smoothing:antialiased; overscroll-behavior:none; }
    body::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); opacity:.5; }
    #root { height:100%; }

    .screen { min-height:100vh; max-width:480px; margin:0 auto; padding-bottom:88px; }
    .fade-in { animation:fadeIn .22s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* Header */
    .hdr { position:sticky; top:0; z-index:100; background:rgba(12,5,1,.95); backdrop-filter:blur(18px); border-bottom:1px solid var(--border); padding:14px 18px; display:flex; align-items:center; gap:10px; }
    .hdr-title { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:500; letter-spacing:.02em; flex:1; }
    .hdr-sub { font-size:10px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--tx2); margin-top:1px; }
    .icon-btn { width:34px; height:34px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--tx2); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; font-size:15px; flex-shrink:0; }
    .icon-btn:hover { border-color:var(--bh); color:var(--tx1); }
    .sort-sel { background:var(--surface); border:1px solid var(--border); border-radius:7px; color:var(--tx2); font-family:'Jost',sans-serif; font-size:11px; padding:5px 8px; outline:none; cursor:pointer; flex-shrink:0; }
    .sort-sel option { background:var(--elevated); }

    .sec { padding:20px 18px 8px; font-size:9px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--tx3); display:flex; align-items:center; gap:8px; }
    .sec::after { content:''; flex:1; height:1px; background:var(--border); }

    /* Equipment */
    .eq-row { display:flex; align-items:flex-start; gap:14px; padding:12px 18px; border-bottom:1px solid var(--border); }
    .eq-cat { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); min-width:90px; margin-top:2px; }
    .eq-name { font-size:14px; font-weight:500; }
    .eq-note { font-size:12px; color:var(--tx2); margin-top:2px; }

    /* Dial-in card */
    .dc { margin:0 18px 8px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 16px; cursor:pointer; transition:border-color .15s, box-shadow .15s; box-shadow:0 2px 8px rgba(0,0,0,.2); }
    .dc:hover { border-color:var(--bh); box-shadow:0 4px 16px rgba(0,0,0,.3); }
    .dc-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; gap:10px; }
    .dc-roaster-name { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:3px; }
    .dc-name { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:500; line-height:1.2; }
    .dc-origin { font-size:11px; color:var(--tx3); margin-top:3px; }
    .dc-grind { font-family:'DM Mono',monospace; font-size:26px; font-weight:500; color:var(--accent); text-align:right; line-height:1; text-shadow:0 0 24px rgba(200,120,64,0.25); }
    .dc-grind-lbl { font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); text-align:right; margin-top:2px; }
    .dc-meta { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
    .dc-params { display:flex; gap:10px; margin-top:9px; padding-top:8px; border-top:1px solid var(--border); }
    .dc-param { font-family:'DM Mono',monospace; font-size:11px; color:var(--tx3); }
    .dc-param span { color:var(--tx2); }

    /* Badges */
    .badge { font-size:10px; font-weight:500; letter-spacing:.05em; padding:3px 7px; border-radius:5px; white-space:nowrap; }
    /* Brew */
    .b-brew-espr { background:rgba(200,120,64,0.12); color:#C87840; border:1px solid rgba(200,120,64,0.22); font-size:9px; letter-spacing:.08em; }
    .b-brew-pour { background:rgba(90,112,152,0.12); color:#7A9AC0; border:1px solid rgba(90,112,152,0.22); font-size:9px; letter-spacing:.08em; }
    .b-brew-frpr { background:rgba(122,90,138,0.12); color:#AA80C0; border:1px solid rgba(122,90,138,0.22); font-size:9px; letter-spacing:.08em; }
    /* Kit location */
    .b-kit { background:var(--elevated); color:var(--tx2); border:1px solid var(--border); }
    /* Dial status */
    .b-dial-waiting  { background:rgba(90,58,34,0.2);  color:var(--tx3); border:1px solid rgba(90,58,34,0.3); }
    .b-dial-dialing  { background:var(--accent-d); color:var(--accent); }
    .b-dial-dialed   { background:var(--green-d); color:var(--green); }
    .b-dial-abandoned{ background:var(--red-d); color:var(--red); }
    .b-experimenting { background:transparent; color:var(--accent); border:1px solid rgba(200,120,64,0.4); }
    /* Dial quality */
    .b-ease-easy   { background:var(--green-d); color:var(--green); font-size:9px; }
    .b-ease-medium { background:var(--accent-d); color:var(--accent); font-size:9px; }
    .b-ease-hard   { background:var(--red-d); color:var(--red); font-size:9px; }
    .b-stab-stable  { background:var(--green-d); color:var(--green); font-size:9px; }
    .b-stab-unstable{ background:var(--red-d); color:var(--red); font-size:9px; }
    /* Bean location */
    .b-bean-shelf  { background:var(--blue-d); color:#7A9AC0; border:1px solid rgba(90,112,152,0.2); font-size:9px; }
    .b-bean-frozen { background:rgba(90,112,152,0.14); color:#7A9AC0; border:1px solid rgba(90,112,152,0.28); font-size:9px; }
    .b-bean-empty  { background:var(--elevated); color:var(--tx3); font-size:9px; }
    /* Special */
    .b-would-buy { background:rgba(90,136,96,0.14); color:var(--green); font-size:10px; }
    .b-choice    { background:rgba(200,120,64,0.18); color:var(--accent-b); border:1px solid rgba(200,120,64,0.32); }
    .b-early     { background:rgba(120,100,60,0.15); color:#8A7040; border:1px solid rgba(120,100,60,0.25); font-size:9px; }
    .b-process   { background:var(--blue-d); color:var(--blue); }
    .b-roast     { background:rgba(139,78,26,.14); color:#9A6A44; }

    /* Stars */
    .stars { display:flex; gap:2px; }
    .star-on { color:var(--accent); font-size:12px; }
    .star-off { color:var(--tx3); font-size:12px; }

    /* Search */
    .search-wrap { position:relative; padding:10px 18px; }
    .search-ico { position:absolute; left:32px; top:50%; transform:translateY(-50%); color:var(--tx3); font-size:14px; pointer-events:none; }
    .search-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--tx1); font-family:'Jost',sans-serif; font-size:14px; padding:9px 12px 9px 36px; outline:none; transition:border-color .15s; }
    .search-input:focus { border-color:var(--accent); }

    /* Filter chip rows */
    .filter-block { padding:0 18px 6px; }
    .filter-label { font-size:9px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--tx3); margin-bottom:5px; }
    .chips { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
    .chips::-webkit-scrollbar { display:none; }
    .chip { flex-shrink:0; padding:5px 11px; border-radius:6px; font-size:11px; font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--tx2); transition:all .15s; }
    .chip-on { background:var(--accent-d); border-color:var(--accent); color:var(--accent); }

    /* Stats */
    .stats { display:flex; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .stat { flex:1; padding:11px 6px; text-align:center; border-right:1px solid var(--border); }
    .stat:last-child { border-right:none; }
    .stat-v { font-family:'DM Mono',monospace; font-size:17px; font-weight:500; color:var(--accent); }
    .stat-v span { font-size:11px; }
    .stat-l { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); margin-top:2px; }

    /* Detail */
    .det-hero { padding:20px 18px 18px; border-bottom:1px solid var(--border); }
    .det-date { font-family:'DM Mono',monospace; font-size:10px; color:var(--tx3); letter-spacing:.08em; margin-bottom:7px; }
    .det-title { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:500; line-height:1.2; margin-bottom:5px; }
    .det-roaster { font-size:13px; color:var(--tx2); margin-bottom:13px; }
    .det-row { display:flex; gap:14px; padding:8px 0; border-bottom:1px solid var(--border); }
    .det-label { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); min-width:90px; margin-top:2px; }
    .det-val { font-size:13px; color:var(--tx1); flex:1; }
    .det-notes { padding:12px 18px 20px; font-family:'Cormorant Garamond',serif; font-size:16px; font-style:italic; color:var(--tx2); line-height:1.65; }

    /* Form */
    .f-grp { margin-bottom:14px; padding:0 18px; }
    .f-lbl { display:block; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tx2); margin-bottom:5px; }
    .f-in,.f-sel,.f-ta { width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:8px; color:var(--tx1); font-family:'Jost',sans-serif; font-size:14px; padding:9px 12px; outline:none; transition:border-color .15s; }
    .f-in:focus,.f-sel:focus,.f-ta:focus { border-color:var(--accent); }
    .f-sel option { background:var(--elevated); }
    .f-ta { resize:vertical; min-height:75px; }
    .f-row { padding:0 18px 14px; display:flex; gap:10px; }
    .f-row .f-grp { flex:1; padding:0; margin-bottom:0; }
    .f-hint { font-size:11px; color:var(--tx3); margin-top:5px; line-height:1.5; }
    .opt-chips { display:flex; gap:7px; flex-wrap:wrap; }
    .opt-chip { padding:6px 13px; border-radius:7px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--input-bg); color:var(--tx2); transition:all .15s; }
    .opt-chip-on { background:var(--accent-d); border-color:var(--accent); color:var(--accent); }
    .opt-chip-green-on { background:var(--green-d); border-color:var(--green); color:var(--green); }
    .opt-chip-red-on   { background:var(--red-d); border-color:var(--red); color:var(--red); }
    .star-in { display:flex; gap:5px; }
    .star-btn { background:none; border:none; cursor:pointer; font-size:22px; color:var(--tx3); transition:color .1s,transform .1s; padding:0; }
    .star-btn:hover { transform:scale(1.15); }
    .star-btn-on { color:var(--accent); }
    .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:10px 18px; }
    .toggle-lbl { font-size:13px; color:var(--tx1); }
    .toggle-sub { font-size:11px; color:var(--tx3); margin-top:1px; }
    .toggle-btn { width:40px; height:24px; border-radius:12px; border:none; cursor:pointer; transition:background .2s; position:relative; flex-shrink:0; }
    .toggle-btn::after { content:''; position:absolute; width:18px; height:18px; border-radius:50%; background:#fff; top:3px; transition:left .2s; }
    .toggle-off { background:var(--elevated); }
    .toggle-off::after { left:3px; }
    .toggle-on { background:var(--accent); }
    .toggle-on::after { left:19px; }

    /* Buttons */
    .btn { border:none; border-radius:9px; padding:12px 18px; font-family:'Jost',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:all .15s; letter-spacing:.04em; width:100%; }
    .btn-p { background:var(--accent); color:#0C0501; }
    .btn-p:hover { background:var(--accent-b); }
    .btn-p:disabled { opacity:.45; cursor:not-allowed; }
    .btn-s { background:var(--elevated); border:1px solid var(--border); color:var(--tx2); }
    .btn-s:hover { border-color:var(--bh); color:var(--tx1); }
    .btn-area { padding:14px 18px; display:flex; flex-direction:column; gap:9px; }
    .fetch-row { display:flex; gap:8px; }
    .fetch-row .f-in { flex:1; }
    .btn-fetch { flex-shrink:0; background:var(--elevated); border:1px solid var(--border); border-radius:8px; color:var(--tx2); font-family:'Jost',sans-serif; font-size:12px; font-weight:500; padding:0 14px; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .btn-fetch:hover { border-color:var(--bh); color:var(--tx1); }
    .btn-fetch:disabled { opacity:.4; cursor:not-allowed; }

    /* Profile */
    .profile-item { margin:0 18px 8px; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; display:flex; align-items:center; gap:12px; }
    .dna-tag { padding:4px 10px; background:var(--surface); border:1px solid var(--border); border-radius:6px; font-size:12px; color:var(--tx2); }
    .taste-card { margin:0 18px 16px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; font-size:13px; color:var(--tx2); line-height:1.75; }
    .taste-subhead { font-family:'Cormorant Garamond',serif; font-size:16px; font-style:italic; color:var(--tx1); margin-bottom:6px; margin-top:12px; }
    .taste-subhead:first-child { margin-top:0; }

    /* Bottom nav */
    .bnav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:rgba(12,5,1,.95); backdrop-filter:blur(18px); border-top:1px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
    .nav-btn { flex:1; padding:10px 4px 8px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; color:var(--tx3); border:none; background:none; transition:color .15s; position:relative; }
    .nav-btn-on { color:var(--accent); }
    .nav-btn-on::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:20px; height:2px; background:var(--accent); border-radius:1px; }
    .nav-ico { font-size:17px; }
    .nav-lbl { font-size:8px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; }

    /* Empty */
    .empty { text-align:center; padding:60px 18px; }
    .empty-ico { font-size:36px; opacity:.3; margin-bottom:14px; }
    .empty-t { font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--tx2); margin-bottom:7px; }
    .empty-s { font-size:12px; color:var(--tx3); }

    /* Toast */
    .toast { position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:var(--elevated); border:1px solid var(--border); border-radius:9px; padding:11px 18px; font-size:13px; color:var(--tx1); z-index:1000; white-space:nowrap; animation:toastIn .2s ease; box-shadow:0 4px 16px rgba(0,0,0,.4); }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    /* Misc */
    .spin { animation:spin .7s linear infinite; display:inline-block; }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    .div { height:1px; background:var(--border); margin:4px 0; }
    .splash { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200; gap:16px; }
    .splash-title { font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:300; letter-spacing:.06em; color:var(--tx1); }
    .splash-sub { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--tx3); }
    .splash-bar { width:120px; height:1px; background:var(--border); position:relative; overflow:hidden; }
    .splash-bar::after { content:''; position:absolute; left:-40%; width:40%; height:100%; background:var(--accent); animation:load 1.2s ease infinite; }
    @keyframes load { from{left:-40%} to{left:100%} }
    .alert-prime { margin:10px 18px 0; padding:10px 14px; background:rgba(90,136,96,0.1); border:1px solid rgba(90,136,96,0.25); border-radius:9px; font-size:11px; color:var(--green); line-height:1.5; }
    .controls-row { display:flex; align-items:center; gap:8px; padding:10px 18px 0; }
    .controls-chips { display:flex; gap:7px; flex:1; }
    .sync-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); display:inline-block; margin-left:6px; animation:pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const APP_VERSION   = "3.0.0";
const LS            = { settings:"ca_settings", kits:"ca_kits", dialins:"ca_dialins" };
const PROCESSES     = ["Washed","Natural","Honey","Anaerobic","Wet-Hulled","Blend"];
const ROASTS        = ["Light","Medium-Light","Medium","Medium-Dark","Dark"];
const BREW_METHODS  = ["Espresso","Pour Over","French Press"];
const DIAL_STATUSES = ["waiting","dialing","dialed","abandoned"];
const BEAN_LOCS     = ["shelf","open","frozen","empty"];
const DIAL_TAGS     = ["good for milk","interesting","easy dial","good value","affogato","funky","complex","crowd-pleaser"];

// ── FRESHNESS MATRIX ──────────────────────────────────────────────────────────
// [tooFreshDays, primeEndDays, goodEndDays, agingEndDays]
const FRESH_MATRIX = {
  "Light":        { espresso:[7,28,60,120], filter:[5,21,45,90],  fpress:[5,21,45,90]  },
  "Medium-Light": { espresso:[6,24,52,105], filter:[4,17,40,80],  fpress:[4,17,40,80]  },
  "Medium":       { espresso:[5,21,45,90],  filter:[4,14,35,70],  fpress:[4,14,35,70]  },
  "Medium-Dark":  { espresso:[4,17,37,75],  filter:[3,12,30,55],  fpress:[3,12,30,55]  },
  "Dark":         { espresso:[3,14,30,60],  filter:[2,10,25,50],  fpress:[2,10,25,50]  },
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
const fmt    = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : "";
const ratio  = (a,b) => (a&&b) ? `1:${(b/a).toFixed(1)}` : "—";
const uid    = () => `d-${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
const lsGet  = k => { try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch{ return null; } };
const lsSet  = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} };

function getFreshness(roastDate, beanLocation, roastLevel, brewMethods) {
  if (beanLocation==="frozen") return {label:"❄ Frozen", color:"#7A9AC0", bg:"rgba(90,112,152,0.14)"};
  if (!roastDate) return null;
  const days = Math.floor((Date.now()-new Date(roastDate))/86400000);
  if (days < 0) return null;
  const methods = brewMethods||[];
  const brewKey = methods.includes("Espresso") ? "espresso" : methods.includes("French Press") ? "fpress" : "filter";
  const level   = roastLevel||"Medium";
  const [tf,pe,ge,ae] = (FRESH_MATRIX[level]||FRESH_MATRIX["Medium"])[brewKey];
  if (days < tf)  return {label:"⏳ Too Fresh", color:"#8A7040", bg:"rgba(120,100,60,0.15)"};
  if (days <= pe) return {label:"✓ Prime",     color:"var(--green)", bg:"rgba(90,136,96,0.14)"};
  if (days <= ge) return {label:"◷ Good",      color:"var(--tx2)", bg:"rgba(154,112,80,0.12)"};
  if (days <= ae) return {label:"⚡ Aging",    color:"var(--accent)", bg:"rgba(200,120,64,0.12)"};
  return              {label:"⚠ Past Peak",  color:"var(--red)", bg:"var(--red-d)"};
}

function normalizeDiaLin(d) {
  return {
    roastDate:"", beanLocation:"open", dialStatus:"dialed",
    experimenting:false, isEarlyEntry:false,
    wouldBuy:false, isChoice:false, tags:[], brewMethods:[],
    dialEase:null, dialStability:null,
    filterBloomGrams:0, filterBloomSeconds:0, filterPours:0,
    coffeeUrl:"", coffeeDescription:"", notes:"",
    ...d
  };
}

function groupDuplicates(dialins) {
  const key = d => `${(d.coffeeName||"").toLowerCase().trim()}⌀${(d.roaster||"").toLowerCase().trim()}`;
  const groups = {};
  dialins.forEach(d=>{ const k=key(d); if(!groups[k]) groups[k]=[]; groups[k].push(d); });
  return Object.values(groups).filter(g=>g.length>1);
}

// ── GITHUB API ────────────────────────────────────────────────────────────────
async function ghRead(s, file) {
  const r = await fetch(`https://raw.githubusercontent.com/${s.owner}/${s.repo}/main/${file}?_=${Date.now()}`);
  if (!r.ok) throw new Error(`${file}: HTTP ${r.status}`);
  return r.json();
}
async function ghGetSha(s, file) {
  if (!s.token) return null;
  const r = await fetch(`https://api.github.com/repos/${s.owner}/${s.repo}/contents/${file}?ref=main`,
    { headers:{ Authorization:`Bearer ${s.token}`, Accept:"application/vnd.github+json" } });
  if (!r.ok) return null;
  return (await r.json()).sha||null;
}
async function ghWrite(s, file, data) {
  if (!s.token) throw new Error("No token");
  const api = `https://api.github.com/repos/${s.owner}/${s.repo}/contents/${file}`;
  const hdr = { Authorization:`Bearer ${s.token}`, Accept:"application/vnd.github+json", "Content-Type":"application/json" };
  const sha  = await ghGetSha(s,file);
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  const res  = await fetch(api,{ method:"PUT", headers:hdr, body:JSON.stringify({
    message:`Update ${file} via Dial-In App v3`, content, branch:"main", ...(sha?{sha}:{})
  })});
  if (!res.ok) { const e=await res.json(); throw new Error(e.message); }
}

// ── HOME SCREEN ───────────────────────────────────────────────────────────────
function HomeScreen({ kits, dialins, nav, onSync, syncing, lastSync }) {
  const [showAll, setShowAll] = useState(false);
  const [sort,    setSort]    = useState("recent");

  const norm = useMemo(()=>dialins.map(normalizeDiaLin),[dialins]);

  const active = useMemo(()=>norm.filter(d=>d.beanLocation!=="empty"),[norm]);
  const display = showAll ? norm : active;

  const sorted = useMemo(()=>[...display].sort((a,b)=>{
    if (sort==="rating") return (b.rating||0)-(a.rating||0);
    if (sort==="roast")  return (b.roastDate||b.date||"").localeCompare(a.roastDate||a.date||"");
    if (sort==="name")   return (a.coffeeName||"").localeCompare(b.coffeeName||"");
    return (b.date||"").localeCompare(a.date||"");
  }),[display,sort]);

  const comingSoon = [...new Set(
    norm.filter(d=>{
      if (!d.roastDate||d.beanLocation==="frozen"||d.beanLocation==="empty") return false;
      const days=Math.floor((Date.now()-new Date(d.roastDate))/86400000);
      return days>=4&&days<=6;
    }).map(d=>d.coffeeName)
  )];

  return (
    <div className="screen fade-in">
      <div className="hdr">
        <div style={{flex:1}}>
          <div className="hdr-title">Active Coffees</div>
          <div className="hdr-sub">{lastSync?`Synced ${lastSync}`:`${active.length} active · ${dialins.length} logged`}</div>
        </div>
        <button className="icon-btn" onClick={onSync} title="Sync from GitHub">
          <span className={syncing?"spin":""}>{syncing?"↻":"⟳"}</span>
        </button>
      </div>
      <div className="controls-row">
        <div className="controls-chips">
          <div className={`chip${!showAll?" chip-on":""}`} onClick={()=>setShowAll(false)}>
            Active {!showAll&&active.length>0&&`(${active.length})`}
          </div>
          <div className={`chip${showAll?" chip-on":""}`} onClick={()=>setShowAll(true)}>All</div>
        </div>
        <select className="sort-sel" value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="recent">Recent</option>
          <option value="roast">Roast Date</option>
          <option value="rating">Rating</option>
          <option value="name">Name</option>
        </select>
      </div>
      {comingSoon.length>0 && (
        <div className="alert-prime">✓ Entering prime window: {comingSoon.join(", ")}</div>
      )}
      <div style={{marginTop:"12px"}}>
        {sorted.length===0
          ? <div className="empty">
              <div className="empty-ico">☕</div>
              <div className="empty-t">{showAll?"No coffees yet":"No active coffees"}</div>
              <div className="empty-s">{showAll?"Add your first dial-in":"All bags finished — tap All to see history"}</div>
            </div>
          : sorted.map(d=><DialInCard key={d.id} d={d} kits={kits} onClick={()=>nav("dialin",d,"home")}/>)
        }
      </div>
    </div>
  );
}

// ── LOGBOOK ───────────────────────────────────────────────────────────────────
function LogbookScreen({ kits, dialins, nav }) {
  const [q,       setQ]       = useState("");
  const [brewF,   setBrewF]   = useState([]);
  const [locF,    setLocF]    = useState([]);
  const [statusF, setStatusF] = useState("all");
  const [beansF,  setBeansF]  = useState("all");
  const [sort,    setSort]    = useState("recent");

  const toggleArr = (arr, set, val) => set(arr.includes(val) ? arr.filter(x=>x!==val) : [...arr, val]);

  const filtered = useMemo(()=>{
    return dialins.filter(d=>{
      const norm = normalizeDiaLin(d);
      const kit  = kits.find(k=>k.id===d.kitId);
      const sm   = !q||[d.coffeeName,d.roaster,d.origin,d.process,d.grindSetting,d.flavorNotes].join(" ").toLowerCase().includes(q.toLowerCase());
      const bm   = brewF.length===0
        || (brewF.includes("espr") && norm.brewMethods.includes("Espresso"))
        || (brewF.includes("pour") && norm.brewMethods.includes("Pour Over"))
        || (brewF.includes("frpr") && norm.brewMethods.includes("French Press"));
      const lm   = locF.length===0
        || (locF.includes("home") && kit?.location==="home")
        || (locF.includes("offc") && kit?.location==="office");
      const stm  = statusF==="all"
        ||(statusF==="waiting"      && norm.dialStatus==="waiting")
        ||(statusF==="dialing"      && norm.dialStatus==="dialing")
        ||(statusF==="dialed"       && norm.dialStatus==="dialed")
        ||(statusF==="abandoned"    && norm.dialStatus==="abandoned")
        ||(statusF==="experimenting"&& norm.experimenting===true);
      const blm  = beansF==="all"
        ||(beansF==="shelf"  && norm.beanLocation==="shelf")
        ||(beansF==="open"   && norm.beanLocation==="open")
        ||(beansF==="frozen" && norm.beanLocation==="frozen")
        ||(beansF==="empty"  && norm.beanLocation==="empty");
      return sm&&bm&&lm&&stm&&blm;
    }).sort((a,b)=>{
      if (sort==="rating") return (b.rating||0)-(a.rating||0);
      if (sort==="name")   return (a.coffeeName||"").localeCompare(b.coffeeName||"");
      if (sort==="roast")  return (b.roastDate||b.date||"").localeCompare(a.roastDate||a.date||"");
      return (b.date||"").localeCompare(a.date||"");
    });
  },[dialins,kits,q,brewF,locF,statusF,beansF,sort]);

  // Multi-select row (toggle each chip independently, empty = all)
  const MultiRow = ({label, opts, val, set}) => (
    <div className="filter-block">
      <div className="filter-label">{label}</div>
      <div className="chips">
        {opts.map(([v,l])=>(
          <div key={v} className={`chip${val.includes(v)?" chip-on":""}`} onClick={()=>toggleArr(val,set,v)}>{l}</div>
        ))}
      </div>
    </div>
  );

  // Single-select row
  const SingleRow = ({label, opts, val, set}) => (
    <div className="filter-block">
      <div className="filter-label">{label}</div>
      <div className="chips">
        {opts.map(([v,l])=><div key={v} className={`chip${val===v?" chip-on":""}`} onClick={()=>set(v)}>{l}</div>)}
      </div>
    </div>
  );

  return (
    <div className="screen fade-in">
      <div className="hdr">
        <div style={{flex:1}}>
          <div className="hdr-title">Logbook</div>
          <div className="hdr-sub">{dialins.length} total · {filtered.length} shown</div>
        </div>
        <select className="sort-sel" value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="recent">Recent</option>
          <option value="roast">Roast</option>
          <option value="rating">Rating ↓</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
      <div className="search-wrap">
        <span className="search-ico">⌕</span>
        <input className="search-input" placeholder="Search coffee, origin, grind, flavour…" value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <div style={{padding:"6px 0 8px"}}>
        <MultiRow  label="Brew"   opts={[["espr","ESPR"],["pour","POUR"],["frpr","FRPR"]]} val={brewF} set={setBrewF}/>
        <MultiRow  label="Kit"    opts={[["home","HOME"],["offc","OFFC"]]}                  val={locF}  set={setLocF}/>
        <SingleRow label="Status" opts={[["all","ALL"],["waiting","WAITING"],["dialing","DIALING"],["dialed","DIALED"],["abandoned","ABANDONED"],["experimenting","EXP"]]} val={statusF} set={setStatusF}/>
        <SingleRow label="Beans"  opts={[["all","ALL"],["shelf","SHELF"],["open","OPEN"],["frozen","FROZEN"],["empty","DONE"]]} val={beansF} set={setBeansF}/>
      </div>
      {filtered.length===0
        ? <div className="empty"><div className="empty-ico">◉</div><div className="empty-t">No results</div><div className="empty-s">{q?"Try a different search":"No entries match these filters"}</div></div>
        : filtered.map(d=><DialInCard key={d.id} d={d} kits={kits} onClick={()=>nav("dialin",d,"logbook")}/>)
      }
    </div>
  );
}

            ? <a href={norm.coffeeUrl} target="_blank" rel="noopener" style={{color:"var(--accent)",textDecoration:"none"}}>{d.roaster} ↗</a>
            : d.roaster}
        </div>
        <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginTop:"8px"}}>
          <DialStatusBadge dialStatus={norm.dialStatus} experimenting={norm.experimenting}/>
          <KitLocBadge kit={kit}/>
          <BrewBadges brewMethods={norm.brewMethods}/>
          {d.process    && <span className="badge b-process">{d.process}</span>}
          {d.roastLevel && <span className="badge b-roast">{d.roastLevel}</span>}
          {freshness    && <span className="badge" style={{background:freshness.bg,color:freshness.color}}>{freshness.label}</span>}
          <BeanLocationBadge beanLocation={norm.beanLocation}/>
          {norm.wouldBuy    && <span className="badge b-would-buy">🛒 WOULD BUY</span>}
          {norm.isChoice    && <span className="badge b-choice">★ MY PICK</span>}
          {norm.isEarlyEntry&& <span className="badge b-early">EARLY ENTRY</span>}
        </div>
        {norm.tags&&norm.tags.length>0 && (
          <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginTop:"8px"}}>
            {norm.tags.map(t=><span key={t} style={{fontSize:"10px",padding:"2px 8px",background:"var(--elevated)",borderRadius:"4px",color:"var(--tx3)"}}>{t}</span>)}
          </div>
        )}
      </div>

      {/* Grind — dominant */}
      <div className="sec">Grind</div>
      <div style={{padding:"0 18px 20px",display:"flex",alignItems:"baseline",gap:"14px"}}>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:"56px",fontWeight:500,color:"var(--accent)",lineHeight:1,textShadow:"0 0 32px rgba(200,120,64,0.2)"}}>{d.grindSetting||"—"}</div>
        <div>
          <div style={{fontSize:"13px",color:"var(--tx2)"}}>{d.grinder}</div>
          <div style={{fontSize:"10px",letterSpacing:".1em",textTransform:"uppercase",color:"var(--tx3)",marginTop:"2px"}}>Setting</div>
        </div>
      </div>

      {/* Extraction */}
      {(d.doseIn||d.yieldOut||d.timeSeconds||d.temperature) && <>
        <div className="div"/>
        <div className="sec">{isFilter?"Brew Recipe":"Extraction"}</div>
        <div style={{padding:"0 18px 18px"}}>
          {!isFilter ? (
            <div className="stats">
              {d.doseIn>0     && <div className="stat"><div className="stat-v">{d.doseIn}<span>g</span></div><div className="stat-l">Dose</div></div>}
              {d.yieldOut>0   && <div className="stat"><div className="stat-v">{d.yieldOut}<span>g</span></div><div className="stat-l">Yield</div></div>}
              {r              && <div className="stat"><div className="stat-v" style={{fontSize:"14px"}}>{r}</div><div className="stat-l">Ratio</div></div>}
              {d.timeSeconds>0&& <div className="stat"><div className="stat-v">{d.timeSeconds}<span>s</span></div><div className="stat-l">Time</div></div>}
              {d.temperature>0&& <div className="stat"><div className="stat-v">{d.temperature}<span>°</span></div><div className="stat-l">Temp</div></div>}
            </div>
          ) : (
            <div className="stats" style={{flexWrap:"wrap"}}>
              {d.doseIn>0     && <div className="stat"><div className="stat-v">{d.doseIn}<span>g</span></div><div className="stat-l">Coffee</div></div>}
              {d.yieldOut>0   && <div className="stat"><div className="stat-v">{d.yieldOut}<span>ml</span></div><div className="stat-l">Water</div></div>}
              {r              && <div className="stat"><div className="stat-v" style={{fontSize:"14px"}}>{r}</div><div className="stat-l">Ratio</div></div>}
              {d.temperature>0&& <div className="stat"><div className="stat-v">{d.temperature}<span>°</span></div><div className="stat-l">Temp</div></div>}
              {d.timeSeconds>0&& <div className="stat"><div className="stat-v">{Math.floor(d.timeSeconds/60)}:{String(d.timeSeconds%60).padStart(2,"0")}</div><div className="stat-l">Total</div></div>}
            </div>
          )}
          {isFilter&&(norm.filterBloomGrams>0||norm.filterPours>0)&&(
            <div style={{marginTop:"12px",padding:"12px 14px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"9px",fontSize:"12px",color:"var(--tx2)",lineHeight:"2"}}>
              {norm.filterBloomGrams>0&&<div>① Bloom: <span style={{color:"var(--tx1)",fontFamily:"'DM Mono',monospace"}}>{norm.filterBloomGrams}g</span> · <span style={{color:"var(--tx1)",fontFamily:"'DM Mono',monospace"}}>{norm.filterBloomSeconds||45}s</span></div>}
              {norm.filterPours>0     &&<div>Pours: <span style={{color:"var(--tx1)",fontFamily:"'DM Mono',monospace"}}>{norm.filterPours}×</span> after bloom</div>}
            </div>
          )}
        </div>
      </>}

      {/* Dial Quality */}
      {(norm.dialEase||norm.dialStability)&&<>
        <div className="div"/>
        <div className="sec">Dial Quality</div>
        <div style={{padding:"0 18px 16px",display:"flex",gap:"7px",flexWrap:"wrap"}}>
          {norm.dialEase    && <span className={`badge b-ease-${norm.dialEase}`}>{norm.dialEase.toUpperCase()}</span>}
          {norm.dialStability&&<span className={`badge b-stab-${norm.dialStability}`}>{norm.dialStability.toUpperCase()}</span>}
        </div>
      </>}

      {/* Coffee Info */}
      <div className="div"/>
      <div className="sec">Coffee Info</div>
      <div style={{padding:"0 18px 18px"}}>
        {[
          ["Origin",    `${d.origin||""}${d.region?` · ${d.region}`:""}`],
          ["Process",   d.process],
          ["Roast",     d.roastLevel],
          ["Brewed as", norm.brewMethods?.join(" · ")],
          ["Roast date",norm.roastDate?fmt(norm.roastDate):null],
          ["Flavour",   d.flavorNotes],
        ].filter(([,v])=>v&&String(v).trim()).map(([lbl,val])=>(
          <div key={lbl} className="det-row">
            <div className="det-label">{lbl}</div>
            <div className="det-val">{val}</div>
          </div>
        ))}
      </div>

      {/* About */}
      {norm.coffeeDescription&&<>
        <div className="div"/>
        <div className="sec">About this Coffee</div>
        <div style={{padding:"0 18px 16px",fontSize:"13px",color:"var(--tx2)",lineHeight:"1.7"}}>{norm.coffeeDescription}</div>
        {norm.coffeeUrl&&<div style={{padding:"0 18px 20px"}}>
          <a href={norm.coffeeUrl} target="_blank" rel="noopener"
            style={{display:"inline-flex",alignItems:"center",gap:"6px",fontSize:"12px",color:"var(--accent)",textDecoration:"none",border:"1px solid var(--border)",borderRadius:"7px",padding:"7px 12px"}}>
            View coffee page ↗
          </a>
        </div>}
      </>}

      {/* Notes */}
      {norm.notes&&<><div className="div"/><div className="sec">Tasting Notes</div><div className="det-notes">"{norm.notes}"</div></>}
    </div>
  );
}

// ── ADD DIAL-IN ───────────────────────────────────────────────────────────────
function AddDialIn({ kits, dialins, onSave, nav }) {
  const today = new Date().toISOString().split("T")[0];
  const defKit = kits[0];
  const defGrinder = defKit?.equipment.find(e=>e.category==="Grinder")?.name||"";
  const [f,setF] = useState({
    date:today, kitId:defKit?.id||"", coffeeName:"", roaster:"",
    origin:"", region:"", process:"Washed", roastLevel:"Light",
    brewMethods:[], roastDate:"", flavorNotes:"",
    grindSetting:"", grinder:defGrinder,
    doseIn:"", yieldOut:"", timeSeconds:"", temperature:"",
    rating:0, dialStatus:"dialing", experimenting:false,
    dialEase:null, dialStability:null,
    beanLocation:"open", wouldBuy:false, isChoice:false, isEarlyEntry:false, tags:[],
    filterBloomGrams:"", filterBloomSeconds:"", filterPours:"",
    coffeeUrl:"", coffeeDescription:"", notes:"",
  });
  const [fetching, setFetching] = useState(false);
  const s = (k,v) => setF(p=>({...p,[k]:v}));
  const toggleTag  = t => s("tags", f.tags.includes(t)?f.tags.filter(x=>x!==t):[...f.tags,t]);
  const toggleBrew = m => s("brewMethods", f.brewMethods.includes(m)?f.brewMethods.filter(x=>x!==m):[...f.brewMethods,m]);
  const changeKit  = id => {
    const kit=kits.find(k=>k.id===id);
    s("kitId",id);
    s("grinder",kit?.equipment.find(e=>e.category==="Grinder")?.name||"");
  };
  const kit    = kits.find(k=>k.id===f.kitId);
  const isFilter = kit?.brewMethod==="filter"||kit?.brewMethod==="fpress";
  const r      = f.doseIn&&f.yieldOut ? ratio(+f.doseIn,+f.yieldOut) : null;
  const dupCheck = useMemo(()=>{
    if (!f.coffeeName.trim()) return [];
    const name=f.coffeeName.toLowerCase().trim(), rstr=f.roaster.toLowerCase().trim();
    return dialins.filter(d=>(d.coffeeName||"").toLowerCase().trim()===name&&(!rstr||(d.roaster||"").toLowerCase().trim()===rstr));
  },[dialins,f.coffeeName,f.roaster]);

  const fetchDesc = async () => {
    if (!f.coffeeUrl.trim()) return;
    setFetching(true);
    try {
      const proxy = `https://corsproxy.io/?${encodeURIComponent(f.coffeeUrl)}`;
      const res   = await fetch(proxy);
      const html  = await res.text();
      const doc   = new DOMParser().parseFromString(html,"text/html");
      const desc  = doc.querySelector('meta[property="og:description"]')?.content
                 || doc.querySelector('meta[name="description"]')?.content || "";
      const title = doc.querySelector('meta[property="og:title"]')?.content
                 || doc.querySelector('title')?.textContent || "";
      if (desc||title) s("coffeeDescription",[title,desc].filter(Boolean).join("\n"));
    } catch(e) { /* silent — user fills manually */ }
    setFetching(false);
  };

  const save = () => {
    if (!f.coffeeName||!f.kitId) return;
    onSave({...f, id:uid(),
      doseIn:+f.doseIn, yieldOut:+f.yieldOut, timeSeconds:+f.timeSeconds, temperature:+f.temperature,
      filterBloomGrams:+f.filterBloomGrams, filterBloomSeconds:+f.filterBloomSeconds, filterPours:+f.filterPours,
    });
  };

  return (
    <div className="screen fade-in">
      <div className="hdr">
        <button className="icon-btn" onClick={()=>nav("home")}>←</button>
        <div style={{flex:1}}><div className="hdr-title">New Dial-In</div><div className="hdr-sub">Log a coffee</div></div>
      </div>

      <div className="sec">Coffee</div>
      <div className="f-grp"><label className="f-lbl">Kit</label>
        <select className="f-sel" value={f.kitId} onChange={e=>changeKit(e.target.value)}>
          {kits.map(k=><option key={k.id} value={k.id}>{k.name}</option>)}
        </select>
      </div>
      <div className="f-grp"><label className="f-lbl">Coffee Name *</label>
        <input className="f-in" placeholder="e.g. Ethiopia Yirgacheffe Natural" value={f.coffeeName} onChange={e=>s("coffeeName",e.target.value)}/>
      </div>
      <div className="f-grp"><label className="f-lbl">Roaster</label>
        <input className="f-in" placeholder="e.g. The Barn" value={f.roaster} onChange={e=>s("roaster",e.target.value)}/>
      </div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Origin</label><input className="f-in" placeholder="Ethiopia" value={f.origin} onChange={e=>s("origin",e.target.value)}/></div>
        <div className="f-grp"><label className="f-lbl">Region</label><input className="f-in" placeholder="Yirgacheffe" value={f.region} onChange={e=>s("region",e.target.value)}/></div>
      </div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Process</label>
          <select className="f-sel" value={f.process} onChange={e=>s("process",e.target.value)}>{PROCESSES.map(o=><option key={o}>{o}</option>)}</select>
        </div>
        <div className="f-grp"><label className="f-lbl">Roast</label>
          <select className="f-sel" value={f.roastLevel} onChange={e=>s("roastLevel",e.target.value)}>{ROASTS.map(o=><option key={o}>{o}</option>)}</select>
        </div>
      </div>
      <div className="f-grp"><label className="f-lbl">Brew Methods</label>
        <div className="opt-chips">
          {BREW_METHODS.map(m=>(
            <div key={m} className={`opt-chip${f.brewMethods.includes(m)?" opt-chip-on":""}`} onClick={()=>toggleBrew(m)}>
              {m==="Espresso"?"ESPR":m==="Pour Over"?"POUR":"FRPR"}
            </div>
          ))}
        </div>
      </div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Dial-In Date</label><input className="f-in" type="date" value={f.date} onChange={e=>s("date",e.target.value)}/></div>
        <div className="f-grp"><label className="f-lbl">Roast Date</label><input className="f-in" type="date" value={f.roastDate} onChange={e=>s("roastDate",e.target.value)}/></div>
      </div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Bean Location</label>
          <select className="f-sel" value={f.beanLocation} onChange={e=>s("beanLocation",e.target.value)}>
            {BEAN_LOCS.map(o=><option key={o} value={o}>{o.charAt(0).toUpperCase()+o.slice(1)}</option>)}
          </select>
        </div>
      </div>
      <div className="f-grp"><label className="f-lbl">Flavour Notes</label>
        <input className="f-in" placeholder="Blueberry, dark chocolate, citrus" value={f.flavorNotes} onChange={e=>s("flavorNotes",e.target.value)}/>
      </div>

      <div className="sec">Coffee Page</div>
      <div className="f-grp"><label className="f-lbl">Coffee URL</label>
        <div className="fetch-row">
          <input className="f-in" type="url" placeholder="https://roaster.com/product/…" value={f.coffeeUrl} onChange={e=>s("coffeeUrl",e.target.value)}/>
          <button className="btn-fetch" onClick={fetchDesc} disabled={fetching||!f.coffeeUrl.trim()}>
            {fetching?<span className="spin">↻</span>:"Fetch"}
          </button>
        </div>
        <div className="f-hint">Paste the product page URL — tap Fetch to auto-fill the description below.</div>
      </div>
      <div className="f-grp"><label className="f-lbl">Description</label>
        <textarea className="f-ta" style={{minHeight:"80px"}} placeholder="Roaster description, tasting notes from the bag…" value={f.coffeeDescription} onChange={e=>s("coffeeDescription",e.target.value)}/>
      </div>

      <div className="sec">Grind</div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Setting *</label><input className="f-in" placeholder="e.g. 12.5" value={f.grindSetting} onChange={e=>s("grindSetting",e.target.value)}/></div>
        <div className="f-grp"><label className="f-lbl">Grinder</label><input className="f-in" value={f.grinder} onChange={e=>s("grinder",e.target.value)}/></div>
      </div>

      <div className="sec">{isFilter?"Brew Recipe":"Extraction"}</div>
      {!isFilter ? <>
        <div className="f-row">
          <div className="f-grp"><label className="f-lbl">Dose (g)</label><input className="f-in" type="number" placeholder="18" value={f.doseIn} onChange={e=>s("doseIn",e.target.value)}/></div>
          <div className="f-grp">
            <label className="f-lbl">Yield (g){r&&<span style={{color:"var(--accent)",fontFamily:"'DM Mono',monospace",fontSize:"10px",marginLeft:"6px"}}>{r}</span>}</label>
            <input className="f-in" type="number" placeholder="36" value={f.yieldOut} onChange={e=>s("yieldOut",e.target.value)}/>
          </div>
        </div>
        <div className="f-row">
          <div className="f-grp"><label className="f-lbl">Time (s)</label><input className="f-in" type="number" placeholder="28" value={f.timeSeconds} onChange={e=>s("timeSeconds",e.target.value)}/></div>
          <div className="f-grp"><label className="f-lbl">Temp (°C)</label><input className="f-in" type="number" placeholder="93" value={f.temperature} onChange={e=>s("temperature",e.target.value)}/></div>
        </div>
      </> : <>
        <div className="f-row">
          <div className="f-grp"><label className="f-lbl">Coffee (g)</label><input className="f-in" type="number" placeholder="20" value={f.doseIn} onChange={e=>s("doseIn",e.target.value)}/></div>
          <div className="f-grp">
            <label className="f-lbl">Water (ml){r&&<span style={{color:"var(--accent)",fontFamily:"'DM Mono',monospace",fontSize:"10px",marginLeft:"6px"}}>{r}</span>}</label>
            <input className="f-in" type="number" placeholder="300" value={f.yieldOut} onChange={e=>s("yieldOut",e.target.value)}/>
          </div>
        </div>
        <div className="f-row">
          <div className="f-grp"><label className="f-lbl">Temp (°C)</label><input className="f-in" type="number" placeholder="91" value={f.temperature} onChange={e=>s("temperature",e.target.value)}/></div>
          <div className="f-grp"><label className="f-lbl">Total Time (s)</label><input className="f-in" type="number" placeholder="195" value={f.timeSeconds} onChange={e=>s("timeSeconds",e.target.value)}/></div>
        </div>
        <div className="f-row">
          <div className="f-grp"><label className="f-lbl">Bloom (g)</label><input className="f-in" type="number" placeholder="40" value={f.filterBloomGrams} onChange={e=>s("filterBloomGrams",e.target.value)}/></div>
          <div className="f-grp"><label className="f-lbl">Bloom (s)</label><input className="f-in" type="number" placeholder="45" value={f.filterBloomSeconds} onChange={e=>s("filterBloomSeconds",e.target.value)}/></div>
        </div>
        <div className="f-row">
          <div className="f-grp"><label className="f-lbl">Pours</label><input className="f-in" type="number" placeholder="4" value={f.filterPours} onChange={e=>s("filterPours",e.target.value)}/></div>
        </div>
      </>}

      <div className="sec">Assessment</div>
      <div className="f-grp"><label className="f-lbl">Dial Status</label>
        <div className="opt-chips">
          {DIAL_STATUSES.map(o=><div key={o} className={`opt-chip${f.dialStatus===o?" opt-chip-on":""}`} onClick={()=>s("dialStatus",o)}>{o.charAt(0).toUpperCase()+o.slice(1)}</div>)}
        </div>
      </div>
      <div className="toggle-row">
        <div><div className="toggle-lbl">Experimenting</div><div className="toggle-sub">Still exploring even if dialed</div></div>
        <Toggle on={f.experimenting} onToggle={()=>s("experimenting",!f.experimenting)}/>
      </div>
      <div className="f-grp"><label className="f-lbl">Dial Ease</label>
        <div className="opt-chips">
          {["easy","medium","hard"].map(o=><div key={o} className={`opt-chip${f.dialEase===o?" opt-chip-on":""}`} onClick={()=>s("dialEase",f.dialEase===o?null:o)}>{o.charAt(0).toUpperCase()+o.slice(1)}</div>)}
        </div>
      </div>
      <div className="f-grp"><label className="f-lbl">Dial Stability</label>
        <div className="opt-chips">
          {["stable","unstable"].map(o=><div key={o} className={`opt-chip${f.dialStability===o?" opt-chip-on":""}`} onClick={()=>s("dialStability",f.dialStability===o?null:o)}>{o.charAt(0).toUpperCase()+o.slice(1)}</div>)}
        </div>
      </div>
      <div className="f-grp"><label className="f-lbl">Rating</label><StarInput val={f.rating} set={v=>s("rating",v)}/></div>
      <div className="f-grp"><label className="f-lbl">Tags</label>
        <div className="opt-chips">{DIAL_TAGS.map(t=><div key={t} className={`opt-chip${f.tags.includes(t)?" opt-chip-on":""}`} onClick={()=>toggleTag(t)}>{t}</div>)}</div>
      </div>
      <div className="toggle-row"><div><div className="toggle-lbl">Would Buy Again</div></div><Toggle on={f.wouldBuy} onToggle={()=>s("wouldBuy",!f.wouldBuy)}/></div>
      <div className="toggle-row"><div><div className="toggle-lbl">My Pick</div><div className="toggle-sub">Something special about this one</div></div><Toggle on={f.isChoice} onToggle={()=>s("isChoice",!f.isChoice)}/></div>
      <div className="toggle-row"><div><div className="toggle-lbl">Early Entry</div><div className="toggle-sub">Mark as learning period entry</div></div><Toggle on={f.isEarlyEntry} onToggle={()=>s("isEarlyEntry",!f.isEarlyEntry)}/></div>
      <div className="f-grp" style={{marginTop:"10px"}}><label className="f-lbl">Notes</label>
        <textarea className="f-ta" placeholder="Tasting notes, what to adjust next time…" value={f.notes} onChange={e=>s("notes",e.target.value)}/>
      </div>
      <div className="btn-area">
        {dupCheck.length>0&&(
          <div style={{padding:"10px 14px",background:"rgba(200,120,64,0.08)",border:"1px solid rgba(200,120,64,0.22)",borderRadius:"9px",fontSize:"12px",color:"var(--accent)",lineHeight:"1.55"}}>
            ⚠ {dupCheck.length} existing entr{dupCheck.length===1?"y":"ies"} found for this coffee. This will add a new record.
          </div>
        )}
        <button className="btn btn-p" onClick={save} disabled={!f.coffeeName||!f.kitId}>Save Dial-In</button>
        <button className="btn btn-s" onClick={()=>nav("home")}>Cancel</button>
      </div>
    </div>
  );
}

  const toggleBrew = m => s("brewMethods", f.brewMethods.includes(m)?f.brewMethods.filter(x=>x!==m):[...f.brewMethods,m]);

  const isFilter = kit?.brewMethod==="filter"||kit?.brewMethod==="fpress";

      const doc   = new DOMParser().parseFromString(html,"text/html");
      const desc  = doc.querySelector('meta[property="og:description"]')?.content

      const title = doc.querySelector('meta[property="og:title"]')?.content
                 || doc.querySelector('title')?.textContent || "";
      if (desc||title) s("coffeeDescription",[title,desc].filter(Boolean).join("\n"));
    } catch(e) {}
    setFetching(false);
  };

  const save = () => {
    if (!f.coffeeName) return;

// ── EDIT KIT ──────────────────────────────────────────────────────────────────
function EditKit({ kit, onSave, nav }) {
  const [name,    setName]    = useState(kit.name);
  const [sub,     setSub]     = useState(kit.subtitle||"");
  const [loc,     setLoc]     = useState(kit.location||"home");
  const [brew,    setBrew]    = useState(kit.brewMethod||"espresso");
  const [equip,   setEquip]   = useState(kit.equipment.map(e=>({...e})));
  const updateEq = (i,k,v) => setEquip(p=>p.map((e,j)=>j===i?{...e,[k]:v}:e));
  const addEq    = () => setEquip(p=>[...p,{category:"",name:"",notes:""}]);
  const removeEq = i => setEquip(p=>p.filter((_,j)=>j!==i));
  const save     = () => onSave({...kit,name,subtitle:sub,location:loc,brewMethod:brew,equipment:equip.filter(e=>e.name)});
  return (
    <div className="screen fade-in">
      <div className="hdr">
        <button className="icon-btn" onClick={()=>nav("kit",kit)}>←</button>
        <div style={{flex:1}}><div className="hdr-title">Edit Kit</div><div className="hdr-sub">{kit.name}</div></div>
      </div>
      <div className="sec">Kit Info</div>
      <div className="f-grp"><label className="f-lbl">Name</label><input className="f-in" value={name} onChange={e=>setName(e.target.value)}/></div>
      <div className="f-grp"><label className="f-lbl">Subtitle</label><input className="f-in" value={sub} onChange={e=>setSub(e.target.value)}/></div>
      <div className="f-row">
        <div className="f-grp"><label className="f-lbl">Location</label>
          <select className="f-sel" value={loc} onChange={e=>setLoc(e.target.value)}>
            <option value="home">Home</option>
            <option value="office">Office</option>
          </select>
        </div>
        <div className="f-grp"><label className="f-lbl">Brew Method</label>
          <select className="f-sel" value={brew} onChange={e=>setBrew(e.target.value)}>
            <option value="espresso">Espresso</option>
            <option value="filter">Pour Over / Filter</option>
            <option value="fpress">French Press</option>
          </select>
        </div>
      </div>
      <div className="sec">Equipment</div>
      {equip.map((e,i)=>(
        <div key={i} style={{margin:"0 18px 10px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"10px",padding:"12px"}}>
          <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
            <input className="f-in" style={{flex:"0 0 90px"}} placeholder="Category" value={e.category} onChange={v=>updateEq(i,"category",v.target.value)}/>
            <input className="f-in" style={{flex:1}} placeholder="Product name" value={e.name} onChange={v=>updateEq(i,"name",v.target.value)}/>
          </div>
          <div style={{display:"flex",gap:"8px"}}>
            <input className="f-in" style={{flex:1}} placeholder="Notes (optional)" value={e.notes||""} onChange={v=>updateEq(i,"notes",v.target.value)}/>
            <button onClick={()=>removeEq(i)} style={{background:"var(--red-d)",border:"1px solid rgba(160,80,80,.3)",color:"var(--red)",borderRadius:"7px",padding:"0 10px",cursor:"pointer",flexShrink:0}}>✕</button>
          </div>
        </div>
      ))}
      <div style={{padding:"0 18px 14px"}}>
        <button className="btn btn-s" onClick={addEq}>+ Add Equipment</button>
      </div>
      <div className="btn-area">
        <button className="btn btn-p" onClick={save}>Save Kit</button>
        <button className="btn btn-s" onClick={()=>nav("kit",kit)}>Cancel</button>
      </div>
    </div>
  );
}

// ── PROFILE SCREEN ────────────────────────────────────────────────────────────
function ProfileScreen({ dialins, kits, palateSummary }) {
  const norm     = useMemo(()=>dialins.map(normalizeDiaLin),[dialins]);
  const rated    = norm.filter(d=>d.rating>0);
  const avgRating= rated.length?(rated.reduce((a,d)=>a+d.rating,0)/rated.length).toFixed(1):"—";
  const topRated = [...norm].filter(d=>d.rating>=4).sort((a,b)=>b.rating-a.rating).slice(0,5);
  const myPicks  = norm.filter(d=>d.isChoice);
  const wouldBuy = norm.filter(d=>d.wouldBuy);

  const originCounts={}, processCounts={};
  norm.forEach(d=>{
    if(d.origin)  originCounts[d.origin]  =(originCounts[d.origin] ||0)+1;
    if(d.process) processCounts[d.process]=(processCounts[d.process]||0)+1;
  });
  const topOrigins = Object.entries(originCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);

  return (
    <div className="screen fade-in">
      <div className="hdr">
        <div style={{flex:1}}><div className="hdr-title">My Profile</div><div className="hdr-sub">Coffee taste DNA</div></div>
      </div>
      <div className="sec">Journey</div>
      <div style={{padding:"0 18px 16px"}}>
        <div className="stats">
          <div className="stat"><div className="stat-v">{dialins.length}</div><div className="stat-l">Logged</div></div>
          <div className="stat"><div className="stat-v">{avgRating}</div><div className="stat-l">Avg ★</div></div>
          <div className="stat"><div className="stat-v">{rated.filter(d=>d.rating>=4).length}</div><div className="stat-l">4★+</div></div>
          <div className="stat"><div className="stat-v">{wouldBuy.length}</div><div className="stat-l">Would Buy</div></div>
        </div>
      </div>

      {myPicks.length>0&&<>
        <div className="sec">My Picks</div>
        {myPicks.map(d=>(
          <div key={d.id} className="profile-item">
            <div style={{flex:1}}>
              <div style={{fontSize:"10px",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--accent)",marginBottom:"2px"}}>{d.roaster}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"16px",fontWeight:500}}>{d.coffeeName}</div>
            </div>
            {d.rating>0&&<Stars n={d.rating}/>}
          </div>
        ))}
      </>}

      {topRated.length>0&&<>
        <div className="sec">Top Rated</div>
        {topRated.map(d=>(
          <div key={d.id} className="profile-item">
            <div style={{flex:1}}>
              <div style={{fontSize:"10px",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--accent)",marginBottom:"2px"}}>{d.roaster}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"16px",fontWeight:500}}>{d.coffeeName}</div>
              <div style={{fontSize:"11px",color:"var(--tx3)",marginTop:"2px"}}>{d.origin}{d.process?` · ${d.process}`:""}</div>
            </div>
            <Stars n={d.rating}/>
          </div>
        ))}
      </>}

      <div className="sec">Taste DNA</div>
      {topOrigins.length>0&&(
        <div style={{padding:"0 18px 14px"}}>
          <div style={{fontSize:"9px",fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",color:"var(--tx3)",marginBottom:"8px"}}>Origins Explored</div>
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
            {topOrigins.map(([o,c])=>(
              <div key={o} className="dna-tag">{o} <span style={{color:"var(--accent)",fontFamily:"'DM Mono',monospace",fontSize:"10px"}}>{c}</span></div>
            ))}
          </div>
        </div>
      )}
      {Object.keys(processCounts).length>0&&(
        <div style={{padding:"0 18px 14px"}}>
          <div style={{fontSize:"9px",fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",color:"var(--tx3)",marginBottom:"8px"}}>Processes</div>
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
            {Object.entries(processCounts).sort((a,b)=>b[1]-a[1]).map(([p,c])=>(
              <div key={p} style={{padding:"4px 10px",background:"var(--blue-d)",border:"1px solid rgba(90,112,152,0.2)",borderRadius:"6px",fontSize:"12px",color:"var(--blue)"}}>
                {p} <span style={{fontFamily:"'DM Mono',monospace",fontSize:"10px"}}>{c}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {palateSummary&&<>
        <div className="sec">Palate Summary</div>
        <div className="taste-card">
          <div style={{whiteSpace:"pre-wrap",lineHeight:"1.75"}}>{palateSummary}</div>
          <div style={{marginTop:"12px",fontSize:"10px",color:"var(--tx3)",letterSpacing:".05em"}}>Updated March 2026 · {dialins.length} coffees tested</div>
        </div>
      </>}
    </div>
  );
}

      <div className="f-grp"><label className="f-lbl">GitHub Username</label>
        <input className="f-in" placeholder="trynerlu" value={f.owner} onChange={e=>s("owner",e.target.value)}/>
      </div>
      <div className="f-grp"><label className="f-lbl">Repository Name</label>
        <input className="f-in" placeholder="coffee-dialins" value={f.repo} onChange={e=>s("repo",e.target.value)}/>
      </div>
      <div className="f-grp"><label className="f-lbl">Personal Access Token</label>
        <input className="f-in" type="password" placeholder="ghp_… or github_pat_…" value={f.token} onChange={e=>s("token",e.target.value)}/>
        <div className="f-hint">Required for writing. Leave empty for read-only.</div>
      </div>
      <div className="btn-area">
        <button className="btn btn-p" onClick={save} disabled={!f.owner||!f.repo}>Save & Connect</button>
      </div>
      <div style={{padding:"0 18px 20px"}}>
        <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"9px",padding:"14px",fontFamily:"'DM Mono',monospace",fontSize:"11px",color:"var(--tx2)",lineHeight:"1.9"}}>
          your-repo/<br/>├── index.html &nbsp;&nbsp;← this app<br/>├── kits.json &nbsp;&nbsp;&nbsp;← equipment lists<br/>└── dialins.json ← your dial-ins
        </div>
        <div style={{marginTop:"11px",fontSize:"11px",color:"var(--tx3)"}}> App version: {APP_VERSION}</div>
      </div>
    </div>
  );
}

// ── IMPORT SCREEN ─────────────────────────────────────────────────────────────
function ImportScreen({ kits, onImport, nav }) {
  const [raw,setRaw]=useState(""); const [preview,setPreview]=useState(null); const [err,setErr]=useState("");
  const parse=()=>{
    setErr(""); setPreview(null);
    try {
      const trimmed=raw.trim().replace(/^```json|^```|```$/gm,"").trim();
      let parsed=JSON.parse(trimmed);
      if(!Array.isArray(parsed)) parsed=[parsed];
      const invalid=parsed.filter(e=>!e.coffeeName);
      if(invalid.length){setErr("Every entry needs at least a coffeeName.");return;}
      parsed=parsed.map(e=>({...normalizeDiaLin(e),id:e.id||uid(),date:e.date||new Date().toISOString().split("T")[0],kitId:e.kitId||kits[0]?.id||"home-espresso"}));
      setPreview(parsed);
    }catch(e){setErr("Could not parse JSON — copy the full block from Claude.");}
  };
  const kit=(id)=>kits.find(k=>k.id===id);
  return (
    <div className="screen fade-in">
      <div className="hdr">
        <button className="icon-btn" onClick={()=>nav("home")}>←</button>
        <div style={{flex:1}}><div className="hdr-title">Import from Claude</div><div className="hdr-sub">Paste · Preview · Save</div></div>
      </div>
      {!preview?<>
        <div style={{margin:"14px 18px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px",fontSize:"12px",color:"var(--tx2)",lineHeight:"1.65"}}>
          1. Chat with Claude about a new coffee<br/>
          2. Ask Claude to <em style={{color:"var(--tx1)"}}>generate a v3 dial-in JSON entry</em><br/>
          3. Copy the JSON block &amp; paste below → Preview → Save
        </div>
        <div className="f-grp">
          <textarea className="f-ta" style={{minHeight:"160px",fontFamily:"'DM Mono',monospace",fontSize:"12px"}}
            placeholder={'{\n  "coffeeName": "Ethiopia Yirgacheffe",\n  "roaster": "The Barn",\n  "brewMethods": ["Espresso"],\n  ...\n}'}
            value={raw} onChange={e=>{setRaw(e.target.value);setErr("");}}/>
          {err&&<div style={{fontSize:"12px",color:"#C05050",marginTop:"6px"}}>{err}</div>}
        </div>
        <div className="btn-area">
          <button className="btn btn-p" onClick={parse} disabled={!raw.trim()}>Preview</button>
          <button className="btn btn-s" onClick={()=>nav("home")}>Cancel</button>
        </div>
      </>:<>
        <div className="sec">Preview — {preview.length} entr{preview.length===1?"y":"ies"}</div>
        {preview.map((e,i)=>(
          <div key={i} style={{margin:"0 18px 10px",background:"var(--surface)",border:"1px solid var(--bh)",borderRadius:"12px",padding:"16px"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"18px",fontWeight:500,marginBottom:"4px"}}>{e.coffeeName}</div>
            <div style={{fontSize:"11px",color:"var(--tx2)",marginBottom:"11px"}}>{e.roaster} · {e.date}</div>
            <div style={{display:"flex",gap:"16px",marginBottom:"10px"}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:"28px",fontWeight:500,color:"var(--accent)",lineHeight:1}}>{e.grindSetting||"—"}</div>
                <div style={{fontSize:"9px",letterSpacing:".1em",textTransform:"uppercase",color:"var(--tx3)",marginTop:"2px"}}>Grind</div>
              </div>
              <div style={{flex:1,display:"flex",flexDirection:"column",gap:"4px",justifyContent:"center"}}>
                {e.doseIn>0&&<div style={{fontSize:"12px",color:"var(--tx2)"}}>Dose: <span style={{color:"var(--tx1)"}}>{e.doseIn}g → {e.yieldOut}{kit(e.kitId)?.brewMethod==="espresso"?"g":"ml"}</span></div>}
                {e.process&&<div style={{fontSize:"12px",color:"var(--tx2)"}}>Process: <span style={{color:"var(--tx1)"}}>{e.process}</span></div>}
                <div style={{fontSize:"12px",color:"var(--tx2)"}}>Kit: <span style={{color:"var(--tx1)"}}>{kit(e.kitId)?.name||e.kitId}</span></div>
              </div>
            </div>
            <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
              <BrewBadges brewMethods={e.brewMethods||[]}/>
            </div>
            {e.flavorNotes&&<div style={{fontSize:"12px",color:"var(--tx2)",fontStyle:"italic",marginTop:"8px"}}>"{e.flavorNotes}"</div>}
          </div>
        ))}
        <div className="btn-area">
          <button className="btn btn-p" onClick={()=>onImport(preview)}>Save to GitHub</button>
          <button className="btn btn-s" onClick={()=>setPreview(null)}>← Edit</button>
        </div>
      </>}
    </div>
  );
}

// ── DUPLICATES SCREEN ─────────────────────────────────────────────────────────
function DuplicatesScreen({ dialins, onRemove, nav }) {
  const groups = useMemo(()=>groupDuplicates(dialins),[dialins]);
  return (
    <div className="screen fade-in">
      <div className="hdr">
        <button className="icon-btn" onClick={()=>nav("settings")}>←</button>
        <div style={{flex:1}}><div className="hdr-title">Duplicates</div><div className="hdr-sub">{groups.length>0?`${groups.length} group${groups.length!==1?"s":""} found`:"All clean"}</div></div>
      </div>
      {groups.length===0
        ? <div className="empty"><div className="empty-ico">✓</div><div className="empty-t">No duplicates</div><div className="empty-s">Every entry is unique</div></div>
        : <>
          <div style={{margin:"12px 18px 4px",padding:"10px 14px",background:"rgba(200,120,64,0.07)",border:"1px solid rgba(200,120,64,0.18)",borderRadius:"9px",fontSize:"12px",color:"var(--tx2)",lineHeight:"1.6"}}>
            Same coffee logged more than once. Tap <strong style={{color:"var(--red)"}}>Remove</strong> on entries you no longer need.
          </div>
          {groups.map((group,gi)=>(
            <div key={gi} style={{margin:"10px 18px 0",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"12px",overflow:"hidden"}}>
              <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",background:"var(--elevated)"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"17px",fontWeight:500}}>{group[0].coffeeName}</div>
                <div style={{fontSize:"10px",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--accent)",marginTop:"2px"}}>{group[0].roaster||"No roaster"}</div>
              </div>
              {[...group].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map((d,di,arr)=>(
                <div key={d.id} style={{display:"flex",alignItems:"center",gap:"10px",padding:"11px 16px",borderBottom:di<arr.length-1?"1px solid var(--border)":"none"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:"var(--tx3)",marginBottom:"3px"}}>{fmt(d.date)}</div>
                    <div style={{display:"flex",alignItems:"center",gap:"7px",flexWrap:"wrap"}}>
                      {d.grindSetting&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:"15px",fontWeight:500,color:"var(--accent)"}}>{d.grindSetting}</span>}
                      {d.rating>0    &&<span style={{color:"var(--accent)",fontSize:"11px"}}>{"★".repeat(d.rating)}</span>}
                      {d.dialStatus  &&<span style={{fontSize:"10px",color:"var(--tx3)",background:"var(--elevated)",padding:"1px 6px",borderRadius:"4px"}}>{d.dialStatus}</span>}
                      {d.doseIn>0    &&<span style={{fontFamily:"'DM Mono',monospace",fontSize:"10px",color:"var(--tx2)"}}>{d.doseIn}→{d.yieldOut}</span>}
                    </div>
                  </div>
                  <button onClick={()=>onRemove(d.id)} style={{flexShrink:0,background:"var(--red-d)",border:"1px solid rgba(160,80,80,.3)",color:"var(--red)",borderRadius:"7px",padding:"6px 11px",cursor:"pointer",fontSize:"12px",fontFamily:"'Jost',sans-serif",fontWeight:500}}>Remove</button>
                </div>
              ))}
            </div>
          ))}
          <div style={{height:"20px"}}/>
        </>
      }
    </div>
  );
}

// ── SPLASH ────────────────────────────────────────────────────────────────────
function Splash() {
  return (
    <div className="splash">
      <div className="splash-title">Dial-In</div>
      <div className="splash-sub">Loading your setup</div>
      <div className="splash-bar"/>
    </div>
  );
}

// ── DEFAULT PALATE SUMMARY ────────────────────────────────────────────────────
const DEFAULT_PALATE = `What I enjoy
Expressive fruit-forward profiles — banana, tropical, berry. Anaerobic and experimental processes. Medium-light espresso roasts with character. Elegant filter coffees with floral notes (jasmine, white tea, bergamot). Costa Rica and Kenya as standout origins.

Anchor coffees
Well-structured blends that work for espresso and milk. Reliable, consistent profiles with good body and sweetness.

Less preferred
Flat or one-dimensional profiles. Very dark commercial roasts. One-note chocolatey profiles without complexity.

Quick reference
✓ Light–medium · washed or natural
✓ Fruity / floral / tea-like
✓ Ethiopia · Kenya · Colombia · Costa Rica
✗ Dark roasts · flat chocolatey profiles`;

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const [ready,      setReady]      = useState(false);
  const [screen,     setScreen]     = useState("home");
  const [prevScreen, setPrev]       = useState("home");
  const [curKit,     setCurKit]     = useState(null);
  const [curDial,    setCurDial]    = useState(null);
  const [kits,       setKits]       = useState(DEF_KITS);
  const [dialins,    setDialins]    = useState(DEF_DIALINS);
  const [syncing,    setSyncing]    = useState(false);
  const [toast,      setToast]      = useState(null);
  const [lastSync,   setLastSync]   = useState(null);
  const [settings,   setSettings]   = useState(()=>lsGet(LS.settings)||{});

  useEffect(()=>{
    const ck=lsGet(LS.kits), cd=lsGet(LS.dialins);
    if(ck) setKits(ck);
    if(cd) setDialins(cd);
    setReady(true);
    const s=lsGet(LS.settings)||{};
    if(s.owner&&s.repo&&navigator.onLine) autoSync(s,ck,cd);
  },[]);

  const autoSync=async(s,localKits,localDialins)=>{
    try {
      const [rk,rd]=await Promise.all([ghRead(s,"kits.json").catch(()=>null),ghRead(s,"dialins.json").catch(()=>null)]);
      if(rk&&JSON.stringify(rk)!==JSON.stringify(localKits))    { setKits(rk);    lsSet(LS.kits,rk); }
      if(rd&&JSON.stringify(rd)!==JSON.stringify(localDialins)) { setDialins(rd); lsSet(LS.dialins,rd); }
      setLastSync(new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
    }catch(e){}
  };

  const flash=(msg,ms=2800)=>{ setToast(msg); setTimeout(()=>setToast(null),ms); };

  const syncPull=async()=>{
    if(!settings.owner||!settings.repo){ flash("⚠ Configure GitHub in Settings"); setScreen("settings"); return; }
    setSyncing(true);
    try {
      const [k,d]=await Promise.all([ghRead(settings,"kits.json"),ghRead(settings,"dialins.json")]);
      setKits(k); lsSet(LS.kits,k);
      setDialins(d); lsSet(LS.dialins,d);
      setLastSync(new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
      flash("✓ Synced from GitHub");
    }catch(e){ flash(`✗ ${e.message}`); }
    setSyncing(false);
  };

  const addDialin=async(nd)=>{
    const updated=[nd,...dialins];
    setDialins(updated); lsSet(LS.dialins,updated);
    if(settings.token){ try{ await ghWrite(settings,"dialins.json",updated); flash("✓ Saved to GitHub"); }catch(e){ flash(`⚠ Saved locally. GitHub: ${e.message}`); } }
    else flash("✓ Saved locally");
    setScreen("home");
  };

  const importDialins=async(entries)=>{
    const updated=[...entries.map(e=>({...e,id:e.id||uid()})),...dialins];
    setDialins(updated); lsSet(LS.dialins,updated);
    if(settings.token){ try{ await ghWrite(settings,"dialins.json",updated); flash(`✓ ${entries.length} saved to GitHub`); }catch(e){ flash(`⚠ Saved locally. GitHub: ${e.message}`); } }
    else flash(`✓ ${entries.length} saved locally`);
    setScreen("home");
  };

  const saveSettings=async(s)=>{
    setSettings(s); lsSet(LS.settings,s); flash("✓ Settings saved — syncing…");
    setSyncing(true);
    try {
      const [k,d]=await Promise.all([ghRead(s,"kits.json"),ghRead(s,"dialins.json")]);
      setKits(k); lsSet(LS.kits,k);
      setDialins(d); lsSet(LS.dialins,d);
      setLastSync(new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
      flash("✓ Connected & synced");
    }catch(e){ flash(`⚠ Settings saved. Sync failed: ${e.message}`); }
    setSyncing(false);
  };

  const nav=(to,data=null,from=null)=>{
    setPrev(from||screen);
    if(to==="kit"    &&data) setCurKit(data);
    if(to==="dialin" &&data) setCurDial(data);
    setScreen(to);
  };

  const editDialin=(d)=>{ setCurDial(d); setScreen("editdialin"); };
  const editKit   =(k)=>{ setCurKit(k);  setScreen("editkit");    };

  const saveDialin=async(updated)=>{
    const newList=dialins.map(d=>d.id===updated.id?updated:d);
    setDialins(newList); lsSet(LS.dialins,newList);
    setCurDial(updated);
    if(settings.token){ try{ await ghWrite(settings,"dialins.json",newList); flash("✓ Saved to GitHub"); }catch(e){ flash(`⚠ Saved locally. GitHub: ${e.message}`); } }
    else flash("✓ Saved locally");
    setScreen("dialin");
  };

  const saveKit=async(updated)=>{
    const newList=kits.map(k=>k.id===updated.id?updated:k);
    setKits(newList); lsSet(LS.kits,newList);
    setCurKit(updated);
    if(settings.token){ try{ await ghWrite(settings,"kits.json",newList); flash("✓ Kit saved to GitHub"); }catch(e){ flash(`⚠ Saved locally. GitHub: ${e.message}`); } }
    else flash("✓ Kit saved locally");
    setScreen("kit");
  };

  const removeDialin=async(id)=>{
    const updated=dialins.filter(d=>d.id!==id);
    setDialins(updated); lsSet(LS.dialins,updated);
    if(settings.token){ try{ await ghWrite(settings,"dialins.json",updated); flash("✓ Removed & synced"); }catch(e){ flash(`⚠ Removed locally. GitHub: ${e.message}`); } }
    else flash("✓ Removed locally");
  };

  const palateSummary = settings.palateSummary||DEFAULT_PALATE;

  const isDetail=["kit","dialin","add","import","editdialin","editkit","dedup"].includes(screen);

  if(!ready) return <Splash/>;

  const views={
    home:       <HomeScreen     kits={kits} dialins={dialins} nav={nav} onSync={syncPull} syncing={syncing} lastSync={lastSync}/>,
    logbook:    <LogbookScreen  kits={kits} dialins={dialins} nav={nav}/>,
    dialin:     <DialInDetail   d={curDial} kits={kits} nav={nav} onEdit={editDialin} prevScreen={prevScreen}/>,
    add:        <AddDialIn      kits={kits} dialins={dialins} onSave={addDialin} nav={nav}/>,
    import:     <ImportScreen   kits={kits} onImport={importDialins} nav={nav}/>,
    editdialin: <EditDialIn     d={curDial} kits={kits} onSave={saveDialin} nav={nav}/>,
    kit:        <KitScreen      kit={curKit} dialins={dialins} kits={kits} nav={nav} onEditKit={editKit}/>,
    editkit:    <EditKit        kit={curKit} onSave={saveKit} nav={nav}/>,
    profile:    <ProfileScreen  dialins={dialins} kits={kits} palateSummary={palateSummary}/>,
    settings:   <SettingsScreen settings={settings} onSave={saveSettings} kits={kits} nav={nav} syncing={syncing} onSync={syncPull} dialins={dialins}/>,
    dedup:      <DuplicatesScreen dialins={dialins} onRemove={removeDialin} nav={nav}/>,
  };

  const NAV_ITEMS=[
    {id:"home",    ico:"☕", lbl:"Active"},
    {id:"logbook", ico:"◉", lbl:"Log"},
    {id:"add",     ico:"⊕", lbl:"Add"},
    {id:"profile", ico:"◈", lbl:"Profile"},
    {id:"settings",ico:"◎", lbl:"Settings"},
  ];

  return (
    <div>
      {views[screen]||views.home}
      {!isDetail&&(
        <nav className="bnav">
          {NAV_ITEMS.map(item=>(
            <button key={item.id} className={`nav-btn${screen===item.id?" nav-btn-on":""}`} onClick={()=>setScreen(item.id)}>
              <span className="nav-ico">{item.ico}</span>
              <span className="nav-lbl">{item.lbl}</span>
            </button>
          ))}
        </nav>
      )}
      {syncing&&!toast&&<div className="toast">↻ Syncing…</div>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
