// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const [ready,       setReady]     = useState(false);
  const [screen,      setScreen]    = useState("active");
  const [prevScreen,  setPrev]      = useState("active");
  const [curKit,      setCurKit]    = useState(null);
  const [curDial,     setCurDial]   = useState(null);
  const [curGroup,    setCurGroup]  = useState(null);
  const [kits,        setKits]      = useState(DEF_KITS);
  const [dialins,     setDialins]   = useState(DEF_DIALINS);
  const [syncing,     setSyncing]   = useState(false);
  const [listScreen,  setListScreen]= useState("active");
  const [toast,       setToast]     = useState(null);
  const [lastSync,    setLastSync]  = useState(null);
  const [settings,    setSettings]  = useState(()=>lsGet(LS.settings)||{});

  useEffect(()=>{
    const ck=lsGet(LS.kits),cd=lsGet(LS.dialins);
    if(ck) setKits(ck);
    if(cd) setDialins(cd);
    setReady(true);
    const s=lsGet(LS.settings)||{};

    // Initial sync on load
    if(s.owner&&s.repo&&navigator.onLine) autoSync(s,ck,cd);

    // Sync when tab becomes visible again (e.g. returning from push.html)
    const onVisible=()=>{
      if(document.visibilityState==="visible"){
        const sv=lsGet(LS.settings)||{};
        if(sv.owner&&sv.repo&&navigator.onLine) autoSync(sv,lsGet(LS.kits),lsGet(LS.dialins));
      }
    };
    document.addEventListener("visibilitychange",onVisible);
    return ()=>document.removeEventListener("visibilitychange",onVisible);
  },[]);

  const autoSync=async(s,lk,ld)=>{
    try {
      const [rk,rd]=await Promise.all([ghRead(s,"kits.json").catch(()=>null),ghRead(s,"dialins.json").catch(()=>null)]);
      // Only overwrite local if remote differs AND local hasn't been modified more recently
      const localMod = lsGet("ca_lastModified")||0;
      const now = Date.now();
      const safeToOverwrite = (now - localMod) > 90000; // 90s grace period after any local write
      if(rk&&JSON.stringify(rk)!==JSON.stringify(lk)&&safeToOverwrite){ setKits(rk); lsSet(LS.kits,rk); }
      if(rd&&JSON.stringify(rd)!==JSON.stringify(ld)&&safeToOverwrite){ setDialins(rd); lsSet(LS.dialins,rd); }
      setLastSync(new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
    }catch(e){}
  };

  const flash=(msg,ms=2800)=>{ setToast(msg); setTimeout(()=>setToast(null),ms); };

  const syncPull=async()=>{
    if(!settings.owner||!settings.repo){ flash("⚠ Configure GitHub in Settings"); setScreen("settings"); return; }
    setSyncing(true);
    try {
      const [k,d]=await Promise.all([ghRead(settings,"kits.json"),ghRead(settings,"dialins.json")]);
      setKits(k); lsSet(LS.kits,k);
      setDialins(d); lsSet(LS.dialins,d);
      setLastSync(new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
      flash("✓ Synced from GitHub");
    }catch(e){ flash(`✗ ${e.message}`); }
    setSyncing(false);
  };

  const addDialins=async(entries)=>{
    const updated=[...entries,...dialins];
    setDialins(updated); lsSet(LS.dialins,updated); lsSet("ca_lastModified",Date.now());
    if(settings.token){ try{ await ghWrite(settings,"dialins.json",updated); flash(`✓ ${entries.length>1?entries.length+" entries":"Dial-in"} saved`); }catch(e){ flash(`⚠ Saved locally. GitHub: ${e.message}`); } }
    else flash("✓ Saved locally");
    setScreen("active");
  };

  const importDialins=async(entries)=>{
    const updated=[...entries.map(e=>({...e,id:e.id||uid()})),...dialins];
    setDialins(updated); lsSet(LS.dialins,updated);
    if(settings.token){ try{ await ghWrite(settings,"dialins.json",updated); flash(`✓ ${entries.length} imported`); }catch(e){ flash(`⚠ Saved locally. GitHub: ${e.message}`); } }
    else flash(`✓ ${entries.length} imported locally`);
    setScreen("active");
  };

  const saveSettings=async(s)=>{
    setSettings(s); lsSet(LS.settings,s); flash("✓ Settings saved — syncing…");
    setSyncing(true);
    try {
      const [k,d]=await Promise.all([ghRead(s,"kits.json"),ghRead(s,"dialins.json")]);
      setKits(k); lsSet(LS.kits,k);
      setDialins(d); lsSet(LS.dialins,d);
      setLastSync(new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
      flash("✓ Connected & synced");
    }catch(e){ flash(`⚠ Settings saved. Sync failed: ${e.message}`); }
    setSyncing(false);
  };

  const updatePalate=(text)=>{
    const s={...settings,palateSummary:text};
    setSettings(s); lsSet(LS.settings,s); flash("✓ Palate summary saved");
  };

  const nav=(to,data=null,from=null)=>{
    setPrev(from||screen);
    // Track the last list screen so detail can always get back to it
    if(from==="active"||from==="logbook") setListScreen(from);
    if(to==="kit"       &&data) setCurKit(data);
    if(to==="dialin"    &&data) setCurDial(data);
    if(to==="editdialin"&&data) setCurDial(data);
    if(to==="coffeehub" &&data) setCurGroup(data);
    setScreen(to);
  };

  const editDialin=(d)=>{ setCurDial(d); setScreen("editdialin"); };

  const quickStatus=async(id, patch)=>{
    const updated=dialins.map(d=>d.id===id?{...d,...patch}:d);
    setDialins(updated); lsSet(LS.dialins,updated); lsSet("ca_lastModified",Date.now());
    if(curDial?.id===id) setCurDial(p=>({...p,...patch}));
    if(settings.token){ try{ await ghWrite(settings,"dialins.json",updated); flash("✓ Updated"); }catch(e){ flash(`⚠ Saved locally. GitHub: ${e.message}`); } }
    else flash("✓ Saved locally");
  };
  const editKit   =(k)=>{ setCurKit(k);  setScreen("editkit"); };

  const saveDialin=async(updated)=>{
    const newList=dialins.map(d=>d.id===updated.id?updated:d);
    setDialins(newList); lsSet(LS.dialins,newList); lsSet("ca_lastModified",Date.now());
    setCurDial(updated);
    if(settings.token){ try{ await ghWrite(settings,"dialins.json",newList); flash("✓ Saved"); }catch(e){ flash(`⚠ Saved locally. GitHub: ${e.message}`); } }
    else flash("✓ Saved locally");
    setScreen("dialin");
  };

  const saveKit=async(updated)=>{
    const newList=kits.map(k=>k.id===updated.id?updated:k);
    setKits(newList); lsSet(LS.kits,newList);
    setCurKit(updated);
    if(settings.token){ try{ await ghWrite(settings,"kits.json",newList); flash("✓ Kit saved"); }catch(e){ flash(`⚠ Saved locally. GitHub: ${e.message}`); } }
    else flash("✓ Kit saved locally");
    setScreen("kit");
  };

  const removeDialin=async(id)=>{
    const updated=dialins.filter(d=>d.id!==id);
    setDialins(updated); lsSet(LS.dialins,updated);
    if(settings.token){ try{ await ghWrite(settings,"dialins.json",updated); flash("✓ Removed"); }catch(e){ flash(`⚠ Removed locally. GitHub: ${e.message}`); } }
    else flash("✓ Removed locally");
  };

  const DETAIL_SCREENS=["kit","dialin","add","import","editdialin","editkit","coffeehub","settings-kits","settings-github","settings-controls","settings-data"];
  const isDetail=DETAIL_SCREENS.includes(screen);
  const NAV_TABS=["active","logbook","add","journey","settings"];

  if(!ready) return <Splash/>;

  const views={
    active:           <ActiveScreen      kits={kits} dialins={dialins} nav={nav} onSync={syncPull} syncing={syncing} lastSync={lastSync} settings={settings}/>,
    logbook:          <LogbookScreen     kits={kits} dialins={dialins} nav={nav} settings={settings}/>,
    add:              <AddDialIn         kits={kits} dialins={dialins} onSave={addDialins} nav={nav} settings={settings}/>,
    journey:          <JourneyScreen     dialins={dialins} settings={settings} onUpdatePalate={updatePalate}/>,
    settings:         <SettingsScreen    nav={nav} syncing={syncing} onSync={syncPull} dialins={dialins} settings={settings}/>,
    "settings-kits":  <SettingsKits      kits={kits} nav={nav}/>,
    "settings-github":<SettingsGitHub    settings={settings} onSave={saveSettings} nav={nav}/>,
    "settings-controls":<SettingsControls settings={settings} onSave={saveSettings} kits={kits} nav={nav}/>,
    "settings-data":  <SettingsData      dialins={dialins} onRemove={removeDialin} nav={nav}/>,
    coffeehub:        <CoffeeHubScreen   group={curGroup} kits={kits} nav={nav} settings={settings}/>,
    dialin:           <DialInDetail      d={curDial} kits={kits} dialins={dialins} nav={nav} onEdit={editDialin} listScreen={listScreen} settings={settings} onQuickStatus={quickStatus}/>,
    editdialin:       <EditDialIn        d={curDial} kits={kits} onSave={saveDialin} nav={nav} settings={settings}/>,
    kit:              <KitScreen         kit={curKit} dialins={dialins} kits={kits} nav={nav} onEditKit={editKit}/>,
    editkit:          <EditKit           kit={curKit} onSave={saveKit} nav={nav}/>,
    import:           <ImportScreen      kits={kits} onImport={importDialins} nav={nav}/>,
  };

  const NAV_ITEMS=[
    {id:"active",  ico:"◌", lbl:"Active"},
    {id:"logbook", ico:"◉", lbl:"Log"},
    {id:"add",     ico:"⊕", lbl:"Add"},
    {id:"journey", ico:"◈", lbl:"Journey"},
    {id:"settings",ico:"⚙", lbl:"Settings"},
  ];

  return (
    <div>
      {views[screen]||views.active}
      {!isDetail&&(
        <nav className="bnav">
          {NAV_ITEMS.map(item=>(
            <button key={item.id} className={`nav-btn${screen===item.id?" nav-btn-on":""}`} onClick={()=>setScreen(item.id)}>
              <span className="nav-ico">{item.ico}</span>
              <span className="nav-lbl">{item.lbl}</span>
            </button>
          ))}
        </nav>
      )}
      {syncing&&!toast&&<div className="toast">↻ Syncing…</div>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
