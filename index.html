<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Dial-In"/>
  <meta name="theme-color" content="#0C0501"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>Dial-In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0C0501; --surface:#170C06; --elevated:#1C0E07; --card:#181008;
      --border:rgba(200,118,58,0.14); --bh:rgba(200,118,58,0.35);
      --accent:#C87840; --accent-d:rgba(200,120,64,0.12); --accent-b:#E09050;
      --tx1:#EDD8B4; --tx2:#9A7050; --tx3:#5A3A22;
      --green:#5A8860; --green-d:rgba(90,136,96,0.13);
      --teal:#4A8888; --teal-d:rgba(74,136,136,0.13);
      --blue:#5A7098; --blue-d:rgba(90,112,152,0.13);
      --purple:#7A5A8A; --purple-d:rgba(122,90,138,0.13);
      --red:#A05050; --red-d:rgba(160,80,80,0.13);
    }
    html,body { height:100%; background:var(--bg); color:var(--tx1); font-family:'Jost',sans-serif; font-weight:400; -webkit-font-smoothing:antialiased; overscroll-behavior:none; }
    #root { height:100%; }

    /* ── Layout ── */
    .screen { min-height:100vh; max-width:480px; margin:0 auto; padding-bottom:80px; }
    .fade-in { animation:fadeIn .2s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

    /* ── Section headers ── */
    .sec { padding:22px 18px 8px; display:flex; align-items:center; gap:10px; }
    .sec-title { font-size:9px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:var(--tx3); }
    .sec::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ── Top bar ── */
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 18px 0; }
    .topbar-title { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:500; letter-spacing:.02em; }
    .topbar-actions { display:flex; gap:8px; }
    .icon-btn { width:36px; height:36px; border-radius:9px; border:1px solid var(--border); background:var(--surface); color:var(--tx2); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; font-size:18px; flex-shrink:0; }
    .icon-btn:hover { border-color:var(--bh); color:var(--tx1); }
    .sort-sel { background:var(--surface); border:1px solid var(--border); border-radius:7px; color:var(--tx2); font-family:'Jost',sans-serif; font-size:11px; padding:5px 8px; outline:none; cursor:pointer; }
    .sort-sel option { background:var(--elevated); }

    /* ── Active coffee card (new design) ── */
    .acc { margin:0 18px 6px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; cursor:pointer; transition:border-color .15s; }
    .acc:hover { border-color:var(--bh); }
    .acc-r1 { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
    .acc-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .acc-roaster { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); flex:1; }
    .acc-freshness { font-size:10px; font-weight:600; letter-spacing:.04em; }
    .acc-r2 { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .acc-name { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:500; }
    .acc-status { font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; padding:3px 8px; border-radius:5px; }
    .acc-r3 { display:grid; grid-template-columns:1fr 1px 2fr; gap:0; padding-top:10px; border-top:1px solid var(--border); }
    .acc-divider { background:var(--border); }
    .acc-grinds { display:flex; align-items:center; gap:0; padding:2px 0; }
    .acc-grind-num { font-family:'DM Mono',monospace; font-size:16px; font-weight:500; color:var(--accent); line-height:1; min-width:34px; display:inline-block; }
    .acc-grind-sep { color:var(--tx3); font-size:13px; padding:0 4px; }
    .acc-params-wrap { padding-left:12px; display:flex; flex-direction:column; gap:3px; justify-content:center; }
    .acc-params { display:flex; flex-wrap:wrap; gap:0 5px; align-items:baseline; }
    .acc-param { font-family:'DM Mono',monospace; font-size:11px; color:var(--tx2); }
    .acc-param + .acc-param::before { content:'·'; margin-right:5px; color:var(--tx3); }
    .acc-phases { font-family:'DM Mono',monospace; font-size:10px; color:var(--tx3); display:flex; gap:3px; flex-wrap:wrap; }

    /* ── Frozen row ── */
    .frozen-row { margin:0 18px 6px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 16px; cursor:pointer; display:flex; align-items:center; gap:10px; transition:border-color .15s; }
    .frozen-row:hover { border-color:var(--bh); }
    .frozen-row-title { font-size:13px; color:var(--tx2); flex:1; }
    .frozen-item { margin:0 18px 4px; padding:10px 16px; background:var(--elevated); border-radius:8px; display:flex; gap:10px; align-items:center; }
    .frozen-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    /* ── Journey stats ── */
    .stat-chips { display:flex; gap:6px; padding:0 18px 12px; }
    .stat-chip { background:var(--card); border:1px solid var(--border); border-radius:9px; padding:10px 6px; text-align:center; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:62px; }
    .stat-chip-v { font-family:'DM Mono',monospace; font-size:15px; font-weight:500; color:var(--accent); line-height:1.2; }
    .stat-chip-l { font-size:8px; letter-spacing:.08em; text-transform:uppercase; color:var(--tx3); margin-top:4px; }
    .top-rated-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; padding:0 18px 14px; }
    .top-rated-card { background:var(--card); border:1px solid var(--border); border-radius:9px; padding:9px 8px; border-top-width:2px; }
    .top-rated-roaster { font-size:8px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--tx3); margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .top-rated-name { font-family:'Cormorant Garamond',serif; font-size:12px; font-weight:500; line-height:1.3; margin-bottom:5px; word-break:break-word; }

    /* ── Stars ── */
    .stars { display:flex; gap:1px; }
    .star-on { color:var(--accent); font-size:11px; }
    .star-off { color:var(--tx3); font-size:11px; }
    .star-btn { background:none; border:none; cursor:pointer; font-size:22px; color:var(--tx3); transition:color .1s,transform .1s; padding:0; }
    .star-btn:hover { transform:scale(1.15); }
    .star-btn-on { color:var(--accent); }

    /* ── Quiz card ── */
    .quiz-card { margin:0 18px 14px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; }
    .quiz-cat { font-size:9px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; }
    .quiz-q { font-family:'Cormorant Garamond',serif; font-size:19px; font-weight:500; line-height:1.4; margin-bottom:14px; }
    .quiz-opts { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:12px; }
    .quiz-opt { padding:9px 10px; border-radius:8px; border:1px solid var(--border); background:var(--elevated); font-size:12px; color:var(--tx2); cursor:pointer; transition:all .15s; display:flex; gap:7px; align-items:flex-start; }
    .quiz-opt:hover { border-color:var(--bh); color:var(--tx1); }
    .quiz-opt-key { font-family:'DM Mono',monospace; font-size:10px; opacity:.5; flex-shrink:0; margin-top:1px; }
    .quiz-opt-correct { background:var(--green-d); border-color:rgba(90,136,96,0.4); color:var(--green); }
    .quiz-opt-wrong { background:var(--red-d); border-color:rgba(160,80,80,0.4); color:var(--red); }
    .quiz-opt-dim { opacity:.35; }
    .quiz-explain { font-size:12px; color:var(--tx2); line-height:1.6; padding:10px 12px; background:var(--elevated); border-radius:8px; margin-bottom:10px; }
    .quiz-footer { display:flex; align-items:center; justify-content:space-between; }
    .quiz-next { background:none; border:none; color:var(--accent); font-family:'Jost',sans-serif; font-size:13px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:4px; }

    /* ── Logbook ── */
    .search-wrap { position:relative; padding:10px 18px; }
    .search-ico { position:absolute; left:32px; top:50%; transform:translateY(-50%); color:var(--tx3); font-size:14px; pointer-events:none; }
    .search-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--tx1); font-family:'Jost',sans-serif; font-size:14px; padding:10px 12px 10px 36px; outline:none; transition:border-color .15s; }
    .search-input:focus { border-color:var(--accent); }
    .filter-block { padding:0 18px 6px; }
    .filter-label { font-size:9px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--tx3); margin-bottom:5px; }
    .chips { display:flex; gap:5px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; flex-wrap:wrap; }
    .chip { flex-shrink:0; padding:5px 10px; border-radius:6px; font-size:10px; font-weight:600; letter-spacing:.06em; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--tx3); transition:all .15s; }
    .chip-on { background:var(--accent-d); border-color:var(--accent); color:var(--accent); }

    /* ── Logbook group ── */
    .lb-group { margin:0 18px 6px; background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .lb-header { padding:14px 16px; cursor:pointer; display:flex; align-items:center; gap:10px; transition:background .12s; }
    .lb-header:hover { background:var(--elevated); }
    .lb-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .lb-meta { flex:1; min-width:0; }
    .lb-roaster { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:3px; }
    .lb-name { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:500; }
    .lb-expand { color:var(--tx3); font-size:16px; transition:transform .2s; flex-shrink:0; }
    .lb-expanded { transform:rotate(90deg); }
    .lb-body { border-top:1px solid var(--border); }
    .lb-grids { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); }
    .lb-recipe-block { background:var(--elevated); padding:12px 14px; }
    .lb-recipe-title { font-size:9px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--tx3); margin-bottom:8px; }
    .lb-recipe-row { font-family:'DM Mono',monospace; font-size:11px; color:var(--tx2); margin-bottom:3px; }
    .lb-phases { padding:10px 14px; border-top:1px solid var(--border); }
    .lb-phase-row { display:flex; align-items:center; gap:8px; padding:3px 0; }
    .lb-phase-num { font-family:'DM Mono',monospace; font-size:10px; color:var(--tx3); min-width:16px; }
    .lb-phase-bar { height:2px; background:var(--accent); border-radius:1px; opacity:.5; }
    .lb-phase-g { font-family:'DM Mono',monospace; font-size:11px; color:var(--tx1); min-width:38px; }
    .lb-phase-t { font-family:'DM Mono',monospace; font-size:10px; color:var(--tx3); margin-left:auto; }

    /* ── Detail page ── */
    .det-topbar { padding:14px 18px 0; display:flex; align-items:center; gap:10px; }
    .det-hero { padding:16px 18px 16px; border-bottom:1px solid var(--border); }
    .det-roaster { font-size:22px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--accent); margin-bottom:4px; display:flex; align-items:center; gap:8px; }
    .det-name { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:500; margin-bottom:12px; }
    .det-badge-row { display:flex; align-items:center; justify-content:space-between; gap:6px; margin-bottom:6px; }
    .det-badge-left { display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
    .det-badge-right { display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
    .det-date { font-family:'DM Mono',monospace; font-size:10px; color:var(--tx3); margin-bottom:10px; }

    /* ── Grind strip ── */
    .gs { display:grid; grid-template-columns:repeat(4,1fr); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin:0 18px 4px; }
    .gs-cell { padding:12px 6px 10px; text-align:center; border-right:1px solid var(--border); background:var(--elevated); }
    .gs-cell:last-child { border-right:none; }
    .gs-label { font-size:8px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); margin-bottom:6px; }
    .gs-num { font-family:'DM Mono',monospace; font-size:20px; font-weight:500; color:var(--accent); line-height:1; }
    .gs-grinder { font-size:8px; color:var(--tx3); margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* ── Recipe blocks ── */
    .recipe-split { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 18px 14px; }
    .recipe-block { background:var(--elevated); border:1px solid var(--border); border-radius:10px; padding:12px; }
    .recipe-title { font-size:9px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--tx3); margin-bottom:10px; }
    .recipe-stat { margin-bottom:7px; }
    .recipe-val { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; color:var(--tx1); }
    .recipe-lbl { font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--tx3); margin-top:1px; }
    .phase-list { margin-top:10px; border-top:1px solid var(--border); padding-top:8px; }
    .phase-row-d { display:flex; align-items:center; gap:7px; padding:4px 0; }
    .phase-num { font-family:'DM Mono',monospace; font-size:10px; color:var(--tx3); min-width:16px; }
    .phase-bar { height:2px; background:var(--accent); border-radius:1px; transition:width .3s; opacity:.55; }
    .phase-grams { font-family:'DM Mono',monospace; font-size:12px; font-weight:500; color:var(--tx1); min-width:38px; }
    .phase-time { font-family:'DM Mono',monospace; font-size:10px; color:var(--tx3); margin-left:auto; }

    /* ── Badges ── */
    .badge { font-size:9px; font-weight:600; letter-spacing:.06em; padding:3px 7px; border-radius:5px; white-space:nowrap; text-transform:uppercase; }
    .b-espr { background:rgba(200,120,64,0.12); color:var(--accent); border:1px solid rgba(200,120,64,0.22); }
    .b-pour { background:rgba(74,136,136,0.12); color:var(--teal); border:1px solid rgba(74,136,136,0.22); }
    .b-both { background:rgba(122,90,138,0.12); color:#AA80C0; border:1px solid rgba(122,90,138,0.22); }
    .b-dialed    { background:var(--green-d); color:var(--green); border:1px solid rgba(90,136,96,0.3); }
    .b-dialing   { background:var(--accent-d); color:var(--accent); border:1px solid rgba(200,120,64,0.3); }
    .b-waiting   { background:rgba(90,58,34,0.18); color:var(--tx3); border:1px solid rgba(90,58,34,0.28); }
    .b-abandoned { background:var(--red-d); color:var(--red); border:1px solid rgba(160,80,80,0.28); }
    .b-exp       { background:transparent; color:var(--accent); border:1px solid rgba(200,120,64,0.4); }
    .b-kit       { background:var(--elevated); color:var(--tx2); border:1px solid var(--border); }
    .b-process   { background:var(--blue-d); color:var(--blue); border:1px solid rgba(90,112,152,0.22); }
    .b-roast     { background:rgba(139,78,26,.12); color:#9A6A44; border:1px solid rgba(139,78,26,.22); }
    .b-pick      { background:rgba(200,120,64,0.16); color:var(--accent-b); border:1px solid rgba(200,120,64,0.3); }
    .b-buy       { background:var(--green-d); color:var(--green); border:1px solid rgba(90,136,96,0.3); }
    .b-early     { background:rgba(120,100,60,0.13); color:#8A7040; border:1px solid rgba(120,100,60,0.23); }
    .b-open      { background:var(--blue-d); color:#7A9AC0; border:1px solid rgba(90,112,152,0.22); }
    .b-frozen    { background:rgba(74,136,136,0.12); color:var(--teal); border:1px solid rgba(74,136,136,0.28); }
    .b-empty     { background:var(--elevated); color:var(--tx3); border:1px solid var(--border); }
    .b-ease-easy { background:var(--green-d); color:var(--green); border:1px solid rgba(90,136,96,0.28); }
    .b-ease-med  { background:var(--accent-d); color:var(--accent); border:1px solid rgba(200,120,64,0.28); }
    .b-ease-hard { background:var(--red-d); color:var(--red); border:1px solid rgba(160,80,80,0.28); }
    .b-stable    { background:var(--green-d); color:var(--green); border:1px solid rgba(90,136,96,0.28); }
    .b-unstable  { background:var(--red-d); color:var(--red); border:1px solid rgba(160,80,80,0.28); }

    /* ── Forms ── */
    .f-grp { margin-bottom:14px; padding:0 18px; }
    .f-lbl { display:block; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tx2); margin-bottom:5px; }
    .f-in,.f-sel,.f-ta { width:100%; background:var(--elevated); border:1px solid var(--border); border-radius:8px; color:var(--tx1); font-family:'Jost',sans-serif; font-size:14px; padding:9px 12px; outline:none; transition:border-color .15s; }
    .f-in:focus,.f-sel:focus,.f-ta:focus { border-color:var(--accent); }
    .f-sel option { background:var(--elevated); }
    .f-ta { resize:vertical; min-height:75px; }
    .f-row { padding:0 18px 14px; display:flex; gap:10px; }
    .f-row .f-grp { flex:1; padding:0; margin-bottom:0; }
    .f-hint { font-size:11px; color:var(--tx3); margin-top:4px; line-height:1.5; }
    .opt-chips { display:flex; gap:7px; flex-wrap:wrap; }
    .opt-chip { padding:6px 12px; border-radius:7px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--elevated); color:var(--tx2); transition:all .15s; }
    .opt-chip-on { background:var(--accent-d); border-color:var(--accent); color:var(--accent); }
    .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:10px 18px; }
    .toggle-lbl { font-size:13px; color:var(--tx1); }
    .toggle-sub { font-size:11px; color:var(--tx3); margin-top:1px; }
    .toggle-btn { width:40px; height:24px; border-radius:12px; border:none; cursor:pointer; transition:background .2s; position:relative; flex-shrink:0; }
    .toggle-btn::after { content:''; position:absolute; width:18px; height:18px; border-radius:50%; background:#fff; top:3px; transition:left .2s; }
    .toggle-off { background:var(--elevated); border:1px solid var(--border); }
    .toggle-off::after { left:3px; }
    .toggle-on { background:var(--accent); }
    .toggle-on::after { left:19px; }
    .phase-builder { margin:0 18px; }
    .phase-build-row { display:flex; align-items:center; gap:6px; margin-bottom:7px; }
    .phase-build-num { font-family:'DM Mono',monospace; font-size:12px; color:var(--tx3); min-width:20px; }
    .phase-build-in { flex:1; background:var(--elevated); border:1px solid var(--border); border-radius:7px; color:var(--tx1); font-family:'DM Mono',monospace; font-size:13px; padding:7px 10px; outline:none; transition:border-color .15s; }
    .phase-build-in:focus { border-color:var(--accent); }
    .phase-del { background:var(--red-d); border:1px solid rgba(160,80,80,.3); color:var(--red); border-radius:6px; padding:0 9px; height:32px; cursor:pointer; font-size:12px; flex-shrink:0; }
    .fetch-row { display:flex; gap:8px; }
    .fetch-row .f-in { flex:1; }
    .btn-fetch { flex-shrink:0; background:var(--elevated); border:1px solid var(--border); border-radius:8px; color:var(--tx2); font-family:'Jost',sans-serif; font-size:12px; font-weight:500; padding:0 14px; cursor:pointer; transition:all .15s; }
    .btn-fetch:hover { border-color:var(--bh); color:var(--tx1); }
    .btn-fetch:disabled { opacity:.4; cursor:not-allowed; }

    /* ── Buttons ── */

    .toast { position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:var(--elevated); border:1px solid var(--border); border-radius:9px; padding:11px 18px; font-size:13px; color:var(--tx1); z-index:1000; white-space:nowrap; animation:toastIn .2s ease; box-shadow:0 4px 20px rgba(0,0,0,.5); }

    .det-info-cell:nth-last-child(-n+2) { border-bottom:none; }
    .det-info-label { font-size:9px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); margin-bottom:4px; }
    .det-info-val { font-size:13px; color:var(--tx1); }

    .palate-edit-ta { width:100%; background:var(--elevated); border:1px solid var(--accent); border-radius:8px; color:var(--tx1); font-family:'Jost',sans-serif; font-size:13px; padding:12px; outline:none; resize:vertical; min-height:180px; line-height:1.7; }
    .eq-row { display:flex; align-items:flex-start; gap:14px; padding:12px 18px; border-bottom:1px solid var(--border); }
    .eq-cat { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); min-width:90px; margin-top:2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const APP_VERSION   = "4.0.0";
const LS            = { settings:"ca_settings", kits:"ca_kits", dialins:"ca_dialins", quiz:"ca_quiz" };
const PROCESSES     = ["Washed","Natural","Honey","Anaerobic","Wet-Hulled","Blend"];
const ROASTS        = ["Light","Medium-Light","Medium","Medium-Dark","Dark"];
const BREW_METHODS  = ["Espresso","Pour Over","French Press"];
const DIAL_STATUSES = ["waiting","dialing","dialed","abandoned"];
const BEAN_LOCS     = ["shelf","open","frozen","empty"];
const DIAL_TAGS     = ["interesting","complex","funky","versatile","well responding","good value","good for milk","crowd-pleaser","affogato","my choice","flat","boring","not well responding"];

const KIT_GRID = { "home-espresso":"he","home-pour-over":"hp","home-french-press":"hp","office-espresso":"oe","office-pour-over":"op","office-french-press":"op" };

// Brew method → color
const DOT_COLOR = {
  espr: "#C87840",
  pour: "#4A8888",
  both: "#8A6A9A",
  frpr: "#4A8888",
};

function brewDotColor(brewMethods) {
  if (!brewMethods||!brewMethods.length) return "#5A3A22";
  const hasE = brewMethods.includes("Espresso");
  const hasP = brewMethods.includes("Pour Over")||brewMethods.includes("French Press");
  if (hasE&&hasP) return DOT_COLOR.both;
  if (hasE) return DOT_COLOR.espr;
  return DOT_COLOR.pour;
}

// ── FRESHNESS MATRIX ──────────────────────────────────────────────────────────
const FRESH_MATRIX = {
  "Light":        { espresso:[7,28,60,120], filter:[5,21,45,90] },
  "Medium-Light": { espresso:[6,24,52,105], filter:[4,17,40,80] },
  "Medium":       { espresso:[5,21,45,90],  filter:[4,14,35,70] },
  "Medium-Dark":  { espresso:[4,17,37,75],  filter:[3,12,30,55] },
  "Dark":         { espresso:[3,14,30,60],  filter:[2,10,25,50] },
};

function getEffectiveAgeDays(roastDate, frozenDate, thawDate) {
  if (!roastDate) return null;
  const roast  = new Date(roastDate);
  const now    = new Date();
  const frozen = frozenDate ? new Date(frozenDate) : null;
  const thawed = thawDate   ? new Date(thawDate)   : null;
  if (!frozen) return (now - roast) / 86400000;
  const shelfBefore = (frozen - roast) / 86400000;
  const frozenEnd   = thawed || now;
  const frozenDays  = (frozenEnd - frozen) / 86400000;
  const shelfAfter  = thawed ? (now - thawed) / 86400000 : 0;
  return shelfBefore + (frozenDays * 0.05) + shelfAfter;
}

function getFreshness(roastDate, beanLocation, roastLevel, brewMethods, settings, frozenDate, thawDate) {
  if (beanLocation==="frozen"||beanLocation==="empty") return null;
  if (!roastDate) return null;
  const days = getEffectiveAgeDays(roastDate, frozenDate, thawDate);
  if (days===null||days<0) return null;
  const brewKey = (brewMethods||[]).includes("Espresso") ? "espresso" : "filter";
  const level   = roastLevel||"Medium";
  const [tf,pe,ge,ae] = (settings?.freshnessOverrides?.[level]?.[brewKey]) || (FRESH_MATRIX[level]||FRESH_MATRIX["Medium"])[brewKey];
  if (days<tf)  return {label:"TOO FRESH", color:"#8A7040", bg:"rgba(120,100,60,0.13)"};
  if (days<=pe) return {label:"✓ PRIME",   color:"var(--green)",  bg:"var(--green-d)"};
  if (days<=ge) return {label:"◷ GOOD",    color:"var(--tx2)",   bg:"rgba(154,112,80,0.1)"};
  if (days<=ae) return {label:"⚡ AGING",  color:"var(--accent)", bg:"var(--accent-d)"};
  return              {label:"PAST PEAK", color:"var(--red)",   bg:"var(--red-d)"};
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
const fmt      = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : "";
const fmtShort = d => d ? new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short"}) : "";
const ratio    = (a,b) => (a&&b) ? `1:${(b/a).toFixed(1)}` : null;
const uid      = () => `d-${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
const lsGet    = k => { try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;} };
const lsSet    = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch{} };
const secToMSS = s => { const n=+s||0; return `${Math.floor(n/60)}:${String(n%60).padStart(2,"0")}`; };
const mssToSec = t => { if(!t)return 0; const p=String(t).split(":"); return p.length===2?+p[0]*60+(+p[1]||0):+t||0; };
const tempDisp = (t,unit) => t>0 ? `${unit==="F"?Math.round(t*9/5+32):t}°${unit||"C"}` : null;
const shortGrind = val => { if(!val)return null; const m=String(val).match(/^[\d.]+/); return m?m[0]:String(val).slice(0,5); };

function normalizeDiaLin(d) {
  const base = {
    roastDate:"", frozenDate:"", thawDate:"",
    beanLocation:"open", dialStatus:"dialed",
    experimenting:false, isEarlyEntry:false,
    wouldBuy:false, isChoice:false, tags:[], brewMethods:[],
    dialEase:null, dialStability:null, filterPours:[],
    coffeeUrl:"", coffeeDescription:"", notes:"",
    ...d
  };
  if (!base.brewMethods?.length && base.intendedFor) {
    const iv=String(base.intendedFor).toLowerCase();
    if (iv.includes("espresso")) base.brewMethods=["Espresso"];
    else if (iv.includes("filter")||iv.includes("pour")) base.brewMethods=["Pour Over"];
    else if (iv.includes("french")) base.brewMethods=["French Press"];
  }
  if (!base.dialEase && base.dialDifficulty!=null) base.dialEase=base.dialDifficulty<=2?"easy":base.dialDifficulty<=3?"medium":"hard";
  if (!base.dialStability && base.shotStability!=null) base.dialStability=base.shotStability>=4?"stable":"unstable";
  if (typeof base.filterPours==="number"||!Array.isArray(base.filterPours)) {
    const phases=[];
    if (d.filterBloomGrams>0) phases.push({phase:1,targetGrams:d.filterBloomGrams,startSeconds:0});
    base.filterPours=phases;
  }
  return base;
}

function buildCoffeeGroups(dialins) {
  const key = d => `${(d.coffeeName||"").toLowerCase().trim()}⌀${(d.roaster||"").toLowerCase().trim()}`;
  const map = {};
  dialins.map(normalizeDiaLin).forEach(d => {
    const k=key(d);
    if (!map[k]) map[k]={coffeeName:d.coffeeName,roaster:d.roaster,entries:[]};
    map[k].entries.push(d);
  });
  return Object.values(map);
}

function getGrindPair(entries) {
  // Returns {home, office} — best dialed grind for each location
  const get = (loc) => {
    const kitIds = Object.entries(KIT_GRID)
      .filter(([k])=>k.startsWith(loc))
      .map(([k])=>k);
    const match = entries
      .filter(e=>kitIds.includes(e.kitId)&&e.grindSetting)
      .sort((a,b)=>{ const p=d=>d.dialStatus==="dialed"?3:d.dialStatus==="dialing"?2:1; return p(b)-p(a); })[0];
    return match ? shortGrind(match.grindSetting) : null;
  };
  return { home: get("home"), office: get("office") };
}

function getBestEntry(entries, brewType) {
  const kitIds = brewType==="espr"
    ? ["home-espresso","office-espresso"]
    : ["home-pour-over","office-pour-over","home-french-press","office-french-press"];
  return entries
    .filter(e=>kitIds.includes(e.kitId)&&e.doseIn>0)
    .sort((a,b)=>(b.dialStatus==="dialed"?2:1)-(a.dialStatus==="dialed"?2:1))[0]||null;
}

function groupDuplicates(dialins) {
  const key=d=>`${(d.coffeeName||"").toLowerCase().trim()}⌀${(d.roaster||"").toLowerCase().trim()}`;
  const groups={};
  dialins.forEach(d=>{const k=key(d);if(!groups[k])groups[k]=[];groups[k].push(d);});
  return Object.values(groups).filter(g=>g.length>1);
}

// ── DEFAULT DATA ──────────────────────────────────────────────────────────────
const DEF_KITS = [
  {id:"home-espresso",name:"Home Espresso",subtitle:"Quick Mill Pop-Up · Timemore Sculptor 064S",color:"#C87840",location:"home",brewMethod:"espresso",equipment:[{category:"Machine",name:"Quick Mill Pop-Up",notes:"Single boiler, PID + pressure profiling"},{category:"Grinder",name:"Timemore Sculptor 064S",notes:"64mm flat burrs, seasoned — stepless"},{category:"Portafilter",name:"MHW-3BOMBER Bottomless",notes:"Naked 58mm"},{category:"Basket",name:"Pullman Barista Basket",notes:"Precision 58mm"},{category:"Tamper",name:"Ikape V6 Calibrated",notes:"Click tamper"},{category:"Scale",name:"Timemore Black Mirror Mini",notes:"Real-time flow rate"},{category:"Kettle",name:"Timemore Fish Pro X",notes:"Electric gooseneck 900ml"}]},
  {id:"home-pour-over",name:"Home Pour-Over",subtitle:"Hario V60 · Timemore Sculptor 064S",color:"#4A8888",location:"home",brewMethod:"filter",equipment:[{category:"Dripper",name:"Hario V60 02",notes:""},{category:"Filters",name:"Hario V60 02 Paper",notes:""},{category:"Grinder",name:"Timemore Sculptor 064S",notes:"Shared with home espresso"},{category:"Scale",name:"Timemore Black Mirror Mini",notes:"Shared"},{category:"Kettle",name:"Timemore Fish Pro X",notes:"Shared"}]},
  {id:"home-french-press",name:"Home French Press",subtitle:"IKEA UPPHETTA · Timemore Sculptor 064S",color:"#7A5A8A",location:"home",brewMethod:"fpress",equipment:[{category:"Brewer",name:"IKEA UPPHETTA",notes:"Wood variant"},{category:"Grinder",name:"Timemore Sculptor 064S",notes:"Shared"}]},
  {id:"office-espresso",name:"Office Espresso",subtitle:"Gaggia Classic Evo Pro · Eureka Zenith 65E",color:"#5A886A",location:"office",brewMethod:"espresso",equipment:[{category:"Machine",name:"Gaggia Classic Evo Pro",notes:"Black — bought used"},{category:"PID",name:"GaggiaMate Standard Kit",notes:"Smart PID installed"},{category:"Grinder",name:"Eureka Zenith 65E",notes:"65mm flat burrs"},{category:"Portafilter",name:"MHW-3BOMBER Bottomless",notes:"58mm"},{category:"Scale",name:"Generic Digital Scale",notes:"Manual read"}]},
  {id:"office-pour-over",name:"Office Pour-Over",subtitle:"Hario V60 · Baratza Encore",color:"#5A7098",location:"office",brewMethod:"filter",equipment:[{category:"Dripper",name:"Hario V60 02",notes:""},{category:"Grinder",name:"Baratza Encore",notes:"Filter grinder"},{category:"Scale",name:"Generic Digital Scale",notes:"Shared"}]},
  {id:"office-french-press",name:"Office French Press",subtitle:"IKEA UPPHETTA · Baratza Encore",color:"#7A5A8A",location:"office",brewMethod:"fpress",equipment:[{category:"Brewer",name:"IKEA UPPHETTA",notes:"Plastic variant"},{category:"Grinder",name:"Baratza Encore",notes:"Shared"}]},
];

// ── GITHUB API ────────────────────────────────────────────────────────────────
async function ghRead(s, file) {
  const r = await fetch(`https://raw.githubusercontent.com/${s.owner}/${s.repo}/main/${file}?_=${Date.now()}`);
  if (!r.ok) throw new Error(`${file}: HTTP ${r.status}`);
  const parsed = await r.json();
  if (file==="dialins.json"&&parsed&&!Array.isArray(parsed)) return {data:parsed.entries||[],ts:parsed._appWrittenAt||0};
  return {data:parsed,ts:0};
}
async function ghGetSha(s, file) {
  if (!s.token) return null;
  const r = await fetch(`https://api.github.com/repos/${s.owner}/${s.repo}/contents/${file}?ref=main`,{headers:{Authorization:`Bearer ${s.token}`,Accept:"application/vnd.github+json"}});
  if (!r.ok) return null;
  return (await r.json()).sha||null;
}
async function ghWrite(s, file, data) {
  if (!s.token) throw new Error("No token");
  const api = `https://api.github.com/repos/${s.owner}/${s.repo}/contents/${file}`;
  const hdr = {Authorization:`Bearer ${s.token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"};
  const sha  = await ghGetSha(s,file);
  const payload = file==="dialins.json" ? {_appWrittenAt:Date.now(),entries:data} : data;
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2))));
  const res = await fetch(api,{method:"PUT",headers:hdr,body:JSON.stringify({message:`Update ${file} via Dial-In v4`,content,branch:"main",...(sha?{sha}:{})})});
  if (!res.ok) {const e=await res.json();throw new Error(e.message);}
}

// ── MICRO COMPONENTS ──────────────────────────────────────────────────────────
function Stars({n,size=11}) {
  return <div className="stars">{[1,2,3,4,5].map(i=><span key={i} style={{fontSize:`${size}px`}} className={i<=n?"star-on":"star-off"}>★</span>)}</div>;
}
function Toggle({on,onToggle}) {
  return <button className={`toggle-btn ${on?"toggle-on":"toggle-off"}`} onClick={onToggle}/>;
}
function StarInput({val,set}) {
  return <div className="star-in">{[1,2,3,4,5].map(i=><button key={i} type="button" className={`star-btn${i<=val?" star-btn-on":""}`} onClick={()=>set(i===val?0:i)}>★</button>)}</div>;
}

function BrewDot({brewMethods,size=8}) {
  return <div style={{width:`${size}px`,height:`${size}px`,borderRadius:"50%",background:brewDotColor(brewMethods||[]),flexShrink:0}}/>;
}

function FreshnessTag({freshness}) {
  if (!freshness) return null;
  return <span style={{fontSize:"10px",fontWeight:600,letterSpacing:".04em",color:freshness.color}}>{freshness.label}</span>;
}

function StatusChip({dialStatus, experimenting}) {
  if (experimenting) return <span className="badge b-exp">EXP</span>;
  if (dialStatus==="dialed")    return <span className="badge b-dialed">DIALED</span>;
  if (dialStatus==="dialing")   return <span className="badge b-dialing">DIALING</span>;
  if (dialStatus==="waiting")   return <span className="badge b-waiting">WAITING</span>;
  if (dialStatus==="abandoned") return <span className="badge b-abandoned">ABANDONED</span>;
  return null;
}

function BeanBadge({beanLocation}) {
  if (!beanLocation||beanLocation==="open") return null;
  if (beanLocation==="shelf")  return <span className="badge b-open">SHELF</span>;
  if (beanLocation==="frozen") return <span className="badge b-frozen">❄ FROZEN</span>;
  if (beanLocation==="empty")  return <span className="badge b-empty">DONE</span>;
  return null;
}

// ── ACTIVE COFFEE CARD ────────────────────────────────────────────────────────
function ActiveCard({group, onClick, settings}) {
  const {coffeeName, roaster, entries} = group;
  const norm = entries[0];
  const grindPair = useMemo(()=>getGrindPair(entries),[entries]);
  const esprE = useMemo(()=>getBestEntry(entries,"espr"),[entries]);
  const pourE = useMemo(()=>getBestEntry(entries,"pour"),[entries]);
  const allBrewMethods = [...new Set(entries.flatMap(e=>e.brewMethods||[]))];

  // Dominant status
  const stPriority = ["experimenting","dialing","dialed","waiting","abandoned"];
  const isExperimenting = entries.some(e=>e.experimenting);
  const domStatus = isExperimenting ? "experimenting" : ["dialing","dialed","waiting","abandoned"].find(s=>entries.some(e=>e.dialStatus===s)) || "dialed";

  // Freshness from most recent entry with roastDate
  const freshEntry = [...entries].filter(e=>e.roastDate).sort((a,b)=>b.roastDate.localeCompare(a.roastDate))[0];
  const domLoc = ["open","shelf","frozen","empty"].find(l=>entries.some(e=>e.beanLocation===l));
  const freshness = freshEntry ? getFreshness(freshEntry.roastDate, domLoc, freshEntry.roastLevel, freshEntry.brewMethods, settings, freshEntry.frozenDate, freshEntry.thawDate) : null;

  // Params from best entry
  const paramEntry = esprE || pourE;
  const isFilter = !esprE && pourE;
  const r = paramEntry?.doseIn&&paramEntry?.yieldOut ? ratio(paramEntry.doseIn,paramEntry.yieldOut) : null;
  const temp = tempDisp(paramEntry?.temperature, settings?.tempUnit);
  const timeStr = paramEntry?.timeSeconds > 0 ? (isFilter ? secToMSS(paramEntry.timeSeconds) : `${paramEntry.timeSeconds}s`) : null;

  return (
    <div className="acc" onClick={onClick}>
      {/* Row 1 */}
      <div className="acc-r1">
        <BrewDot brewMethods={allBrewMethods}/>
        <span className="acc-roaster">{roaster}</span>
        <FreshnessTag freshness={freshness}/>
      </div>
      {/* Row 2 */}
      <div className="acc-r2">
        <span className="acc-name">{coffeeName}</span>
        <StatusChip dialStatus={domStatus==="experimenting"?entries[0]?.dialStatus:domStatus} experimenting={isExperimenting}/>
      </div>
      {/* Row 3 */}
      {(grindPair.home||grindPair.office||paramEntry) && (
        <div className="acc-r3">
          <div className="acc-grinds">
            <span className="acc-grind-num">{grindPair.home||"—"}</span>
            <span className="acc-grind-sep">·</span>
            <span className="acc-grind-num">{grindPair.office||"—"}</span>
          </div>
          <div className="acc-divider"/>
          {paramEntry && (
            <div className="acc-params-wrap">
              <div className="acc-params">
                {temp && <span className="acc-param">{temp}</span>}
                {paramEntry.doseIn>0&&paramEntry.yieldOut>0 && <span className="acc-param">{paramEntry.doseIn}→{paramEntry.yieldOut}g</span>}
                {r && <span className="acc-param">{r}</span>}
                {timeStr && <span className="acc-param">{timeStr}</span>}
              </div>
              {isFilter && paramEntry.filterPours?.length>1 && (
                <div className="acc-phases">
                  {paramEntry.filterPours.map((p,i)=>(
                    <span key={i}>{i>0&&<span style={{color:"var(--border)",margin:"0 2px"}}>›</span>}{p.targetGrams}g</span>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── HOME QUIZ CARD ────────────────────────────────────────────────────────────
function HomeQuizCard({questions, quizState, onAnswer, onNext, onLaunchFull}) {
  if (!questions||!questions.length) return null;
  const [localRevealed, setLocalRevealed] = useState(null); // {selected, correct} for current card only
  const {currentIdx} = quizState;
  const q = questions[currentIdx % questions.length];
  const CAT_COLOR = {"General":"var(--blue)","My Journey":"var(--accent)","Technique":"var(--green)"};

  const handleSelect = (i) => {
    if (localRevealed) return;
    const correct = i === q.a;
    setLocalRevealed({selected:i, correct});
    onAnswer(q.id, i);
  };

  const handleNext = () => {
    setLocalRevealed(null);
    onNext();
  };

  return (
    <div className="quiz-card">
      <div className="quiz-cat">
        <span style={{display:"flex",alignItems:"center",gap:"6px"}}>
          <span style={{fontSize:"14px"}}>{q.emoji}</span>
          <span style={{color:CAT_COLOR[q.cat]||"var(--tx3)"}}>{q.cat}</span>
        </span>
        <button onClick={onLaunchFull} style={{background:"none",border:"none",cursor:"pointer",fontSize:"18px",color:"var(--tx2)",padding:0}} title="Play full quiz">🏆</button>
      </div>
      <div className="quiz-q">{q.q}</div>
      <div className="quiz-opts">
        {q.opts.map((opt,i)=>{
          let cls = "quiz-opt";
          if (localRevealed) {
            if (i===q.a) cls+=" quiz-opt-correct";
            else if (i===localRevealed.selected) cls+=" quiz-opt-wrong";
            else cls+=" quiz-opt-dim";
          }
          return (
            <div key={i} className={cls} onClick={()=>!localRevealed&&handleSelect(i)}>
              <span className="quiz-opt-key">{String.fromCharCode(65+i)}</span>
              <span style={{fontSize:"11px",lineHeight:1.35}}>{opt}</span>
            </div>
          );
        })}
      </div>
      {localRevealed && (
        <>
          <div className="quiz-explain" style={{borderLeft:`2px solid ${localRevealed.correct?"var(--green)":"var(--red)"}`}}>
            <span style={{fontSize:"10px",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:localRevealed.correct?"var(--green)":"var(--red)",display:"block",marginBottom:"5px"}}>{localRevealed.correct?"✓ Correct":"✗ Incorrect"}</span>
            {q.explain}
          </div>
          <div className="quiz-footer">
            <span style={{fontSize:"11px",color:"var(--tx3)"}}>{Object.keys(quizState.answered).length} answered</span>
            <button className="quiz-next" onClick={handleNext}>Next question →</button>
          </div>
        </>
      )}
      {!localRevealed && (
        <div className="quiz-footer">
          <span style={{fontSize:"11px",color:"var(--tx3)"}}>{Object.keys(quizState.answered).length} answered · tap an option</span>
        </div>
      )}
    </div>
  );
}

// ── FULL QUIZ SCREEN ──────────────────────────────────────────────────────────
function QuizFullScreen({questions, nav}) {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [score, setScore] = useState({correct:0,wrong:0,history:[]});
  const [done, setDone] = useState(false);

  // Pick 20 random questions
  const session = useMemo(()=>{
    const shuffled = [...questions].sort(()=>Math.random()-.5);
    return shuffled.slice(0,Math.min(20,shuffled.length));
  },[]);

  const q = session[current];
  const CAT_COLOR = {"General":"var(--blue)","My Journey":"var(--accent)","Technique":"var(--green)"};

  const handleSelect = (i) => {
    if (revealed) return;
    setSelected(i);
    setRevealed(true);
    setScore(s=>({correct:s.correct+(i===q.a?1:0),wrong:s.wrong+(i!==q.a?1:0),history:[...s.history,{qid:q.id,cat:q.cat,correct:i===q.a}]}));
  };

  const next = () => {
    if (current<session.length-1){setCurrent(c=>c+1);setSelected(null);setRevealed(false);}
    else setDone(true);
  };

  if (done) return (
    <div className="screen fade-in">
      <div style={{padding:"16px 18px 0",display:"flex",alignItems:"center",gap:"10px"}}>
        <button className="icon-btn" onClick={()=>nav("home")}>←</button>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"22px",fontWeight:500}}>Results</span>
      </div>
      <div style={{textAlign:"center",padding:"32px 18px 20px"}}>
        <div style={{fontSize:"48px",marginBottom:"12px"}}>{score.correct>=16?"🏆":score.correct>=12?"☕":score.correct>=8?"📚":"🌱"}</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"32px",fontWeight:500,marginBottom:"6px"}}>{score.correct} / {session.length}</div>
        <div style={{fontSize:"13px",color:"var(--tx2)"}}>{score.correct>=16?"Excellent — you know your coffee":score.correct>=12?"Good — keep tasting":"Keep exploring"}</div>
      </div>
      {["General","My Journey","Technique"].map(cat=>{
        const catH=score.history.filter(h=>h.cat===cat);
        if(!catH.length) return null;
        const catC=catH.filter(h=>h.correct).length;
        return (
          <div key={cat} style={{margin:"0 18px 8px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:"10px",fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",color:CAT_COLOR[cat],marginBottom:"3px"}}>{cat}</div>
              <div style={{fontSize:"13px"}}>{catC}/{catH.length} correct</div>
            </div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:"22px",fontWeight:500,color:catC===catH.length?"var(--green)":catC>=catH.length/2?"var(--accent)":"var(--red)"}}>
              {Math.round(catC/catH.length*100)}%
            </div>
          </div>
        );
      })}
      <div className="btn-area" style={{paddingTop:"8px"}}>
        <button className="btn btn-p" onClick={()=>nav("home")}>Done</button>
      </div>
    </div>
  );

  const progress = (current/session.length)*100;
  return (
    <div className="screen fade-in">
      <div style={{padding:"16px 18px 0",display:"flex",alignItems:"center",gap:"10px"}}>
        <button className="icon-btn" onClick={()=>nav("home")}>←</button>
        <div style={{flex:1}}>
          <div className="quiz-progress" style={{marginBottom:0}}>
            <div className="quiz-progress-fill" style={{width:`${progress}%`}}/>
          </div>
        </div>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:"11px",color:"var(--tx3)"}}>{current+1}/{session.length}</span>
      </div>
      <div className="quiz-full">
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"16px"}}>
          <span style={{fontSize:"16px"}}>{q.emoji}</span>
          <span style={{fontSize:"9px",fontWeight:700,letterSpacing:".14em",textTransform:"uppercase",color:CAT_COLOR[q.cat]}}>{q.cat}</span>
          <span style={{marginLeft:"auto",fontFamily:"'DM Mono',monospace",fontSize:"12px",color:"var(--green)"}}>✓ {score.correct}</span>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:"12px",color:"var(--red)"}}>✗ {score.wrong}</span>
        </div>
        <div className="quiz-full-q">{q.q}</div>
        <div className="quiz-full-opts">
          {q.opts.map((opt,i)=>{
            let cls="quiz-full-opt";
            const isRevealed=revealed?"qo-revealed":"";
            if(revealed){
              if(i===q.a) cls+=" quiz-opt-correct";
              else if(i===selected) cls+=" quiz-opt-wrong";
              else cls+=" quiz-opt-dim";
            }
            return (
              <div key={i} className={`${cls} ${isRevealed}`} onClick={()=>handleSelect(i)}>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:"11px",opacity:.5,flexShrink:0}}>{String.fromCharCode(65+i)}</span>
                <span style={{fontSize:"14px",lineHeight:1.4}}>{opt}</span>
                {revealed&&i===q.a&&<span style={{marginLeft:"auto"}}>✓</span>}
                {revealed&&i===selected&&i!==q.a&&<span style={{marginLeft:"auto"}}>✗</span>}
              </div>
            );
          })}
        </div>
        {revealed&&(
          <>
            <div className="quiz-full-explain" style={{borderLeft:`2px solid ${selected===q.a?"var(--green)":"var(--red)"}`}}>
              <div style={{fontSize:"10px",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:selected===q.a?"var(--green)":"var(--red)",marginBottom:"6px"}}>{selected===q.a?"✓ Correct":"✗ Incorrect"}</div>
              {q.explain}
            </div>
            <button className="btn btn-p" onClick={next}>{current<session.length-1?"Next Question →":"See Results"}</button>
          </>
        )}
      </div>
    </div>
  );
}

// ── HOME SCREEN ───────────────────────────────────────────────────────────────
function HomeScreen({kits, dialins, nav, onSync, syncing, lastSync, settings, questions, quizState, onQuizAnswer, onQuizNext}) {
  const [frozenOpen, setFrozenOpen] = useState(false);
  const [sort, setSort] = useState("recent");

  const groups = useMemo(()=>buildCoffeeGroups(dialins),[dialins]);
  const active = useMemo(()=>groups.filter(g=>g.entries.some(e=>["shelf","open"].includes(e.beanLocation))),[groups]);
  const frozen = useMemo(()=>groups.filter(g=>g.entries.some(e=>e.beanLocation==="frozen")&&!g.entries.some(e=>["shelf","open"].includes(e.beanLocation))),[groups]);

  const sorted = useMemo(()=>{
    const newestDate=g=>[...g.entries].sort((x,y)=>(y.date||"").localeCompare(x.date||""))[0]?.date||"";
    const bestRating=g=>Math.max(0,...g.entries.map(e=>e.rating||0));
    return [...active].sort((a,b)=>{
      if(sort==="rating") return bestRating(b)-bestRating(a);
      if(sort==="name")   return (a.coffeeName||"").localeCompare(b.coffeeName||"");
      return newestDate(b).localeCompare(newestDate(a));
    });
  },[active,sort]);

  // Journey stats
  const norm = useMemo(()=>dialins.map(normalizeDiaLin),[dialins]);

  // Best-rated origin (avg rating, min 2 entries)
  const bestRatedOrigin = useMemo(()=>{
    const originRatings={};
    norm.forEach(d=>{
      if(!d.origin||d.origin==="Blend"||!d.rating) return;
      if(!originRatings[d.origin]) originRatings[d.origin]={sum:0,count:0};
      originRatings[d.origin].sum+=d.rating;
      originRatings[d.origin].count+=1;
    });
    return Object.entries(originRatings)
      .filter(([,v])=>v.count>=1)
      .sort((a,b)=>(b[1].sum/b[1].count)-(a[1].sum/a[1].count))[0]?.[0]||"—";
  },[norm]);

  // Most frequent origin
  const originCounts = useMemo(()=>{
    const c={};
    norm.forEach(d=>{if(d.origin&&d.origin!=="Blend")c[d.origin]=(c[d.origin]||0)+1;});
    return c;
  },[norm]);
  const favOrigin = Object.entries(originCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||"—";

  const processCounts = useMemo(()=>{
    const c={};
    norm.forEach(d=>{if(d.process&&d.process!=="Blend")c[d.process]=(c[d.process]||0)+1;});
    return c;
  },[norm]);
  const topProcess = Object.entries(processCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||"—";

  // Top rated: 2 espresso + 2 pour over
  const topRated = useMemo(()=>{
    const espr=norm.filter(d=>d.rating>0&&["home-espresso","office-espresso"].includes(d.kitId)).sort((a,b)=>b.rating-a.rating).slice(0,2);
    const pour=norm.filter(d=>d.rating>0&&["home-pour-over","office-pour-over","home-french-press","office-french-press"].includes(d.kitId)).sort((a,b)=>b.rating-a.rating).slice(0,2);
    return [...espr,...pour];
  },[norm]);

  return (
    <div className="screen fade-in">
      <div className="topbar">
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"26px",fontWeight:500,letterSpacing:".02em"}}>Dial-In</div>
          <div style={{fontSize:"9px",fontWeight:600,letterSpacing:".14em",textTransform:"uppercase",color:"var(--tx3)",marginTop:"1px"}}>{lastSync?`Synced ${lastSync}`:`${active.length} active`}</div>
        </div>
        <div className="topbar-actions">
          <button className="icon-btn" onClick={()=>nav("add")} title="Add coffee">☕</button>
          <button className="icon-btn" onClick={()=>nav("settings")} title="Settings">⚙</button>
          <button className="icon-btn" onClick={onSync} title="Sync"><span className={syncing?"spin":""}>{syncing?"↻":"⟳"}</span></button>
        </div>
      </div>

      {/* Active coffees */}
      <div className="sec"><span className="sec-title">Active Coffees</span></div>
      {sorted.length===0
        ? <div className="empty"><div className="empty-ico">☕</div><div className="empty-t">No active coffees</div><div className="empty-s">Tap ☕ to add one</div></div>
        : sorted.map(g=><ActiveCard key={`${g.coffeeName}⌀${g.roaster}`} group={g} settings={settings} onClick={()=>nav("dialin",g.entries[0],"home")}/>)
      }

      {/* Frozen */}
      {frozen.length>0&&(
        <>
          <div className="frozen-row" onClick={()=>setFrozenOpen(o=>!o)}>
            <span style={{fontSize:"16px"}}>❄</span>
            <span className="frozen-row-title">{frozen.length} Frozen Coffee{frozen.length!==1?"s":""}</span>
            <span style={{color:"var(--tx3)",fontSize:"14px",transition:"transform .2s",display:"inline-block",transform:frozenOpen?"rotate(90deg)":"none"}}>›</span>
          </div>
          {frozenOpen&&frozen.map(g=>(
            <div key={`${g.coffeeName}⌀${g.roaster}`} className="frozen-item" onClick={()=>nav("dialin",g.entries[0],"home")}>
              <div style={{width:"7px",height:"7px",borderRadius:"50%",background:brewDotColor([...new Set(g.entries.flatMap(e=>e.brewMethods||[]))]),flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:"10px",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--accent)",marginBottom:"2px"}}>{g.roaster}</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"14px"}}>{g.coffeeName}</div>
              </div>
              {g.entries[0]?.flavorNotes&&<div style={{fontSize:"10px",color:"var(--tx3)",fontStyle:"italic",textAlign:"right",maxWidth:"120px",lineHeight:1.3}}>{g.entries[0].flavorNotes.split(",")[0]}</div>}
            </div>
          ))}
        </>
      )}

      {/* My Journey */}
      <div className="sec"><span className="sec-title">My Journey</span></div>
      <div className="stat-chips">
        <div className="stat-chip"><div className="stat-chip-v">{dialins.length}</div><div className="stat-chip-l">Logged</div></div>
        <div className="stat-chip"><div className="stat-chip-v" style={{fontSize:"13px"}}>{favOrigin}</div><div className="stat-chip-l">Top Origin</div></div>
        <div className="stat-chip"><div className="stat-chip-v" style={{fontSize:"13px"}}>{topProcess}</div><div className="stat-chip-l">Top Process</div></div>
        <div className="stat-chip"><div className="stat-chip-v" style={{fontSize:"13px"}}>{bestRatedOrigin}</div><div className="stat-chip-l">Best Rated</div></div>
      </div>
      {topRated.length>0&&(
        <>
          <div style={{padding:"0 18px 6px",fontSize:"9px",fontWeight:600,letterSpacing:".14em",textTransform:"uppercase",color:"var(--tx3)"}}>Top Rated</div>
          <div className="top-rated-grid">
            {topRated.map(d=>{
              const isEspr=["home-espresso","office-espresso"].includes(d.kitId);
              const dotColor=isEspr?DOT_COLOR.espr:DOT_COLOR.pour;
              return (
                <div key={d.id} className="top-rated-card" onClick={()=>nav("dialin",d,"home")} style={{borderTopColor:dotColor,borderTopWidth:"2px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"4px",marginBottom:"3px"}}>
                    <div style={{width:"5px",height:"5px",borderRadius:"50%",background:dotColor,flexShrink:0}}/>
                    <div className="top-rated-roaster">{d.roaster}</div>
                  </div>
                  <div className="top-rated-name">{d.coffeeName}</div>
                  <Stars n={d.rating} size={9}/>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* Quiz */}
      <div className="sec"><span className="sec-title">Coffee Knowledge</span></div>
      {questions.length>0&&<HomeQuizCard questions={questions} quizState={quizState} onAnswer={onQuizAnswer} onNext={onQuizNext} onLaunchFull={()=>nav("quiz")}/>}
    </div>
  );
}

// ── LOGBOOK SCREEN ────────────────────────────────────────────────────────────
function LogbookScreen({kits, dialins, nav, settings}) {
  const [q,       setQ]       = useState("");
  const [brewF,   setBrewF]   = useState([]);
  const [roastF,  setRoastF]  = useState([]);
  const [statusF, setStatusF] = useState("all");
  const [beansF,  setBeansF]  = useState("all");
  const [sort,    setSort]    = useState("recent");
  const [expanded,setExpanded]= useState({});

  const toggleArr=(arr,set,val)=>set(arr.includes(val)?arr.filter(x=>x!==val):[...arr,val]);
  const ROAST_KEY={"Light":"light","Medium-Light":"ml","Medium":"med","Medium-Dark":"md","Dark":"dark"};

  const filteredGroups = useMemo(()=>{
    return buildCoffeeGroups(dialins).filter(g=>{
      const sm=!q||[g.coffeeName,g.roaster,...g.entries.flatMap(e=>[e.origin,e.process,e.flavorNotes])].join(" ").toLowerCase().includes(q.toLowerCase());
      const allBrews=[...new Set(g.entries.flatMap(e=>e.brewMethods||[]))];
      const allRoasts=g.entries.map(e=>ROAST_KEY[e.roastLevel]).filter(Boolean);
      const allStatus=g.entries.map(e=>e.dialStatus);
      const anyExp=g.entries.some(e=>e.experimenting);
      const allBeans=g.entries.map(e=>e.beanLocation);
      const bm=brewF.length===0||(brewF.every(v=>(v==="espr"&&allBrews.includes("Espresso"))||(v==="pour"&&allBrews.includes("Pour Over"))||(v==="frpr"&&allBrews.includes("French Press"))));
      const rm=roastF.length===0||roastF.some(v=>allRoasts.includes(v));
      const stm=statusF==="all"||(statusF==="experimenting"?anyExp:allStatus.includes(statusF));
      const blm=beansF==="all"||allBeans.includes(beansF);
      return sm&&bm&&rm&&stm&&blm;
    }).sort((a,b)=>{
      const d=g=>[...g.entries].sort((x,y)=>(y.date||"").localeCompare(x.date||""))[0]?.date||"";
      const r=g=>[...g.entries].filter(e=>e.roastDate).sort((x,y)=>y.roastDate.localeCompare(x.roastDate))[0]?.roastDate||"";
      if(sort==="rating") return Math.max(0,...b.entries.map(e=>e.rating||0))-Math.max(0,...a.entries.map(e=>e.rating||0));
      if(sort==="name")   return (a.coffeeName||"").localeCompare(b.coffeeName||"");
      if(sort==="roast")  return r(b).localeCompare(r(a));
      return d(b).localeCompare(d(a));
    });
  },[dialins,q,brewF,roastF,statusF,beansF,sort]);

  const MultiRow=({label,opts,val,set})=>(
    <div className="filter-block">
      <div className="filter-label">{label}</div>
      <div className="chips">{opts.map(([v,l])=><div key={v} className={`chip${val.includes(v)?" chip-on":""}`} onClick={()=>toggleArr(val,set,v)}>{l}</div>)}</div>
    </div>
  );
  const SingleRow=({label,opts,val,set})=>(
    <div className="filter-block">
      <div className="filter-label">{label}</div>
      <div className="chips">{opts.map(([v,l])=><div key={v} className={`chip${val===v?" chip-on":""}`} onClick={()=>set(v)}>{l}</div>)}</div>
    </div>
  );

  return (
    <div className="screen fade-in">
      <div className="topbar" style={{marginBottom:"8px"}}>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"26px",fontWeight:500}}>Logbook</span>
        <select className="sort-sel" value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="recent">Recent</option><option value="rating">Rating ↓</option><option value="name">Name A–Z</option><option value="roast">Roast Date</option>
        </select>
      </div>
      <div className="search-wrap">
        <span className="search-ico">⌕</span>
        <input className="search-input" placeholder="Search coffee, origin, flavour…" value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <div style={{padding:"4px 0 10px"}}>
        <MultiRow  label="Brew"   opts={[["espr","ESPR"],["pour","POUR"],["frpr","FRPR"]]}                                      val={brewF}  set={setBrewF}/>

        <SingleRow label="Beans"  opts={[["all","ALL"],["shelf","SHELF"],["open","OPEN"],["frozen","FROZEN"],["empty","DONE"]]}  val={beansF} set={setBeansF}/>

            const isExp=expanded[key];

            const esprE=getBestEntry(g.entries,"espr");
            const pourE=getBestEntry(g.entries,"pour");
            const gGrid={he:null,hp:null,oe:null,op:null};
            g.entries.forEach(e=>{const pos=KIT_GRID[e.kitId];if(pos&&e.grindSetting)gGrid[pos]=shortGrind(e.grindSetting);});

                <div className="lb-header" onClick={()=>setExpanded(p=>({...p,[key]:!p[key]}))}>

                  <div className="lb-meta">
                    <div className="lb-roaster">{g.roaster}</div>
                    <div className="lb-name">{g.coffeeName}</div>
                  </div>
