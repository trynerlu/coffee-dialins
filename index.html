<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0C0501"/>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0C0501; --surface:  #170C06; --elevated: #201208; --input-bg: #1A0D07;
      --border:   rgba(200,118,58,0.16); --bh: rgba(200,118,58,0.38);
      --accent:   #C87840; --accent-d: rgba(200,120,64,0.13); --accent-b: #E09050;
      --tx1:      #EDD8B4; --tx2: #9A7050; --tx3: #5A3A22;
      --green:    #5A8860; --green-d: rgba(90,136,96,0.14);
      --blue:     #5A7098; --blue-d: rgba(90,112,152,0.14);
    }
    html,body { height:100%; background:var(--bg); color:var(--tx1); font-family:'Jost',sans-serif; font-weight:400; -webkit-font-smoothing:antialiased; overscroll-behavior:none; }
    body::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); opacity:.5; }
    #root { height:100%; }

    .screen { min-height:100vh; max-width:480px; margin:0 auto; padding-bottom:80px; }
    .fade-in { animation:fadeIn .22s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

    /* Header */
    .hdr { position:sticky; top:0; z-index:100; background:rgba(12,5,1,.93); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); padding:14px 18px; display:flex; align-items:center; gap:12px; }
    .hdr-title { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:500; letter-spacing:.02em; flex:1; }
    .hdr-sub { font-size:10px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--tx2); margin-top:1px; }
    .icon-btn { width:34px; height:34px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--tx2); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; font-size:15px; flex-shrink:0; }
    .icon-btn:hover { border-color:var(--bh); color:var(--tx1); }

    .sec { padding:22px 18px 10px; font-size:10px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--tx2); }

    /* Kit grid */
    .kit-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 18px 6px; }
    .kit-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px 16px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; }
    .kit-card::after { content:''; position:absolute; top:-24px; right:-24px; width:90px; height:90px; border-radius:50%; background:currentColor; opacity:.055; transition:all .3s; }
    .kit-card:hover { border-color:var(--bh); transform:translateY(-2px); }
    .kit-card:hover::after { opacity:.1; transform:scale(1.4); }
    .kit-tag { font-family:'DM Mono',monospace; font-size:9px; font-weight:500; letter-spacing:.1em; padding:3px 7px; border-radius:4px; display:inline-block; margin-bottom:13px; }
    .kit-name { font-family:'Cormorant Garamond',serif; font-size:19px; font-weight:500; line-height:1.2; margin-bottom:3px; }
    .kit-sub { font-size:11px; color:var(--tx2); }
    .kit-count { font-family:'DM Mono',monospace; font-size:10px; color:var(--tx3); margin-top:11px; }

    /* Equipment */
    .eq-row { display:flex; align-items:flex-start; gap:14px; padding:14px 18px; border-bottom:1px solid var(--border); }
    .eq-cat { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); min-width:82px; margin-top:2px; }
    .eq-name { font-size:14px; font-weight:500; }
    .eq-note { font-size:12px; color:var(--tx2); margin-top:2px; }

    /* Dial-in card */
    .dc { margin:0 18px 9px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; transition:border-color .15s; }
    .dc:hover { border-color:var(--bh); }
    .dc-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:9px; }
    .dc-name { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:500; }
    .dc-roaster { font-size:11px; color:var(--tx2); margin-top:2px; }
    .dc-grind { font-family:'DM Mono',monospace; font-size:22px; font-weight:500; color:var(--accent); text-align:right; }
    .dc-grind-lbl { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); text-align:right; margin-top:1px; }
    .dc-meta { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }

    /* Badges */
    .badge { font-size:10px; font-weight:500; letter-spacing:.05em; padding:3px 7px; border-radius:4px; }
    .b-dialed { background:var(--green-d); color:var(--green); }
    .b-experimenting { background:var(--accent-d); color:var(--accent); }
    .b-kit { background:var(--elevated); color:var(--tx2); border:1px solid var(--border); }
    .b-process { background:var(--blue-d); color:var(--blue); }
    .b-roast { background:rgba(139,78,26,.14); color:#9A6A44; }

    /* Stars */
    .stars { display:flex; gap:2px; }
    .star-on { color:var(--accent); font-size:12px; }
    .star-off { color:var(--tx3); font-size:12px; }

    /* Search */
    .search-wrap { position:relative; padding:10px 18px; }
    .search-ico { position:absolute; left:32px; top:50%; transform:translateY(-50%); color:var(--tx3); font-size:14px; pointer-events:none; }
    .search-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--tx1); font-family:'Jost',sans-serif; font-size:14px; padding:9px 12px 9px 36px; outline:none; transition:border-color .15s; }
    .search-input:focus { border-color:var(--accent); }

    /* Chips */
    .chips { display:flex; gap:7px; padding:0 18px 10px; overflow-x:auto; scrollbar-width:none; }
    .chips::-webkit-scrollbar { display:none; }
    .chip { flex-shrink:0; padding:5px 11px; border-radius:6px; font-size:11px; font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--tx2); transition:all .15s; }
    .chip-on { background:var(--accent-d); border-color:var(--accent); color:var(--accent); }

    /* Stats */
    .stats { display:flex; border:1px solid var(--border); border-radius:9px; overflow:hidden; margin:10px 0; }
    .stat { flex:1; padding:11px 6px; text-align:center; border-right:1px solid var(--border); }
    .stat:last-child { border-right:none; }
    .stat-v { font-family:'DM Mono',monospace; font-size:17px; font-weight:500; color:var(--accent); }
    .stat-v span { font-size:11px; }
    .stat-l { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); margin-top:2px; }

    /* Detail */
    .det-hero { padding:20px 18px 18px; border-bottom:1px solid var(--border); }
    .det-date { font-family:'DM Mono',monospace; font-size:10px; color:var(--tx3); letter-spacing:.08em; margin-bottom:7px; }
    .det-title { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:500; line-height:1.2; margin-bottom:5px; }
    .det-roaster { font-size:13px; color:var(--tx2); margin-bottom:13px; }
    .det-row { display:flex; gap:14px; padding:8px 0; border-bottom:1px solid var(--border); }
    .det-label { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); min-width:88px; margin-top:2px; }
    .det-val { font-size:13px; color:var(--tx1); }
    .det-notes { padding:12px 18px 20px; font-family:'Cormorant Garamond',serif; font-size:16px; font-style:italic; color:var(--tx2); line-height:1.65; }

    /* Form */
    .f-grp { margin-bottom:14px; padding:0 18px; }
    .f-lbl { display:block; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--tx2); margin-bottom:5px; }
    .f-in,.f-sel,.f-ta { width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:8px; color:var(--tx1); font-family:'Jost',sans-serif; font-size:14px; padding:9px 12px; outline:none; transition:border-color .15s; }
    .f-in:focus,.f-sel:focus,.f-ta:focus { border-color:var(--accent); }
    .f-sel option { background:var(--elevated); }
    .f-ta { resize:vertical; min-height:75px; }
    .f-row { padding:0 18px 14px; display:flex; gap:10px; }
    .f-row .f-grp { flex:1; padding:0; margin-bottom:0; }
    .opt-chips { display:flex; gap:8px; flex-wrap:wrap; }
    .opt-chip { padding:7px 13px; border-radius:7px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--input-bg); color:var(--tx2); transition:all .15s; }
    .opt-chip-on { background:var(--accent-d); border-color:var(--accent); color:var(--accent); }
    .star-in { display:flex; gap:5px; }
    .star-btn { background:none; border:none; cursor:pointer; font-size:22px; color:var(--tx3); transition:color .1s,transform .1s; padding:0; }
    .star-btn:hover { transform:scale(1.15); }
    .star-btn-on { color:var(--accent); }

    /* Buttons */
    .btn { border:none; border-radius:9px; padding:12px 18px; font-family:'Jost',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:all .15s; letter-spacing:.04em; width:100%; }
    .btn-p { background:var(--accent); color:#0C0501; }
    .btn-p:hover { background:var(--accent-b); }
    .btn-p:disabled { opacity:.45; cursor:not-allowed; }
    .btn-s { background:var(--elevated); border:1px solid var(--border); color:var(--tx2); }
    .btn-s:hover { border-color:var(--bh); color:var(--tx1); }
    .btn-area { padding:14px 18px; display:flex; flex-direction:column; gap:9px; }

    /* Bottom nav */
    .bnav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:rgba(12,5,1,.93); backdrop-filter:blur(14px); border-top:1px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
    .nav-btn { flex:1; padding:10px 6px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; color:var(--tx3); border:none; background:none; transition:color .15s; }
    .nav-btn-on { color:var(--accent); }
    .nav-ico { font-size:18px; }
    .nav-lbl { font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; }

    /* Empty */
    .empty { text-align:center; padding:55px 18px; }
    .empty-ico { font-size:38px; opacity:.35; margin-bottom:14px; }
    .empty-t { font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--tx2); margin-bottom:7px; }
    .empty-s { font-size:12px; color:var(--tx3); }

    /* Toast */
    .toast { position:fixed; bottom:84px; left:50%; transform:translateX(-50%); background:var(--elevated); border:1px solid var(--border); border-radius:9px; padding:11px 18px; font-size:13px; color:var(--tx1); z-index:1000; white-space:nowrap; animation:toastIn .2s ease; }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    /* Sync indicator */
    .sync-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); display:inline-block; margin-left:6px; animation:pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .spin { animation:spin .7s linear infinite; display:inline-block; }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    .div { height:1px; background:var(--border); }

    /* Splash */
    .splash { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200; gap:16px; }
    .splash-title { font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:300; letter-spacing:.06em; color:var(--tx1); }
    .splash-sub { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--tx3); }
    .splash-bar { width:120px; height:1px; background:var(--border); position:relative; overflow:hidden; }
    .splash-bar::after { content:''; position:absolute; left:-40%; width:40%; height:100%; background:var(--accent); animation:load 1.2s ease infinite; }
    @keyframes load { from{left:-40%} to{left:100%} }
  </style>
</head>

// ── GITHUB API ─────────────────────────────────────────────────────────────────
async function ghRead(s, file) {
  const url = `https://raw.githubusercontent.com/${s.owner}/${s.repo}/main/${file}?_=${Date.now()}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${file}: HTTP ${r.status}`);
  return r.json();
}

async function ghGetSha(s, file) {
  if (!s.token) return null;
  const r = await fetch(
    `https://api.github.com/repos/${s.owner}/${s.repo}/contents/${file}?ref=main`,
    { headers:{ Authorization:`Bearer ${s.token}`, Accept:"application/vnd.github+json" } }
  );
  if (!r.ok) return null;
  const j = await r.json();
  return j.sha || null;
}

async function ghWrite(s, file, data) {
  if (!s.token) throw new Error("No token — set it in Settings");
  const api = `https://api.github.com/repos/${s.owner}/${s.repo}/contents/${file}`;
  const hdr = { Authorization:`Bearer ${s.token}`, Accept:"application/vnd.github+json", "Content-Type":"application/json" };
  const sha = await ghGetSha(s, file);
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const res = await fetch(api, { method:"PUT", headers:hdr, body:JSON.stringify({
    message:`Update ${file} via Dial-In App`, content, branch:"main", ...(sha?{sha}:{})
  })});
  if (!res.ok) { const e = await res.json(); throw new Error(e.message); }
}

}
function DialInCard({ d, kits, onClick }) {

  return (
    <div className="dc" onClick={onClick}>

        {d.rating>0 && <Stars n={d.rating}/>}

}

// ── IMPORT FROM CLAUDE ─────────────────────────────────────────────────────────
function ImportScreen({ kits, onImport, nav }) {
  const [raw,     setRaw]     = useState("");
  const [preview, setPreview] = useState(null);
  const [err,     setErr]     = useState("");

  const parse = () => {
    setErr(""); setPreview(null);
    try {
      const trimmed = raw.trim().replace(/^```json|^```|```$/gm,"").trim();
      let parsed = JSON.parse(trimmed);
      if (!Array.isArray(parsed)) parsed = [parsed];
      // Basic validation
      const invalid = parsed.filter(e=>!e.coffeeName);
      if (invalid.length) { setErr("Every entry needs at least a coffeeName."); return; }
      // Fill missing ids/dates
      parsed = parsed.map(e=>({
        ...e,
        id: e.id || uid(),
        date: e.date || new Date().toISOString().split("T")[0],
        kitId: e.kitId || kits[0]?.id || "home-espresso",
      }));
      setPreview(parsed);
    } catch(e) { setErr("Could not parse JSON — copy the full block Claude generated."); }
  };

  const kit = (id) => kits.find(k=>k.id===id);

  return (
    <div className="screen fade-in">
      <div className="hdr">
        <button className="icon-btn" onClick={()=>nav("logbook")}>←</button>
        <div style={{flex:1}}>
          <div className="hdr-title">Import from Claude</div>
          <div className="hdr-sub">Paste · Preview · Save</div>
        </div>
      </div>

      {/* How it works */}
      <div style={{margin:"14px 18px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"10px",padding:"14px"}}>
        <div style={{fontSize:"10px",fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",color:"var(--accent)",marginBottom:"9px"}}>How it works</div>
        <div style={{fontSize:"12px",color:"var(--tx2)",lineHeight:"1.65"}}>
          1. Chat with Claude about a new coffee<br/>
          2. Ask Claude to <em style={{color:"var(--tx1)"}}>generate a dial-in JSON entry</em><br/>
          3. Copy the JSON block Claude outputs<br/>
          4. Paste it below → Preview → Save to GitHub
        </div>
      </div>

      {!preview ? <>
        <div className="sec">Paste JSON from Claude</div>
        <div className="f-grp">
          <textarea className="f-ta" style={{minHeight:"160px",fontFamily:"'DM Mono',monospace",fontSize:"12px"}}
            placeholder={'{\n  "coffeeName": "Ethiopia Yirgacheffe",\n  "roaster": "The Barn",\n  "grindSetting": "12.5",\n  ...\n}'}
            value={raw} onChange={e=>{setRaw(e.target.value);setErr("");}}/>
          {err && <div style={{fontSize:"12px",color:"#C05050",marginTop:"6px"}}>{err}</div>}
        </div>
        <div className="btn-area">
          <button className="btn btn-p" onClick={parse} disabled={!raw.trim()}>Preview</button>
          <button className="btn btn-s" onClick={()=>nav("logbook")}>Cancel</button>
        </div>
      </> : <>
        <div className="sec">Preview — {preview.length} entr{preview.length===1?"y":"ies"}</div>
        {preview.map((e,i)=>(
          <div key={i} style={{margin:"0 18px 10px",background:"var(--surface)",border:"1px solid var(--bh)",borderRadius:"12px",padding:"16px"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"18px",fontWeight:500,marginBottom:"4px"}}>{e.coffeeName}</div>
            <div style={{fontSize:"11px",color:"var(--tx2)",marginBottom:"11px"}}>{e.roaster} · {e.date}</div>
            <div style={{display:"flex",gap:"16px",marginBottom:"10px"}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:"28px",fontWeight:500,color:"var(--accent)",lineHeight:1}}>{e.grindSetting||"—"}</div>
                <div style={{fontSize:"9px",letterSpacing:".1em",textTransform:"uppercase",color:"var(--tx3)",marginTop:"2px"}}>Grind</div>
              </div>
              <div style={{flex:1,display:"flex",flexDirection:"column",gap:"4px",justifyContent:"center"}}>
                {e.doseIn   && <div style={{fontSize:"12px",color:"var(--tx2)"}}>Dose: <span style={{color:"var(--tx1)"}}>{e.doseIn}g → {e.yieldOut}g</span> ({e.timeSeconds}s)</div>}
                {e.process  && <div style={{fontSize:"12px",color:"var(--tx2)"}}>Process: <span style={{color:"var(--tx1)"}}>{e.process}</span></div>}
                {e.kitId    && <div style={{fontSize:"12px",color:"var(--tx2)"}}>Kit: <span style={{color:"var(--tx1)"}}>{kit(e.kitId)?.name||e.kitId}</span></div>}
              </div>
            </div>
            {e.flavorNotes && <div style={{fontSize:"12px",color:"var(--tx2)",fontStyle:"italic"}}>"{e.flavorNotes}"</div>}
          </div>
        ))}
        <div className="btn-area">
          <button className="btn btn-p" onClick={()=>onImport(preview)}>Save to GitHub</button>
          <button className="btn btn-s" onClick={()=>setPreview(null)}>← Edit</button>
        </div>
      </>}
    </div>
  );
}

// ── ROOT APP ───────────────────────────────────────────────────────────────────
function App() {
  const [ready,    setReady]   = useState(false);
  const [screen,   setScreen]  = useState("home");
  const [curKit,   setCurKit]  = useState(null);
  const [curDial,  setCurDial] = useState(null);
  const [kits,     setKits]    = useState(DEF_KITS);
  const [dialins,  setDialins] = useState(DEF_DIALINS);
  const [syncing,  setSyncing] = useState(false);
  const [toast,    setToast]   = useState(null);
  const [lastSync, setLastSync]= useState(null);
  const [settings, setSettings]= useState(()=>lsGet(LS.settings)||{});

  // ── BOOT: load cache, then auto-sync from GitHub ──
  useEffect(()=>{
    const cachedKits    = lsGet(LS.kits);
    const cachedDialins = lsGet(LS.dialins);
    if (cachedKits)    setKits(cachedKits);
    if (cachedDialins) setDialins(cachedDialins);
    setReady(true);

    // Auto-sync if GitHub is configured
    const s = lsGet(LS.settings)||{};
    if (s.owner && s.repo && navigator.onLine) {
      autoSync(s, cachedKits, cachedDialins);
    }
  }, []);

  const autoSync = async (s, localKits, localDialins) => {
    try {
      const [remoteKits, remoteDialins] = await Promise.all([
        ghRead(s, "kits.json").catch(()=>null),
        ghRead(s, "dialins.json").catch(()=>null),
      ]);
      let updated = false;
      if (remoteKits    && JSON.stringify(remoteKits)    !== JSON.stringify(localKits))    { setKits(remoteKits);       lsSet(LS.kits,    remoteKits);    updated=true; }
      if (remoteDialins && JSON.stringify(remoteDialins) !== JSON.stringify(localDialins)) { setDialins(remoteDialins); lsSet(LS.dialins, remoteDialins); updated=true; }
      const t = new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
      setLastSync(t);
      if (updated) flash("↑ Updated from GitHub");
    } catch(e) { /* silent fail — app still works offline */ }
  };

  const flash = (msg, ms=2800) => { setToast(msg); setTimeout(()=>setToast(null), ms); };

  const syncPull = async () => {
    if (!settings.owner||!settings.repo) { flash("⚠ Configure GitHub in Settings"); setScreen("settings"); return; }
    setSyncing(true);
    try {
      const [k,d] = await Promise.all([ghRead(settings,"kits.json"), ghRead(settings,"dialins.json")]);
      setKits(k);    lsSet(LS.kits,    k);
      setDialins(d); lsSet(LS.dialins, d);
      const t = new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
      setLastSync(t);
      flash("✓ Synced from GitHub");
    } catch(e) { flash(`✗ ${e.message}`); }
    setSyncing(false);
  };

  const addDialin = async (nd) => {
    const updated = [nd, ...dialins];
    setDialins(updated); lsSet(LS.dialins, updated);
    if (settings.token) {
      try { await ghWrite(settings, "dialins.json", updated); flash("✓ Saved to GitHub"); }
      catch(e) { flash(`⚠ Saved locally. GitHub: ${e.message}`); }
    } else {
      flash("✓ Saved locally (add token to push to GitHub)");
    }
    setScreen("logbook");
  };

  const importDialins = async (entries) => {
    const updated = [...entries.map(e=>({...e, id:e.id||uid()})), ...dialins];
    setDialins(updated); lsSet(LS.dialins, updated);
    if (settings.token) {
      try { await ghWrite(settings, "dialins.json", updated); flash(`✓ ${entries.length} entr${entries.length===1?"y":"ies"} saved to GitHub`); }
      catch(e) { flash(`⚠ Saved locally. GitHub: ${e.message}`); }
    } else {
      flash(`✓ ${entries.length} entr${entries.length===1?"y":"ies"} saved locally`);
    }
    setScreen("logbook");
  };

  const saveSettings = async (s) => {
    setSettings(s); lsSet(LS.settings, s); flash("✓ Settings saved — syncing…");
    setSyncing(true);
    try {
      const [k,d] = await Promise.all([ghRead(s,"kits.json"), ghRead(s,"dialins.json")]);
      setKits(k);    lsSet(LS.kits,    k);
      setDialins(d); lsSet(LS.dialins, d);
      const t = new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
      setLastSync(t);
      flash("✓ Connected & synced");
    } catch(e) { flash(`⚠ Settings saved. Sync failed: ${e.message}`); }
    setSyncing(false);
  };

  const nav = (to, data=null) => {
    if (to==="kit"    && data) setCurKit(data);
    if (to==="dialin" && data) setCurDial(data);
    setScreen(to);
  };

  const isDetail = ["kit","dialin","add","import"].includes(screen);

  if (!ready) return <Splash/>;

  const views = {
    home:     <HomeScreen    kits={kits} dialins={dialins} nav={nav} onSync={syncPull} syncing={syncing} lastSync={lastSync}/>,
    kit:      <KitScreen     kit={curKit} dialins={dialins} kits={kits} nav={nav}/>,
    logbook:  <LogbookScreen kits={kits} dialins={dialins} nav={nav}/>,
    dialin:   <DialInDetail  d={curDial} kits={kits} nav={nav}/>,
    add:      <AddDialIn     kits={kits} onSave={addDialin} nav={nav}/>,
    import:   <ImportScreen  kits={kits} onImport={importDialins} nav={nav}/>,
    settings: <SettingsScreen settings={settings} onSave={saveSettings} onSync={syncPull} syncing={syncing}/>,
  };

  return (
    <div>
      {views[screen]||views.home}
      {!isDetail && (
        <nav className="bnav">
          {[{id:"home",ico:"⊞",lbl:"Kits"},{id:"logbook",ico:"◉",lbl:"Log"},{id:"import",ico:"⊕",lbl:"Import"},{id:"settings",ico:"◎",lbl:"Settings"}]
            .map(item=>(
              <button key={item.id} className={`nav-btn${screen===item.id?" nav-btn-on":""}`} onClick={()=>setScreen(item.id)}>
                <span className="nav-ico">{item.ico}</span>
                <span className="nav-lbl">{item.lbl}</span>
              </button>
            ))}
        </nav>
      )}
      {syncing && !toast && <div className="toast">↻ Syncing…</div>}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
